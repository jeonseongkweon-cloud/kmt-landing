function clean(v){
  return (v ?? "")
    .toString()
    .replace(/^\uFEFF/, "")
    .replace(/\r/g, "")
    .replace(/^"|"$/g, "")
    .trim();
}
function norm(v){
  return clean(v).replace(/\s+/g,"").toLowerCase();
}
function onlyDigits(v){
  return clean(v).replace(/[^\d]/g,"");
}
function normBirth(v){
  const d = onlyDigits(v);
  if(!d) return "";
  if(d.length === 6) return d;
  if(d.length === 8) return d.slice(2);
  return d;
}
function escapeHtml(str){
  return String(str ?? "").replace(/[&<>"']/g, s => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[s]));
}
function fmtTime(dt){
  try{
    const y = dt.getFullYear();
    const m = String(dt.getMonth()+1).padStart(2,"0");
    const d = String(dt.getDate()).padStart(2,"0");
    const hh = String(dt.getHours()).padStart(2,"0");
    const mm = String(dt.getMinutes()).padStart(2,"0");
    return `${y}-${m}-${d} ${hh}:${mm}`;
  }catch{ return ""; }
}
function toPointNumber(v){
  const s = clean(v);
  const digits = s.replace(/[^\d]/g,"");
  return digits ? (Number(digits)||0) : 0;
}
function pointDisplay(n){
  return String(Number(n || 0));
}
function toScore(v){
  const n = Number(String(v ?? "").replace(/[^\d.-]/g,""));
  if(Number.isFinite(n)) return Math.max(0, Math.min(100, n));
  return null;
}
function avgOf(list){
  const nums = list.map(toScore).filter(v => v != null);
  if(!nums.length) return null;
  return Math.round(nums.reduce((a,b)=>a+b,0) / nums.length);
}
function tierOf(points){
  const p = Math.max(0, Number(points||0));
  for(const t of TIERS){
    if(p >= t.min && p <= t.max) return t;
  }
  return TIERS[0];
}
function getGoalByKey(key){
  return GOALS.find(g => g.key === key) || GOALS[0];
}
function progressOf(points, goalPoints){
  const p = Math.max(0, Number(points||0));
  const goal = Math.max(1, Number(goalPoints||1));
  const pct = Math.max(0, Math.min(100, Math.round((p/goal)*100)));
  const remain = Math.max(0, goal - p);
  const done = p >= goal;
  return { goal, pct, remain, done, p };
}
function parseDateAny(v){
  const s = clean(v);
  if(!s) return null;
  if(/미정/i.test(s)) return null;
  const digits = s.replace(/[^\d]/g,"");
  if(digits.length === 8){
    const y = Number(digits.slice(0,4));
    const m = Number(digits.slice(4,6));
    const d = Number(digits.slice(6,8));
    if(!y || !m || !d) return null;
    return new Date(y, m-1, d);
  }
  const m = s.match(/^(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})$/);
  if(m) return new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
  return null;
}
function fmtDateShort(dt){
  if(!dt) return "미정";
  const y = dt.getFullYear();
  const m = String(dt.getMonth()+1).padStart(2,"0");
  const d = String(dt.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}
function ddayText(dt){
  if(!dt) return { label:"미정", cls:"" };
  const today = new Date();
  const a = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const b = new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
  const diff = Math.round((b - a) / (1000*60*60*24));
  if(diff === 0) return { label:"D-Day", cls:"good" };
  if(diff > 0) return { label:`D-${diff}`, cls:"" };
  return { label:`D+${Math.abs(diff)}`, cls:"bad" };
}
async function sha256Hex(text){
  try{
    const enc = new TextEncoder().encode(text);
    const buf = await crypto.subtle.digest("SHA-256", enc);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }catch{ return ""; }
}
function splitCSVLine(line){
  const out = [];
  let cur = "";
  let inQuotes = false;
  for(let i=0;i<line.length;i++){
    const ch = line[i];
    if(ch === '"'){
      if(inQuotes && line[i+1] === '"'){ cur += '"'; i++; }
      else inQuotes = !inQuotes;
    }else if(ch === "," && !inQuotes){
      out.push(cur); cur = "";
    }else{
      cur += ch;
    }
  }
  out.push(cur);
  return out;
}
function parseCSV(text){
  const lines = text.split("\n")
    .map(l => l.replace(/\r/g,""))
    .filter(l => l.trim() !== "");
  return lines.map(splitCSVLine).map(cols => cols.map(clean));
}
function csvToSheet(rows){
  const header = rows[0] || [];
  const body = rows.slice(1).filter(r => r && r.length && clean(r[0]) !== "");
  return { header, body };
}
function mapById(rows){
  const m = new Map();
  for(const r of rows){
    const id = clean(r[0]).toUpperCase();
    if(id) m.set(id, r);
  }
  return m;
}
function extractMetricsFromRow(header, row, startIdx, fallbackNames){
  const out = [];
  for(let i=startIdx;i<row.length;i++){
    const rawName = clean(header[i]);
    const name = rawName || fallbackNames[i - startIdx] || `항목${i - startIdx + 1}`;
    const val = toScore(row[i]);
    if(val == null) continue;
    out.push({ name, value: val });
  }
  return out;
}

function renderScorePanel(title, metrics, toneClass, toneIcon){

function renderPoomsaeGoalPanel(target, rate){

/* =========================================================
   ✅ Cache
========================================================= */
function readCache(){
  try{
    const raw = localStorage.getItem(CACHE_KEY);
    if(!raw) return null;
    const obj = JSON.parse(raw);
    if(!obj || !obj.savedAt || !obj.db) return null;
    if(Date.now() - obj.savedAt > CACHE_TTL_MS) return null;
    return obj;
  }catch{ return null; }
}
function writeCache(db, savedAt){
  try{ localStorage.setItem(CACHE_KEY, JSON.stringify({ savedAt: savedAt || Date.now(), db })); }catch{}
}
function clearCache(){
  try{ localStorage.removeItem(CACHE_KEY); }catch{}
}

/* =========================================================
   ✅ Fetch
========================================================= */
async function fetchWithTimeout(url, ms){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), ms);
  try{
    const res = await fetch(url, { signal: ctrl.signal, cache: "no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status);
    return await res.text();
  }finally{
    clearTimeout(t);
  }
}
async function fetchCSVText(url){
  try{
    return await fetchWithTimeout(url, FETCH_TIMEOUT_MS);
  }catch(e1){
    const proxied = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
    return await fetchWithTimeout(proxied, FETCH_TIMEOUT_MS);
  }
}
function setStatus(type, pillText, msg){
  if(type === "good") dataPill.className = "pill good";
  else if(type === "bad") dataPill.className = "pill bad";
  else dataPill.className = "pill";
  dataPill.textContent = "데이터: " + pillText;
  statusText.textContent = msg || "";
}
function setTimePill(){
  if(!LAST_LOADED_AT){
    timePill.style.display = "none";
    return;
  }
  timePill.style.display = "inline-flex";
  const src = LAST_SOURCE === "cache" ? "캐시" : "최신";
  timePill.textContent = `업데이트: ${fmtTime(LAST_LOADED_AT)} · ${src}`;
}
function setMergePill(mainCount, pCount, dCount, tCount){
  mergePill.style.display = "inline-flex";
  mergePill.textContent = `연결: 기본 ${mainCount} · 인성 ${pCount} · 생활 ${dCount} · 수련 ${tCount}`;
}

async function loadOnce({force=false}={}){
  if(DB && !force) return DB;

  if(!force){
    const cached = readCache();
    if(cached){
      DB = cached.db;
      LAST_LOADED_AT = new Date(cached.savedAt);
      LAST_SOURCE = "cache";
      setStatus("good", `준비(${DB.mainRows.length}명)`, "");
      setTimePill();
      setMergePill(DB.mainRows.length, DB.personalityRows.length, DB.dojoRows.length, DB.trainingRows.length);
      return DB;
    }
  }

  if(LOADING_PROMISE) return LOADING_PROMISE;

  setStatus("loading", "불러오는 중", "");
  timePill.style.display = "none";
  mergePill.style.display = "none";

  LOADING_PROMISE = (async ()=>{
    let lastErr = null;

    for(let i=0;i<=RETRY_COUNT;i++){
      try{
        const [mainText, pText, dText, tText] = await Promise.all([
          fetchCSVText(RAW_CSV_MAIN),
          fetchCSVText(RAW_CSV_PERSONALITY),
          fetchCSVText(RAW_CSV_DOJO),
          fetchCSVText(RAW_CSV_TRAINING)
        ]);

        const mainSheet = csvToSheet(parseCSV(mainText));
        const pSheet = csvToSheet(parseCSV(pText));
        const dSheet = csvToSheet(parseCSV(dText));
        const tSheet = csvToSheet(parseCSV(tText));

        DB = {
          mainHeader: mainSheet.header,
          mainRows: mainSheet.body,
          personalityHeader: pSheet.header,
          personalityRows: pSheet.body,
          dojoHeader: dSheet.header,
          dojoRows: dSheet.body,
          trainingHeader: tSheet.header,
          trainingRows: tSheet.body,
          pMap: mapById(pSheet.body),
          dMap: mapById(dSheet.body),
          tMap: mapById(tSheet.body)
        };

        LAST_LOADED_AT = new Date();
        LAST_SOURCE = "network";
        writeCache(DB, Date.now());

        setStatus("good", `준비(${DB.mainRows.length}명)`, "");
        setTimePill();
        setMergePill(DB.mainRows.length, DB.personalityRows.length, DB.dojoRows.length, DB.trainingRows.length);
        return DB;
      }catch(err){
        lastErr = err;
        setStatus("loading", "재시도", "");
        await new Promise(r => setTimeout(r, 500 * (i+1)));
      }
    }
    throw lastErr;
  })();

  try{ return await LOADING_PROMISE; }
  finally{ LOADING_PROMISE = null; }
}

/* =========================================================
   ✅ Merge row
========================================================= */
function mergedStudent(mainRow){
  const id = clean(mainRow[0]).toUpperCase();
  const pRow = DB.pMap.get(id) || [];
  const dRow = DB.dMap.get(id) || [];
  const tRow = DB.tMap.get(id) || [];

  const personalityMetrics = extractMetricsFromRow(
    DB.personalityHeader,
    pRow,
    2,
    ["예의","질서","배려","책임감","협동심","집중력","도전정신","리더십"]
  );

  const dojoMetrics = extractMetricsFromRow(
    DB.dojoHeader,
    dRow,
    2,
    ["출석","정리정돈","친구관계","수업태도","지도집중","규칙준수"]
  );

  /* =========================================
     TRAINING 새 구조 반영
     C(2): 기본동작
     D(3): 이번달 목표 품새
     E(4): 달성률(%)
     F(5): 겨루기
     G(6): 체력
     H(7): 호신술
     I(8): 태권검도
     J(9): DOUBLECROSS
     K(10): 줄넘기
  ========================================= */
  const trainingMetrics = [];

  const pushMetric = (name, raw) => {
    const val = toScore(raw);
    if(val == null) return;
    trainingMetrics.push({ name, value: val });
  };

  pushMetric(clean(DB.trainingHeader[2]) || "기본동작", tRow[2]);
  pushMetric(clean(DB.trainingHeader[5]) || "겨루기", tRow[5]);
  pushMetric(clean(DB.trainingHeader[6]) || "체력", tRow[6]);
  pushMetric(clean(DB.trainingHeader[7]) || "호신술", tRow[7]);
  pushMetric(clean(DB.trainingHeader[8]) || "태권검도", tRow[8]);
  pushMetric(clean(DB.trainingHeader[9]) || "DOUBLECROSS", tRow[9]);
  pushMetric(clean(DB.trainingHeader[10]) || "줄넘기", tRow[10]);

  const poomsaeTarget = clean(tRow[3]);
  const poomsaeRate = toScore(tRow[4]);

  return {
    id,
    name: clean(mainRow[1]),
    birth: clean(mainRow[2]),
    tkd: clean(mainRow[3]),
    ipma: clean(mainRow[4]),
    tkkd: clean(mainRow[5]),
    photo: clean(mainRow[6]),
    points: toPointNumber(mainRow[7]),
    awards: clean(mainRow[8]),
    cert: clean(mainRow[9]),
    nextTkd: clean(mainRow[10]),
    nextIpma: clean(mainRow[11]),
    nextTkkd: clean(mainRow[12]),
    totalDan: clean(mainRow[13]),
    rankScore: clean(mainRow[14]),

    personalityMetrics,
    dojoMetrics,
    trainingMetrics,

    poomsaeTarget,
    poomsaeRate,

    personalityAvg: avgOf(personalityMetrics.map(x => x.value)),
    dojoAvg: avgOf(dojoMetrics.map(x => x.value)),
    trainingAvg: avgOf(trainingMetrics.map(x => x.value)),
    coachComment: clean(pRow[10]) || clean(pRow[pRow.length - 1]) || ""
  };
}

/* =========================================================
   ✅ Match/search
========================================================= */
function matchRows(qNameOrId, qBirth){
  const q1 = norm(qNameOrId);
  const qb = normBirth(qBirth);
  const adminOn = isAdmin();

  if(!q1) return [];
  if(!adminOn && !qb) return [];

  const out = [];
  for(const r of DB.mainRows){
    const name = norm(r[1]);
    const birth = normBirth(r[2]);
    const okName = (name && name === q1) || (name && name.includes(q1));
    const okBirth = qb ? (birth && birth === qb) : true;
    if(okName && okBirth) out.push(r);
  }
  out.sort((a,b)=> String(a[1]||"").localeCompare(String(b[1]||"")));
  return out;
}

   ✅ Ranking
========================================================= */
function hideRanking(){
  const sec = $("rankSection");
  if(sec) sec.style.display = "none";
}
function showRanking(){
  const sec = $("rankSection");
  if(sec) sec.style.display = "block";
}
function buildTopRanking(){
  const list = [];
  for(const r of DB.mainRows){
    const id = clean(r[0]);
    const name = clean(r[1]);
    const pts = toPointNumber(r[7]);
    if(!id || !name) continue;
    if(pts <= 0) continue;
    list.push({ id, name, pts });
  }
  list.sort((a,b)=> (b.pts - a.pts) || a.name.localeCompare(b.name) || a.id.localeCompare(b.id));
  return list.slice(0, 10);
}
function renderRanking(){
  const section = $("rankSection");
  const ul = $("rankList");
  const vp = $("rankViewport");
  if(!section || !ul || !vp) return;

  const top = buildTopRanking();
  if(top.length === 0){
    hideRanking();
    return;
  }

  ul.innerHTML = top.map((x, i)=>{
    const rank = i+1;
    const cls = rank===1 ? "top1" : rank===2 ? "top2" : rank===3 ? "top3" : "";
    return `
      <li class="rankItem ${cls}">
        <div class="rankLeft">
          <div class="rankNo">${rank}</div>
          <div style="min-width:0">
            <div class="rankName">${rankMedal(rank)} ${escapeHtml(x.name)} <span class="rankMeta">(${escapeHtml(x.id)})</span></div>
          </div>
        </div>
        <div class="rankPts">${Number(x.pts).toLocaleString()}P</div>
      </li>
    `;
  }).join("");

  showRanking();
  applyRankingTicker(vp, ul, 24);
}
function applyRankingTicker(viewportEl, ulEl, speedPxPerSec=24){
  if(viewportEl.getAttribute("data-ticker") === "1") return;

  requestAnimationFrame(()=>{
    const dist = ulEl.scrollHeight + 10;
    if(dist < 80) return;

    const clone = ulEl.cloneNode(true);
    clone.setAttribute("aria-hidden","true");
    viewportEl.appendChild(clone);

    const duration = Math.max(8, dist / speedPxPerSec);
    const animName = "rk_" + Math.random().toString(16).slice(2);

    const style = document.createElement("style");
    style.textContent = `
      @keyframes ${animName}{
        0%{ transform: translateY(0); }
        100%{ transform: translateY(-${dist}px); }
      }
      #${viewportEl.id} > ul{
        animation: ${animName} ${duration}s linear infinite;
      }
    `;
    document.head.appendChild(style);
    viewportEl.setAttribute("data-ticker","1");
  });
}

async function applyHashToCurrentCard(){
  const card = resultEl.querySelector(".card");
  if(!card) return;
  const out = card.querySelector("#hashOut");
  if(!out) return;
  const src = card.getAttribute("data-hash-source") || "";
  out.textContent = "생성중…";
  const hex = await sha256Hex(src);
  out.textContent = hex ? `${hex.slice(0,8)}-${hex.slice(8,16)}-${hex.slice(16,24)}-${hex.slice(24,32)}…` : "지원되지 않음";
}

async function runSearch(){
  const q1 = $("qNameOrId").value;
  const qb = $("qBirth").value;
  const adminOn = isAdmin();

  resultEl.innerHTML = "";

  if(!clean(q1) || (!adminOn && !clean(qb))){
    resultEl.innerHTML = adminOn
      ? `<div class="message">이름을 입력해주세요.</div>`
      : `<div class="message">이름과 생년월일을 모두 입력해주세요.</div>`;
    return;
  }

  try{
    await loadOnce({force:false});
  }catch(e){
    console.error(e);
    setStatus("bad", "오류", "");
    resultEl.innerHTML = `<div class="message">데이터를 불러오지 못했습니다.<br/>상단의 <b>데이터 새로고침</b>을 눌러 다시 시도해주세요.</div>`;
    return;
  }

  const rows = matchRows(q1, qb);

  if(rows.length === 0){
    resultEl.innerHTML = `<div class="message">조회 결과가 없습니다.</div>`;
    return;
  }

  hideRanking();

  if(rows.length === 1){
    resultEl.innerHTML = renderCard(rows[0]);
    await applyHashToCurrentCard();
    bindReSearchButton();
    return;
  }

  resultEl.innerHTML = renderPickList(rows);
  const pickList = $("pickList");
  if(pickList){
    pickList.addEventListener("click", async (e)=>{
      const el = e.target.closest(".pick");
      if(!el) return;
      const idx = Number(el.getAttribute("data-idx"));
      const chosen = rows[idx];
      if(chosen){
        resultEl.innerHTML = renderCard(chosen);
        await applyHashToCurrentCard();
        bindReSearchButton();
      }
    });
  }
}

function bindClear(inputId, btnId){
  const input = $(inputId);
  const btn = $(btnId);

  function sync(){ btn.style.display = input.value ? "inline-flex" : "none"; }
  input.addEventListener("input", sync);
  btn.addEventListener("click", ()=>{
    input.value = "";
    input.focus();
    sync();
  });
  sync();
}
