<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>수련생 조회 | 계명태권도</title>
<meta name="description" content="계명태권도 수련생 조회. 이름/아이디 + 생년월일로 안전하게 조회합니다." />
<meta name="theme-color" content="#0b0f19" />

<!-- OG -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="계명태권도" />
<meta property="og:title" content="수련생 조회 | 계명태권도" />
<meta property="og:description" content="이름/아이디 + 생년월일로 안전하게 조회합니다." />
<meta property="og:image" content="" />

<style>
  :root{
    --bg:#0b0f19;
    --card:#111827;
    --line:rgba(255,255,255,.10);
    --text:#ffffff;
    --muted:rgba(255,255,255,.72);
    --gold:#f6c945;
    --blue:#60a5fa;
    --green:#34d399;
    --danger:#ff6363;
  }
  *{box-sizing:border-box}
  body{
    margin:0; padding:18px 16px 28px;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", Arial, sans-serif;
    background: radial-gradient(900px 600px at 50% 0%, rgba(246,201,69,.12), transparent 55%),
                radial-gradient(900px 600px at 10% 20%, rgba(59,130,246,.10), transparent 55%),
                var(--bg);
    color:var(--text);
  }
  a{color:inherit;text-decoration:none}

  /* ✅ 상단 바(홈 바로가기) */
  .nav{
    max-width:860px;
    margin:0 auto 10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
  }
  .nav .left{
    display:flex;align-items:center;gap:10px;min-width:0;
  }
  .brand{
    font-weight:950;
    letter-spacing:-.3px;
    font-size:14px;
    color:rgba(255,255,255,.92);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .homeBtn{
    display:inline-flex;align-items:center;gap:8px;
    padding:10px 12px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.06);
    font-weight:950;
    font-size:13px;
  }
  .homeBtn:active{transform:translateY(1px)}

  h1{
    text-align:center;
    margin:6px 0 12px;
    letter-spacing:-.6px;
    font-size:34px;
    font-weight:950;
  }

  .wrap{ max-width:860px; margin:0 auto; }

  /* 상태/버튼 바 */
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:12px;
  }
  .status{
    font-size:12px;
    color:rgba(255,255,255,.80);
    display:flex;
    align-items:center;
    gap:8px;
    min-height:20px;
    flex-wrap:wrap;
  }
  .pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:6px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.05);
    color:rgba(255,255,255,.88);
    font-weight:950;
  }
  .pill.good{ border-color: rgba(246,201,69,.35); background: rgba(246,201,69,.10); }
  .pill.bad{ border-color: rgba(255,99,99,.35); background: rgba(255,99,99,.10); }
  .pill.blue{ border-color: rgba(96,165,250,.35); background: rgba(96,165,250,.12); }
  .pill.green{ border-color: rgba(52,211,153,.35); background: rgba(52,211,153,.12); }

  .actions{ display:flex; gap:8px; flex-wrap:wrap; }
  .miniBtn{
    padding:9px 10px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.05);
    color:rgba(255,255,255,.92);
    font-weight:950;
    font-size:12px;
    cursor:pointer;
  }
  .miniBtn:active{transform:translateY(1px)}
  .miniBtn.gold{
    border-color: rgba(246,201,69,.35);
    background: rgba(246,201,69,.14);
  }

  /* ✅ 입력 UI */
  .form{
    display:grid;
    grid-template-columns: 1fr;
    gap:10px;
    margin:0 auto 12px;
  }
  @media (min-width:720px){
    .form{
      grid-template-columns: 1.2fr 1fr auto;
      align-items:end;
      gap:10px;
    }
  }
  .field{
    background: rgba(255,255,255,.04);
    border:1px solid var(--line);
    border-radius:14px;
    padding:10px 12px;
  }
  .label{
    font-size:12px;
    color: rgba(255,255,255,.78);
    font-weight:900;
    margin-bottom:8px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .req{
    font-size:11px;
    color: rgba(246,201,69,.90);
    border:1px solid rgba(246,201,69,.35);
    background: rgba(246,201,69,.10);
    padding:3px 8px;
    border-radius:999px;
    font-weight:950;
    white-space:nowrap;
  }

  .inputWrap{
    position:relative;
    display:flex;
    align-items:center;
    gap:8px;
  }
  input{
    width:100%;
    padding:12px 40px 12px 12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.10);
    background:rgba(0,0,0,.18);
    color:var(--text);
    font-size:16px;
    outline:none;
  }
  input:focus{
    border-color:rgba(246,201,69,.55);
    box-shadow:0 0 0 3px rgba(246,201,69,.15);
  }
  .clearBtn{
    position:absolute;
    right:10px;
    width:28px;height:28px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.08);
    color:rgba(255,255,255,.92);
    font-weight:950;
    cursor:pointer;
    display:none;
    align-items:center;
    justify-content:center;
  }
  .clearBtn:active{transform:translateY(1px)}
  .help{
    margin-top:8px;
    font-size:12px;
    color:rgba(255,255,255,.70);
    line-height:1.45;
  }

  .cta{ display:flex; gap:10px; align-items:center; justify-content:stretch; }
  button.big{
    width:100%;
    padding:14px 16px;
    border:0;
    border-radius:14px;
    background:var(--gold);
    color:#111;
    font-weight:950;
    cursor:pointer;
    min-width:120px;
    font-size:15px;
  }
  button.big:active{transform:translateY(1px)}
  .note{
    margin-top:10px;
    font-size:12px;
    color:rgba(255,255,255,.70);
    line-height:1.5;
    text-align:center;
  }

  /* 결과 */
  #result{margin-top:10px}
  .message{
    text-align:center;
    margin-top:14px;
    color:var(--muted);
    line-height:1.5;
  }

  /* ✅ 카드 */
  .card{
    background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
    border:1px solid var(--line);
    border-radius:20px;
    padding:16px;
    max-width:760px;
    margin:14px auto 0;
    box-shadow: 0 14px 30px rgba(0,0,0,.35);
    overflow:hidden;
    position:relative;
  }
  .card::before{
    content:"";
    position:absolute; inset:-2px;
    background: radial-gradient(700px 260px at 20% 0%, rgba(246,201,69,.16), transparent 55%),
                radial-gradient(700px 260px at 80% 0%, rgba(96,165,250,.14), transparent 55%);
    opacity:.9;
    pointer-events:none;
  }
  .card > *{ position:relative; }

  /* ✅ 상단 */
  .hero{
    display:flex;
    gap:14px;
    align-items:center;
    flex-wrap:wrap;
  }
  .photo{
    width:120px;height:120px;border-radius:18px;
    background: rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.12);
    overflow:hidden;
    flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    color:rgba(255,255,255,.55);
    font-weight:950;
  }
  .photo img{ width:100%; height:100%; object-fit:cover; display:block; }
  .headline{ min-width:220px; flex:1; }
  .headline h2{
    margin:0 0 6px;
    font-size:24px;
    font-weight:950;
    letter-spacing:-.3px;
  }
  .sub{
    margin:0;
    color:rgba(255,255,255,.78);
    font-size:13px;
    line-height:1.35;
  }

  /* ✅ 포인트 결과 박스 */
  .pointBox{
    flex:0 0 auto;
    min-width:240px;
    border-radius:18px;
    border:1px solid rgba(246,201,69,.35);
    background: linear-gradient(180deg, rgba(246,201,69,.20), rgba(246,201,69,.08));
    padding:12px 14px;
    box-shadow: 0 10px 22px rgba(0,0,0,.25);
  }
  .pointTop{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .pointLabel{
    font-size:12px;
    font-weight:950;
    color: rgba(255,255,255,.90);
  }
  .tierBadge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:6px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.20);
    background: rgba(0,0,0,.18);
    font-size:12px;
    font-weight:1000;
    color: rgba(255,255,255,.92);
    white-space:nowrap;
  }
  .tierBadge.bronze{ border-color: rgba(205,127,50,.35); background: rgba(205,127,50,.14); }
  .tierBadge.silver{ border-color: rgba(192,192,192,.35); background: rgba(192,192,192,.14); }
  .tierBadge.gold{ border-color: rgba(246,201,69,.55); background: rgba(246,201,69,.18); }
  .tierBadge.dia{ border-color: rgba(96,165,250,.55); background: rgba(96,165,250,.18); }

  .pointValue{
    margin-top:8px;
    font-size:34px;
    font-weight:1000;
    letter-spacing:-.6px;
    color:#111;
    background: rgba(255,255,255,.82);
    display:inline-block;
    padding:4px 10px;
    border-radius:14px;
  }
  .pointUnit{
    font-size:12px;
    font-weight:950;
    color: rgba(17,17,17,.86);
    margin-left:6px;
  }

  /* ✅ 진행률 바 */
  .progressWrap{
    margin-top:10px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.18);
    background: rgba(0,0,0,.16);
    padding:10px;
  }
  .progressTop{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    font-size:12px;
    font-weight:950;
    color: rgba(255,255,255,.88);
  }
  .bar{
    margin-top:8px;
    height:12px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.16);
    background: rgba(255,255,255,.10);
    overflow:hidden;
  }
  .bar > i{
    display:block;
    height:100%;
    width:0%;
    background: rgba(246,201,69,.92);
    border-radius:999px;
  }
  .progressHint{
    margin-top:8px;
    font-size:12px;
    color: rgba(255,255,255,.78);
    line-height:1.35;
  }

  .badges{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:10px;
  }
  .badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 10px;
    border-radius:999px;
    border:1px solid rgba(246,201,69,.35);
    background: rgba(246,201,69,.10);
    color: rgba(255,255,255,.92);
    font-size:12px;
    font-weight:950;
  }
  .badge.green{ border-color: rgba(52,211,153,.35); background: rgba(52,211,153,.12); }
  .badge.blue{ border-color: rgba(96,165,250,.35); background: rgba(96,165,250,.12); }

  .hashLine{
    margin-top:10px;
    padding:10px 12px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.18);
    font-size:12px;
    color: rgba(255,255,255,.82);
    word-break:break-all;
  }
  .hashLine b{ color: rgba(255,255,255,.95); }

  .sectionTitle{
    margin:14px 0 8px;
    font-weight:950;
    letter-spacing:-.2px;
    color: rgba(255,255,255,.92);
    font-size:13px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .sectionTitle .hint{
    font-size:12px;
    color: rgba(255,255,255,.66);
    font-weight:900;
  }

  .grid2{
    display:grid;
    grid-template-columns: 1fr;
    gap:10px;
  }
  @media (min-width:720px){
    .grid2{ grid-template-columns: 1fr 1fr; }
  }
  .panel{
    border-radius:18px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(17,24,39,.55);
    padding:12px;
  }
  .row{
    display:flex;
    justify-content:space-between;
    gap:12px;
    padding:10px 10px;
    border-radius:14px;
    background: rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.06);
    font-size:14px;
  }
  .row + .row{ margin-top:8px; }
  .rlabel{color:rgba(255,255,255,.70);font-weight:900}
  .rval{color:#fff;font-weight:950;text-align:right; word-break:break-word;}

  /* ✅ 심사 D-Day */
  .examItem{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    padding:10px 10px;
    border-radius:14px;
    background: rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.06);
    margin-top:8px;
  }
  .examLeft{ min-width:0; }
  .examName{ font-weight:950; font-size:13px; letter-spacing:-.2px; }
  .examDate{ margin-top:3px; font-size:12px; color: rgba(255,255,255,.72); }
  .dday{
    flex:0 0 auto;
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:7px 10px;
    border-radius:999px;
    border:1px solid rgba(96,165,250,.30);
    background: rgba(96,165,250,.12);
    font-weight:950;
    font-size:12px;
    white-space:nowrap;
  }
  .dday.good{ border-color: rgba(52,211,153,.35); background: rgba(52,211,153,.12); }
  .dday.bad{ border-color: rgba(255,99,99,.35); background: rgba(255,99,99,.12); }

  /* ✅ 하단 버튼 */
  .bottomActions{
    margin-top:14px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:space-between;
  }
  .actionBtn{
    flex:1 1 180px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:12px 12px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.06);
    font-weight:950;
    cursor:pointer;
  }
  .actionBtn.gold{
    border-color: rgba(246,201,69,.35);
    background: rgba(246,201,69,.14);
    color: rgba(255,255,255,.95);
  }
  .actionBtn:active{ transform: translateY(1px); }

  /* ✅ 동명이인 리스트 */
  .list{
    max-width:760px;
    margin:14px auto 0;
    display:grid;
    gap:10px;
  }
  .pick{
    border-radius:18px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(255,255,255,.04);
    padding:12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    cursor:pointer;
    transition: transform .10s ease, border-color .15s ease;
  }
  .pick:hover{ transform: translateY(-1px); border-color: rgba(246,201,69,.35); }
  .pick:active{ transform: translateY(0); }
  .pLeft{ display:flex; align-items:center; gap:12px; min-width:0; }
  .thumb{
    width:54px; height:54px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(255,255,255,.06);
    overflow:hidden;
    flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    color:rgba(255,255,255,.55);
    font-weight:950;
    font-size:12px;
  }
  .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .pInfo{ min-width:0; }
  .pName{ font-weight:950; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pMeta{ font-size:12px; color: rgba(255,255,255,.72); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pMeta b{ color: rgba(246,201,69,.95); font-weight:1000; }

  .pRight{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:8px;
    flex:0 0 auto;
  }

  /* ✅ "데이터: 준비(60명)" 뱃지 숨김 (기능은 유지) */
  #dataPill{ display:none !important; }

  /* ==============================
     ✅ 랭킹 UI (TOP10) - 추가됨
  ============================== */
  .rankWrap{
    margin: 10px auto 12px;
    padding: 14px;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 18px;
    background: linear-gradient(180deg, rgba(17,24,39,.78), rgba(11,15,25,.86));
    box-shadow: 0 14px 30px rgba(0,0,0,.28);
    overflow:hidden;
  }
  .rankHead{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;margin-bottom:10px}
  .rankTitle{font-weight:1000;letter-spacing:-.3px;font-size:16px}
  .rankSub{opacity:.75;font-size:12px}

  .rankCard{
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 16px;
    background: rgba(0,0,0,.18);
    overflow:hidden;
  }

  .rankViewport{
    position:relative;
    overflow:hidden;
    height: 260px; /* TOP10 롤링 높이 */
  }

  .rankList{
    list-style:none;
    margin:0;
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:8px;
    will-change: transform;
  }

  .rankItem{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:11px 12px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(255,255,255,.04);
  }
  .rankLeft{display:flex;align-items:center;gap:10px;min-width:0}
  .rankNo{
    width:30px;height:30px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-weight:1000;font-size:12px;
    background: rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    flex:0 0 auto;
  }
  .rankName{
    font-weight:1000;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .rankMeta{font-size:12px; opacity:.75}
  .rankPts{
    font-weight:1000;
    padding:7px 10px;
    border-radius:999px;
    border:1px solid rgba(246,201,69,.25);
    background: rgba(246,201,69,.10);
    white-space:nowrap;
  }

  /* TOP 1~3 특별효과 */
  .rankItem.top1{
    border-color: rgba(246,201,69,.45);
    background: linear-gradient(90deg, rgba(246,201,69,.20), rgba(255,255,255,.05));
    box-shadow: 0 10px 22px rgba(246,201,69,.10);
    position:relative;
    overflow:hidden;
  }
  .rankItem.top1::after{
    content:"";
    position:absolute; inset:-40%;
    background: linear-gradient(120deg, transparent 40%, rgba(255,255,255,.28), transparent 60%);
    transform: translateX(-60%) rotate(12deg);
    animation: shine 2.6s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes shine{
    0%{ transform: translateX(-70%) rotate(12deg); opacity:.0; }
    15%{ opacity:.6; }
    55%{ opacity:.25; }
    100%{ transform: translateX(70%) rotate(12deg); opacity:0; }
  }
  .rankItem.top2{
    border-color: rgba(192,192,192,.40);
    background: linear-gradient(90deg, rgba(192,192,192,.16), rgba(255,255,255,.04));
  }
  .rankItem.top3{
    border-color: rgba(205,127,50,.40);
    background: linear-gradient(90deg, rgba(205,127,50,.16), rgba(255,255,255,.04));
  }

  /* 롤링: 마우스 올리면 멈춤 */
  .rankViewport:hover > ul{ animation-play-state: paused !important; }
</style>
</head>

<body>

  <div class="nav">
    <div class="left">
      <a class="homeBtn" id="homeBtn" href="../index.html">🏠 홈 바로가기</a>
      <div class="brand">계명태권도 · 수련생 조회</div>
    </div>
  </div>

  <h1>수련생 조회</h1>

  <div class="wrap">

    <div class="topbar">
      <div class="status">
        <span class="pill" id="dataPill">데이터: 준비중</span>
        <span class="pill blue" id="timePill" style="display:none;"></span>
        <span class="pill green" id="adminPill" style="display:none;">👑 관리자 모드</span>
        <span id="statusText">페이지가 열리면 자동으로 1회 불러옵니다.</span>
      </div>
      <div class="actions">

/* =========================================================
  ✅ Cache/Retry/Timeout
========================================================= */
const CACHE_KEY = "KMT_STUDENTS_CACHE_V4";
const CACHE_TTL_MS = 10 * 60 * 1000;     // 10분
const FETCH_TIMEOUT_MS = 8000;           // 8초
const RETRY_COUNT = 2;                   // 총 3회 시도

const timePill = $("timePill");

let DATA_ROWS = null;
let LOADING_PROMISE = null;
let LAST_LOADED_AT = null;
let LAST_SOURCE = null;

/* ---------- utils ---------- */
function clean(v){
  return (v ?? "")
    .toString()
    .replace(/^\uFEFF/, "")
    .replace(/\r/g, "")
    .replace(/^"|"$/g, "")
    .trim();
}
function norm(v){
  return clean(v).replace(/\s+/g,"").toLowerCase();
}
function onlyDigits(v){
  return clean(v).replace(/[^\d]/g,"");
}
function normBirth(v){
  const d = onlyDigits(v);
  if(!d) return "";
  if(d.length === 6) return d;
  if(d.length === 8) return d.slice(2);
  return d;
}
function escapeHtml(str){
  return String(str ?? "").replace(/[&<>"']/g, s => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[s]));
}
function fmtTime(dt){
  try{
    const y = dt.getFullYear();
    const m = String(dt.getMonth()+1).padStart(2,"0");
    const d = String(dt.getDate()).padStart(2,"0");
    const hh = String(dt.getHours()).padStart(2,"0");
    const mm = String(dt.getMinutes()).padStart(2,"0");
    return `${y}-${m}-${d} ${hh}:${mm}`;
  }catch{ return ""; }
}

/* ✅ 포인트 숫자 안전 변환 */
function toPointNumber(v){
  const s = clean(v);
  if(!s) return 0;
  const digits = s.replace(/[^\d]/g,"");
  if(!digits) return 0;
  return Number(digits) || 0;
}
function pointDisplay(n){
  const num = Number(n || 0);
  return String(num);
}

/* ✅ 등급 계산 */
function tierOf(points){
  const p = Math.max(0, Number(points||0));
  for(const t of TIERS){
    if(p >= t.min && p <= t.max) return t;
  }
  return TIERS[0];
}

/* ✅ 목표 진행률 (3단계 목표용) */
function progressOf(points, goalPoints){
  const p = Math.max(0, Number(points||0));
  const goal = Math.max(1, Number(goalPoints||1));
  const pct = Math.max(0, Math.min(100, Math.round((p/goal)*100)));
  const remain = Math.max(0, goal - p);
  const done = p >= goal;
  return { goal, pct, remain, done, p };
}

function parseDateAny(v){
  const s = clean(v);
  if(!s) return null;
  if(/미정/i.test(s)) return null;
  const digits = s.replace(/[^\d]/g,"");
  if(digits.length === 8){
    const y = Number(digits.slice(0,4));
    const m = Number(digits.slice(4,6));
    const d = Number(digits.slice(6,8));
    if(!y || !m || !d) return null;
    return new Date(y, m-1, d);
  }
  const m = s.match(/^(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})$/);
  if(m){
    const y = Number(m[1]);
    const mm = Number(m[2]);
    const dd = Number(m[3]);
    return new Date(y, mm-1, dd);
  }
  return null;
}
function fmtDateShort(dt){
  if(!dt) return "미정";
  const y = dt.getFullYear();
  const m = String(dt.getMonth()+1).padStart(2,"0");
  const d = String(dt.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}
function ddayText(dt){
  if(!dt) return { label:"미정", cls:"" };
  const today = new Date();
  const a = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const b = new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
  const diff = Math.round((b - a) / (1000*60*60*24));
  if(diff === 0) return { label:"D-Day", cls:"good" };
  if(diff > 0) return { label:`D-${diff}`, cls:"" };
  return { label:`D+${Math.abs(diff)}`, cls:"bad" };
}

async function sha256Hex(text){
  try{
    const enc = new TextEncoder().encode(text);
    const buf = await crypto.subtle.digest("SHA-256", enc);
    const arr = Array.from(new Uint8Array(buf));
    return arr.map(b=>b.toString(16).padStart(2,"0")).join("");
  }catch{ return ""; }
}

/* =========================================================
  ✅ 랭킹 TOP10 (포인트 내림차순) + 롤링 - 추가됨
========================================================= */
const RANK_LIMIT = 10;

function hideRanking(){
  const sec = $("rankSection");
  if(sec) sec.style.display = "none";
}
function showRanking(){
  const sec = $("rankSection");
  if(sec) sec.style.display = "block";
}

function buildTopRanking(){
  if(!Array.isArray(DATA_ROWS)) return [];
  const list = [];

  for(const r of DATA_ROWS){
    const id = clean(r[0]);
    const name = clean(r[1]);
    const pts = toPointNumber(r[7]);
    if(!id || !name) continue;
    if(pts <= 0) continue; // 0점도 포함하고 싶으면 이 줄 삭제
    list.push({ id, name, pts });
  }

  list.sort((a,b)=> (b.pts - a.pts) || a.name.localeCompare(b.name) || a.id.localeCompare(b.id));
  return list.slice(0, RANK_LIMIT);
}

function rankMedal(rank){
  if(rank === 1) return "👑🥇";
  if(rank === 2) return "🥈";
  if(rank === 3) return "🥉";
  return "✨";
}

function renderRanking(){
  const section = $("rankSection");
  const ul = $("rankList");
  const vp = $("rankViewport");
  if(!section || !ul || !vp) return;

  const top = buildTopRanking();
  if(top.length === 0){
    hideRanking();
    return;
  }

  ul.innerHTML = top.map((x, i)=>{
    const rank = i+1;
    const cls = rank===1 ? "top1" : rank===2 ? "top2" : rank===3 ? "top3" : "";
    return `
      <li class="rankItem ${cls}">
        <div class="rankLeft">
          <div class="rankNo">${rank}</div>
          <div style="min-width:0">
            <div class="rankName">${rankMedal(rank)} ${escapeHtml(x.name)} <span class="rankMeta">(${escapeHtml(x.id.toUpperCase())})</span></div>
            <div class="rankMeta">누적 포인트</div>
          </div>
        </div>
        <div class="rankPts">${Number(x.pts).toLocaleString()}P</div>
      </li>
    `;
  }).join("");

  showRanking();
  applyRankingTicker(vp, ul, 24);
}

function applyRankingTicker(viewportEl, ulEl, speedPxPerSec=24){
  // 중복 방지
  if(viewportEl.getAttribute("data-ticker") === "1") return;

  requestAnimationFrame(()=>{
    const dist = ulEl.scrollHeight + 10;
    if(dist < 80) return;

    // clone
    const clone = ulEl.cloneNode(true);
    clone.setAttribute("aria-hidden","true");
    viewportEl.appendChild(clone);

    const duration = Math.max(8, dist / speedPxPerSec);
    const animName = "rk_" + Math.random().toString(16).slice(2);

    const style = document.createElement("style");
    style.textContent = `
      @keyframes ${animName}{
        0%{ transform: translateY(0); }
        100%{ transform: translateY(-${dist}px); }
      }
      #${viewportEl.id} > ul{
        animation: ${animName} ${duration}s linear infinite;
      }
    `;
    document.head.appendChild(style);
    viewportEl.setAttribute("data-ticker","1");
  });
}

/* ---------- CSV parse ---------- */
function splitCSVLine(line){
  const out = [];
  let cur = "";
  let inQuotes = false;

  for(let i=0;i<line.length;i++){
    const ch = line[i];
    if(ch === '"'){
      if(inQuotes && line[i+1] === '"'){ cur += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if(ch === "," && !inQuotes){
      out.push(cur); cur = "";
    } else {
      cur += ch;
    }
  }
  out.push(cur);
  return out;
}
function parseCSV(text){
  const lines = text
    .split("\n")
    .map(l => l.replace(/\r/g,""))
    .filter(l => l.trim() !== "");

  const rows = lines
    .map(splitCSVLine)
    .map(cols => cols.map(clean));

  return rows;
}

/* ---------- cache ---------- */
function readCache(){
  try{
    const raw = localStorage.getItem(CACHE_KEY);
    if(!raw) return null;
    const obj = JSON.parse(raw);
    if(!obj || !obj.savedAt || !Array.isArray(obj.rows)) return null;
    if(Date.now() - obj.savedAt > CACHE_TTL_MS) return null;
    return obj;
  }catch{ return null; }
}
function writeCache(rows, savedAt){
  try{
    localStorage.setItem(CACHE_KEY, JSON.stringify({ savedAt: savedAt || Date.now(), rows }));
  }catch{}
}
function clearCache(){
  try{ localStorage.removeItem(CACHE_KEY); }catch{}
}

/* ---------- fetch with timeout ---------- */
async function fetchWithTimeout(url, ms){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), ms);
  try{
    const res = await fetch(url, { signal: ctrl.signal, cache: "no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status);
    return await res.text();
  }finally{
    clearTimeout(t);
  }
}
async function fetchCSVText(){
  try{
    return await fetchWithTimeout(RAW_CSV, FETCH_TIMEOUT_MS);
  }catch(e1){
    const proxied = "https://api.allorigins.win/raw?url=" + encodeURIComponent(RAW_CSV);
    return await fetchWithTimeout(proxied, FETCH_TIMEOUT_MS);
  }
}

/* ---------- status UI ---------- */
function setStatus(type, pillText, msg){
  if(type === "good") dataPill.className = "pill good";
  else if(type === "bad") dataPill.className = "pill bad";
  else dataPill.className = "pill";
  dataPill.textContent = "데이터: " + pillText;
  statusText.textContent = msg || "";
}
function setTimePill(){
  if(!LAST_LOADED_AT){
    timePill.style.display = "none";
    return;
  }
  timePill.style.display = "inline-flex";
  const src = LAST_SOURCE === "cache" ? "캐시" : "최신";
  timePill.textContent = `업데이트: ${fmtTime(LAST_LOADED_AT)} · ${src}`;
}

/* ---------- load once ---------- */
async function loadOnce({force=false}={}){
  if(DATA_ROWS && !force) return DATA_ROWS;

  if(!force){
    const cached = readCache();
    if(cached){
      DATA_ROWS = cached.rows;
      LAST_LOADED_AT = new Date(cached.savedAt);
      LAST_SOURCE = "cache";
      setStatus("good", `준비(${DATA_ROWS.length}명)`, `조회는 기기 안에서 즉시 처리됩니다`);
      setTimePill();
      return DATA_ROWS;
    }
  }

  if(LOADING_PROMISE) return LOADING_PROMISE;

  setStatus("loading", "불러오는 중", "데이터를 불러오는 중입니다…");
  timePill.style.display = "none";

  LOADING_PROMISE = (async ()=>{
    let lastErr = null;

    for(let i=0;i<=RETRY_COUNT;i++){
      try{
        const csvText = await fetchCSVText();
        const rows = parseCSV(csvText);
        const data = rows.slice(1).filter(r => r && r.length && clean(r[0]) !== "");

        DATA_ROWS = data;
        LAST_LOADED_AT = new Date();
        LAST_SOURCE = "network";
        writeCache(data, Date.now());

        setStatus("good", `준비(${DATA_ROWS.length}명)`, "조회는 기기 안에서 즉시 처리됩니다");
        setTimePill();
        return DATA_ROWS;
      }catch(err){
        lastErr = err;
        setStatus("loading", "재시도", `불러오기 실패… 재시도 중 (${i+1}/${RETRY_COUNT+1})`);
        await new Promise(r => setTimeout(r, 500 * (i+1)));
      }
    }
    throw lastErr;
  })();

  try{ return await LOADING_PROMISE; }
  finally{ LOADING_PROMISE = null; }
}

/* =========================================================
  ✅ Matching logic
========================================================= */
function matchRows(qNameOrId, qBirth){
  const q1 = norm(qNameOrId);
  const qb = normBirth(qBirth);
  const adminOn = isAdmin();

  if(!q1) return [];
  if(!adminOn && !qb) return [];

  const out = [];
  for(const r of DATA_ROWS){
    const id = norm(r[0]);
    const name = norm(r[1]);
    const birth = normBirth(r[2]);

    const okNameOrId =
      (id && id === q1) ||
      (name && name === q1) ||
      (name && name.includes(q1)) ||
      (id && id.includes(q1));

    const okBirth = qb ? (birth && birth === qb) : true;

    if(okNameOrId && okBirth) out.push(r);
  }

  out.sort((a,b)=> String(a[1]||"").localeCompare(String(b[1]||"")) || String(a[0]||"").localeCompare(String(b[0]||"")));
  return out;
}

function renderCard(row){
  const id = clean(row[0]);
  const name = clean(row[1]);
  const birth = clean(row[2]);

  const tkd = clean(row[3]);
  const ipma = clean(row[4]);
  const tkkd = clean(row[5]);
  const photo = clean(row[6]);

  const pointNum = toPointNumber(row[7]);
  const pointStr = pointDisplay(pointNum);

  const awards = clean(row[8]);
  const cert = clean(row[9]);

  const nextTkd = clean(row[10]);
  const nextIpma = clean(row[11]);
  const nextTkkd = clean(row[12]);

  const tier = tierOf(pointNum);

  // ✅ 3단계 목표 적용
  const goal = getGoalByKey(DEFAULT_GOAL_KEY);
  const prog = progressOf(pointNum, goal.points);

  const hashSource = `KMT|${id}|${name}|${normBirth(birth)}|${tkd}|${ipma}|${tkkd}|${pointStr}|${awards}|${cert}|${nextTkd}|${nextIpma}|${nextTkkd}`;

  const progressText = prog.done
    ? `🎉 ${escapeHtml(goal.name)} 달성! (목표 ${prog.goal}P)`
    : `${escapeHtml(goal.name)}까지 <b>${prog.remain}P</b> 남았어요 (목표 ${prog.goal}P)`;

  return `
    <div class="card" data-hash-source="${escapeHtml(hashSource)}">
      <div class="hero">
        <div class="photo">
          ${
            photo
              ? `<img src="${escapeHtml(photo)}"
                      alt="사진"
                      loading="lazy"
                      decoding="async"
                      referrerpolicy="no-referrer"
                      onerror="this.onerror=null;this.style.display='none';this.parentElement.textContent='NO PHOTO';" />`
              : `NO PHOTO`
          }
        </div>

        <div class="headline">
          <h2>${escapeHtml(name || "-")}</h2>
          <p class="sub">아이디: <b>${escapeHtml(id || "-")}</b> · 생년월일: <b>${escapeHtml(birth || "-")}</b></p>

          <div class="badges">
            <div class="badge green">✅ Verified Record</div>
            <div class="badge blue">🔒 조회 인증 코드 생성</div>
          </div>

          <div class="hashLine">
            Data Integrity Verified · SHA-256 :
            <b id="hashOut">생성중…</b>
          </div>
        </div>

        <div class="pointBox" aria-label="point-result" data-pct="${prog.pct}">
          <div class="pointTop">
            <div class="pointLabel">🏅 현재 포인트 · RESULT</div>
            <span class="tierBadge ${escapeHtml(tier.key)}">${escapeHtml(tier.icon)} ${escapeHtml(tier.name)}</span>
          </div>

          <div class="pointValue">${escapeHtml(pointStr)}<span class="pointUnit">P</span></div>

          <div class="progressWrap">
            <div class="progressTop">
              <span>🎯 ${escapeHtml(goal.name)} 진행률</span>
              <span>${prog.pct}%</span>
            </div>
            <div class="bar"><i style="width:${prog.pct}%"></i></div>
            <div class="progressHint">${progressText}</div>
          </div>
        </div>
      </div>

      <div class="sectionTitle">
        <span>기본 정보</span>
        <span class="hint">최소 정보만 표시</span>
      </div>

      <div class="grid2">
        <div class="panel">
          <div class="row"><span class="rlabel">현재 포인트</span><span class="rval">${escapeHtml(pointStr)}P</span></div>
          <div class="row"><span class="rlabel">등급</span><span class="rval">${escapeHtml(tier.icon)} ${escapeHtml(tier.name)}</span></div>
        </div>
        <div class="panel">
          <div class="row"><span class="rlabel">보유 인증서</span><span class="rval">${escapeHtml(cert || "-")}</span></div>
          <div class="row"><span class="rlabel">수상 기록</span><span class="rval">${escapeHtml(awards || "-")}</span></div>
        </div>
      </div>

      <div class="sectionTitle">
        <span>단증 / 심사</span>
        <span class="hint">태권도 · 경호무술 · 태권검도</span>
      </div>

      <div class="panel">
        <div class="row"><span class="rlabel">태권도 단증</span><span class="rval">${escapeHtml(tkd || "-")}</span></div>
        ${renderExam("태권도", nextTkd)}

        <div class="row" style="margin-top:10px;"><span class="rlabel">경호무술 단증</span><span class="rval">${escapeHtml(ipma || "-")}</span></div>
        ${renderExam("경호무술", nextIpma)}

        <div class="row" style="margin-top:10px;"><span class="rlabel">태권검도 단증</span><span class="rval">${escapeHtml(tkkd || "-")}</span></div>
        ${renderExam("태권검도", nextTkkd)}
      </div>

      <div class="bottomActions">
        <a class="actionBtn gold" href="${escapeHtml(galleryUrlForStudent(id))}">🖼️ 사진 바로보기(조회)</a>
        <button class="actionBtn" type="button" id="reSearchBtn">🔎 다른 수련생 조회</button>
      </div>
    </div>
  `;
}

function renderPickList(rows){
  const list = rows.map((r, idx)=>{
    const id = clean(r[0]);
    const name = clean(r[1]);
    const birth = clean(r[2]);
    const photo = clean(r[6]);

    const pNum = toPointNumber(r[7]);
    const pStr = pointDisplay(pNum);
    const tier = tierOf(pNum);

    return `
      <div class="pick" data-idx="${idx}">
        <div class="pLeft">
          <div class="thumb">
            ${
              photo
                ? `<img src="${escapeHtml(photo)}" alt="사진" loading="lazy" decoding="async" referrerpolicy="no-referrer"
                        onerror="this.onerror=null;this.style.display='none';this.parentElement.textContent='NO';" />`
                : `NO`
            }
          </div>
          <div class="pInfo">
            <div class="pName">${escapeHtml(name || "-")}</div>
            <div class="pMeta">아이디: ${escapeHtml(id || "-")} · 생년월일: ${escapeHtml(birth || "-")} · 포인트: <b>${escapeHtml(pStr)}P</b></div>
          </div>
        </div>

        <div class="pRight">
          <span class="tierBadge ${escapeHtml(tier.key)}">${escapeHtml(tier.icon)} ${escapeHtml(tier.name)}</span>
          <span class="tierBadge" style="border-color:rgba(255,255,255,.18);background:rgba(0,0,0,.14);">선택</span>
        </div>
      </div>
    `;
  }).join("");

  return `<div class="message">조건에 맞는 <b>${rows.length}명</b>이 조회되었습니다. 아래에서 선택해주세요.</div>
          <div class="list" id="pickList">${list}</div>`;
}

async function applyHashToCurrentCard(){
  const card = resultEl.querySelector(".card");
  if(!card) return;
  const out = card.querySelector("#hashOut");
  if(!out) return;
  const src = card.getAttribute("data-hash-source") || "";
  out.textContent = "생성중…";
  const hex = await sha256Hex(src);
  if(hex){
    const pretty = `${hex.slice(0,8)}-${hex.slice(8,16)}-${hex.slice(16,24)}-${hex.slice(24,32)}…`;
    out.textContent = pretty;
  }else{
    out.textContent = "지원되지 않음";
  }
}

/* ---------- search ---------- */
async function runSearch(){
  const q1 = $("qNameOrId").value;
  const qb = $("qBirth").value;
  const adminOn = isAdmin();

  resultEl.innerHTML = "";

  if(!clean(q1) || (!adminOn && !clean(qb))){
    resultEl.innerHTML = adminOn
      ? `<div class="message">이름(또는 아이디)을 입력해주세요. (관리자 모드: 생년월일은 선택)</div>`
      : `<div class="message">이름(또는 아이디)과 생년월일을 모두 입력해주세요.</div>`;
    return;
  }

  try{
    await loadOnce({force:false});
  }catch(e){
    console.error(e);
    setStatus("bad", "오류", "데이터를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.");
    resultEl.innerHTML = `<div class="message">데이터를 불러오지 못했습니다.<br/>상단의 <b>데이터 새로고침</b>을 눌러 다시 시도해주세요.</div>`;
    return;
  }

  const rows = matchRows(q1, qb);

  if(rows.length === 0){
    resultEl.innerHTML = `<div class="message">조회 결과가 없습니다.</div>`;
    return;
  }

  // ✅ 조회 성공(1명 이상) → 랭킹 자동 숨김
  hideRanking();

  if(rows.length === 1){
    resultEl.innerHTML = renderCard(rows[0]);
    await applyHashToCurrentCard();
    bindReSearchButton();
    return;
  }

  resultEl.innerHTML = renderPickList(rows);

  const pickList = $("pickList");
  if(pickList){
    pickList.addEventListener("click", async (e)=>{
      const el = e.target.closest(".pick");
      if(!el) return;
      const idx = Number(el.getAttribute("data-idx"));
      const chosen = rows[idx];
      if(chosen){
        resultEl.innerHTML = renderCard(chosen);
        await applyHashToCurrentCard();
        bindReSearchButton();
      }
    });
  }
}

function bindReSearchButton(){
  const btn = $("reSearchBtn");
  if(!btn) return;
  btn.addEventListener("click", ()=>{
    resultEl.innerHTML = "";
    renderRanking(); // ✅ 랭킹 최신 재렌더 + 표시
    $("qNameOrId").focus();
    window.scrollTo({top:0, behavior:"smooth"});
  }, { once:true });
}

/* ---------- clear buttons ---------- */
function bindClear(inputId, btnId){
  const input = $(inputId);
  const btn = $(btnId);

  function sync(){ btn.style.display = input.value ? "inline-flex" : "none"; }
  input.addEventListener("input", sync);
  btn.addEventListener("click", ()=>{
    input.value = "";
    input.focus();
    sync();
  });
  sync();
}

/* ---------- events ---------- */
$("searchBtn").addEventListener("click", runSearch);
document.addEventListener("keydown",(e)=>{ if(e.key === "Enter") runSearch(); });

$("refreshBtn").addEventListener("click", async ()=>{
  resultEl.innerHTML = "";
  try{
    clearCache();
    DATA_ROWS = null;
    LAST_LOADED_AT = null;
    LAST_SOURCE = null;

    // 랭킹 ticker 재생성을 위해 초기화
    const vp = $("rankViewport");
    if(vp){
      vp.removeAttribute("data-ticker");
      // clone이 붙어있을 수 있어서 정리(ul 1개만 남기기)
      const uls = vp.querySelectorAll("ul");
      for(let i=1;i<uls.length;i++) uls[i].remove();
    }

    await loadOnce({force:true});
    renderRanking(); // ✅ 새 데이터 기반 랭킹 갱신
  }catch(e){
    console.error(e);
    setStatus("bad", "오류", "새로고침 실패… 네트워크 상태를 확인해주세요.");
  }
});

$("clearCacheBtn").addEventListener("click", ()=>{
  clearCache();
  DATA_ROWS = null;
  LAST_LOADED_AT = null;
  LAST_SOURCE = null;
  timePill.style.display = "none";
  setStatus("loading", "캐시 삭제됨", "다음 조회 시 새로 불러옵니다.");
  hideRanking();
});

bindClear("qNameOrId", "clearName");
bindClear("qBirth", "clearBirth");

window.addEventListener("DOMContentLoaded", ()=>{
  maybeAskAdmin();
  updateAdminUI();

  loadOnce({force:false})
    .then(()=>{
      renderRanking(); // ✅ 조회 전 랭킹 표시
    })
    .catch(e=>{
      console.error(e);
      setStatus("bad", "대기", "자동 불러오기에 실패했습니다. 상단 ‘데이터 새로고침’을 눌러주세요.");
      hideRanking();
    });
});
</script>
</body>
</html>
