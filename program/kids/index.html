<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>유치부 프로그램 | 계명태권도</title>
  <meta name="description" content="유치부 전용 50분 수업. 준비운동→기본동작→앉아 발차기→성장체조→학교체육→인성교육. 전용시간 4:30~5:15" />
  <meta name="theme-color" content="#0b0f19" />

  <style>
    :root{
      --bg:#0b0f19; --panel:#0f1628; --line:rgba(36,52,90,.55);
      --text:#e9eefc; --muted:#a9b6d6; --accent:#ff8a00; --blue:#60a5fa; --good:#34d399;
      --shadow:0 16px 40px rgba(0,0,0,.38); --r2:22px;
    }
    *{box-sizing:border-box} html,body{height:100%}
    body{
      margin:0; color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",sans-serif;
      background:radial-gradient(1200px 600px at 50% -10%, rgba(255,138,0,.18), transparent 60%),
               linear-gradient(180deg, #060a13, var(--bg));
      -webkit-font-smoothing:antialiased;
    }
    a{color:inherit;text-decoration:none}
    .wrap{max-width:1040px;margin:0 auto;padding:14px 14px 120px}
    section{scroll-margin-top:84px}

    .topbar{
      position:sticky;top:0;z-index:50;margin:0 -14px 12px;padding:12px 14px;
      background:rgba(7,9,16,.78);border-bottom:1px solid rgba(36,52,90,.55);
      backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;gap:10px;
    }
    .brand{display:flex;gap:10px;align-items:center;min-width:0}
    .logo{width:42px;height:42px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);display:grid;place-items:center;font-weight:950}
    .t1{font-weight:950;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .t2{font-size:12px;color:rgba(233,238,252,.70);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .homeBtn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:10px 12px;border-radius:14px;border:1px solid rgba(255,138,0,.35);
      background:linear-gradient(180deg, rgba(255,138,0,.95), rgba(255,138,0,.75));
      color:#101019;font-weight:950;font-size:13px;white-space:nowrap;
    }

    .hero{
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(15,22,40,.92), rgba(13,19,34,.88));
      border-radius:var(--r2);box-shadow:var(--shadow);
      padding:16px 14px;position:relative;overflow:hidden;
    }
    .hero:before{
      content:"";position:absolute;inset:-1px;pointer-events:none;
      background:radial-gradient(520px 220px at 85% 10%, rgba(96,165,250,.12), transparent 62%),
               radial-gradient(520px 220px at 15% 0%, rgba(255,138,0,.12), transparent 62%);
      opacity:.95;
    }
    .hero>*{position:relative}
    .hero h1{margin:0 0 8px;font-size:18px}
    .hero p{margin:0;color:rgba(233,238,252,.78);font-size:13px;line-height:1.6}

    .pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .pill{display:inline-flex;gap:8px;align-items:center;padding:9px 11px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);font-size:12px;font-weight:900}
    .dot{width:8px;height:8px;border-radius:999px;background:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.18)}
    .dot.acc{background:rgba(255,138,0,.9);border-color:rgba(255,138,0,.35)}
    .dot.good{background:rgba(52,211,153,.9);border-color:rgba(52,211,153,.35)}
    .dot.blue{background:rgba(96,165,250,.9);border-color:rgba(96,165,250,.35)}

    .btnRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:10px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);font-weight:950;font-size:13px;white-space:nowrap;
    }
    .btn.primary{background:linear-gradient(180deg, rgba(255,138,0,.95), rgba(255,138,0,.75));border-color:rgba(255,138,0,.35);color:#101019}

    .sectionTitle{margin:18px 4px 10px;display:flex;justify-content:space-between;align-items:flex-end;gap:10px}
    .sectionTitle h2{margin:0;font-size:15px}
    .mini{font-size:12px;color:var(--muted)}
    .panel{border:1px solid var(--line);background:linear-gradient(180deg, rgba(15,22,40,.92), rgba(13,19,34,.90));border-radius:var(--r2);box-shadow:var(--shadow);overflow:hidden}
    .panelHead{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid rgba(36,52,90,.45);background:linear-gradient(90deg, rgba(20,40,90,.75), rgba(10,14,28,.0))}
    .panelHead b{font-size:14px}
    .panelBody{padding:12px}

    .timeCard{border-radius:18px;border:1px solid rgba(255,255,255,.10);background:linear-gradient(180deg, rgba(18,28,51,.88), rgba(12,18,34,.92));padding:14px}
    .timeTop{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
    .badge{font-size:11px;font-weight:950;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);white-space:nowrap}
    .timeRow{display:flex;justify-content:space-between;gap:10px;padding:9px 10px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);font-size:13px}
    .timeRow span{color:rgba(233,238,252,.72);font-weight:800}
    .hint{margin-top:8px;font-size:12px;color:var(--muted);line-height:1.5}

    .list{list-style:none;margin:0;padding:0;display:grid;gap:8px}
    .li{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-radius:16px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.03)}
    .ico{width:38px;height:38px;border-radius:14px;display:grid;place-items:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);font-weight:950;flex:0 0 auto}
    .li b{display:block;font-size:13px}
    .li span{display:block;font-size:12px;color:rgba(233,238,252,.72);margin-top:2px;line-height:1.5}

    .ytBox{border:1px solid rgba(255,255,255,.12);border-radius:18px;overflow:hidden;background:rgba(255,255,255,.03)}
    .ytHead{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.10);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;background:linear-gradient(90deg, rgba(255,138,0,.10), rgba(10,14,28,.0))}
    .ytFrameWrap{position:relative;padding-top:56.25%}
    .ytFrameWrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}

    .footer{margin-top:14px;padding:16px 10px;text-align:center;color:rgba(233,238,252,.60);font-size:12px}
  </style>
</head>

<body>
  <div class="wrap" id="top">
    <div class="topbar">
      <div class="brand">
        <div class="logo">🧸</div>
        <div>
          <div class="t1">유치부 프로그램</div>
          <div class="t2">구조 >> 교차원리, 교차원리 기반 무도</div>
        </div>
      </div>
      <a class="homeBtn" href="../../">🏠 홈으로</a>
    </div>

    <script>
      const PAGE = {
        title: "유치부 전용 50분 프로그램 (4:30 ~ 5:15)",
        desc: "유치부는 ‘즐겁게 시작’이 핵심입니다. 예측 가능한 순서로 안정감과 집중을 만들고, 균형감각/기초체력/예절 습관을 자연스럽게 연결합니다.",
        pills: [
          {dot:"acc", text:"유치부 전용시간"},
          {dot:"good", text:"50분 루틴"},
          {dot:"blue", text:"기초체력+균형"},
          {dot:"", text:"예절·집중 습관"}
        ],
        schedule: { badge:"4:30 ~ 5:15", hint:"처음 시작도 OK. 짧고 명확한 활동을 연결해 집중을 유지합니다."},
        flow: [
          {i:"1", t:"준비운동", d:"관절/근육을 부드럽게 깨우고, 안전한 움직임을 준비합니다."},
          {i:"2", t:"기본동작", d:"바른 자세와 중심(균형)을 익혀 ‘움직임의 기초’를 만듭니다."},
          {i:"3", t:"앉아 발차기", d:"허리·골반 안정 + 다리 사용감각. 정확한 발차기의 씨앗 단계입니다."},
          {i:"4", t:"성장체조", d:"유연성/리듬/협응을 키워 몸의 연결을 자연스럽게 만듭니다."},
          {i:"5", t:"학교체육", d:"달리기·점프·던지기 등 기초 체육 요소를 즐겁게 강화합니다."},
          {i:"6", t:"인성교육", d:"인사·정리·약속·차례 지키기. 도장 습관이 생활로 이어지게 합니다."}
        ],
        youtubeId: "aHZSZ1YHIAY",
        links: {
          programHub: "../",
          elem: "../elementary/",
          growth: "../growth/",
          dc: "../doublecross/",
          contact: "../../#contact"
        }
      };
    </script>

    <section class="hero">
      <h1 id="h1"></h1>
      <p id="p"></p>
      <div class="pills" id="pills"></div>

      <div class="btnRow">
        <a class="btn primary" id="btnContact" href="#">카톡 문의</a>
        <a class="btn" id="btnHub" href="#">프로그램 허브</a>
        <a class="btn" id="btnElem" href="#">초등부</a>
        <a class="btn" id="btnGrowth" href="#">성장관리</a>
        <a class="btn" id="btnDC" href="#">DOUBLE CROSS</a>
      </div>
    </section>

    <div class="sectionTitle">
      <h2>운영 시간</h2>
      <div class="mini">모든 수업 50분</div>
    </div>
    <section class="panel">
      <div class="panelBody">
        <div class="timeCard">
          <div class="timeTop">
            <div style="font-weight:950;font-size:14px">유치부 전용수련</div>
            <div class="badge" id="timeBadge"></div>
          </div>
          <div class="timeRow"><span>전용 시간</span><b id="timeLine"></b></div>
          <div class="hint" id="timeHint"></div>
        </div>
      </div>
    </section>

    <div class="sectionTitle">
      <h2>수업 흐름(50분)</h2>
      <div class="mini">순서가 안정감을 만듭니다</div>
    </div>
    <section class="panel">
      <div class="panelBody">
        <ul class="list" id="flow"></ul>
      </div>
    </section>

    <div class="sectionTitle">
      <h2>대표 영상</h2>
      <div class="mini">분위기 확인</div>
    </div>
    <section class="panel">
      <div class="panelBody">
        <div class="ytBox">
          <div class="ytHead">
            <b>유치부 대표 영상</b>
            <span class="mini">놀이형 루틴 + 기본 습관</span>
          </div>
          <div class="ytFrameWrap">
            <iframe id="yt"
              src=""
              title="유치부 대표 영상"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen></iframe>
          </div>
          <div style="padding:12px;display:flex;gap:8px;flex-wrap:wrap">
            <a class="btn primary" href="../../#contact">카톡 문의하기 →</a>
            <a class="btn" href="../">프로그램 허브 →</a>
          </div>
        </div>
      </div>
    </section>

    <div class="footer">© <span id="year"></span> 계명태권도 · Kids</div>
  </div>

  <script>
    const $ = (id)=>document.getElementById(id);
    $("h1").textContent = PAGE.title;
    $("p").textContent  = PAGE.desc;

    const pills = $("pills");
    PAGE.pills.forEach(x=>{
      const s = document.createElement("span");
      s.className = "pill";
      const d = document.createElement("span");
      d.className = "dot" + (x.dot ? " " + x.dot : "");
      s.appendChild(d);
      s.appendChild(document.createTextNode(" " + x.text));
      pills.appendChild(s);
    });

    $("btnContact").href = PAGE.links.contact;
    $("btnHub").href     = PAGE.links.programHub;
    $("btnElem").href    = PAGE.links.elem;
    $("btnGrowth").href  = PAGE.links.growth;
    $("btnDC").href      = PAGE.links.dc;

    $("timeBadge").textContent = PAGE.schedule.badge;
    $("timeLine").textContent  = PAGE.schedule.badge;
    $("timeHint").textContent  = "※ " + PAGE.schedule.hint;

    const flow = $("flow");
    PAGE.flow.forEach(s=>{
      const li = document.createElement("li");
      li.className = "li";
      li.innerHTML = `<div class="ico">${s.i}</div><div><b>${s.t}</b><span>${s.d}</span></div>`;
      flow.appendChild(li);
    });

    $("yt").src = `https://www.youtube.com/embed/${PAGE.youtubeId}`;
    $("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
