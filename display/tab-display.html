<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

<title>계명태권도 TAB SIGN</title>

<meta name="theme-color" content="#060b18" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<script>
/* =========================================================
   🔥 여기만 수정하면 전체 바뀜
   ========================================================= */
const CONFIG = {
  topMini: "WELCOME TO",
  topTitle: "아이들이 행복한 계명태권도장입니다~",
  neonText: "목요일은 태권도와 함께 더블크로스 수련이 있습니다.",

  speed: 52,

  set1: {
    left: ["지금은", "1,2부 연결수련 시간", "입니다", "🙂"],
    right: ["아이들의 집중을 위해", "조용히 호출해 주세요"]
  },

  set2: {
    left: ["계명태권도는", "홈페이지를", "운영중입니다", "🙂"],
    right: ["인터넷 주소창에", "계명태권도.com 입력해주세요"]
  }
};
</script>

<style>
:root{
  --bg1:#060b18;
  --bg2:#091a36;
  --bg3:#0c254c;
  --gold:#ffd76a;
  --blue:#77c9ff;
}

*{ box-sizing:border-box; }

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#060b18;
  font-family:"Pretendard","Noto Sans KR",sans-serif;
}

body{
  display:flex;
  flex-direction:column;
}

/* 배경 */
.bg{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(119,201,255,.2), transparent 30%),
    linear-gradient(145deg, var(--bg1), var(--bg2), var(--bg3));
}

/* 상단 */
.header{
  text-align:center;
  padding:20px;
  z-index:2;
}

.mini{
  font-size:20px;
  letter-spacing:4px;
  color:#9fe2ff;
}

.title{
  font-size:60px;
  font-weight:900;
  color:#fff2bf;
}

/* 네온 */
.neon{
  text-align:center;
  font-size:60px;
  font-weight:900;
  color:#bfefff;
  text-shadow:
    0 0 10px #9fe2ff,
    0 0 30px #77c9ff;
  animation:neon 2.5s infinite;
  position:relative;
}

/* 반짝 효과 */
.neon::after{
  content:"✨";
  position:absolute;
  right:-20px;
  top:-10px;
  animation:spark 2s infinite;
}

@keyframes neon{
  0%,100%{opacity:1}
  50%{opacity:.8}
}

@keyframes spark{
  0%{transform:scale(0.8)}
  50%{transform:scale(1.3)}
  100%{transform:scale(0.8)}
}

/* 전광판 */
.board{
  flex:1;
  display:flex;
  align-items:center;
  overflow:hidden;
}

.track{
  display:flex;
  gap:80px;
  white-space:nowrap;
  animation:move linear infinite;
}

@keyframes move{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

/* 🔥 핵심 수정 (겹침 해결) */
.text{
  font-size:110px;
  font-weight:900; /* 950 → 900 */
}

/* 색상 */
.main{ color:white; }
.point{ color:#ffd76a; }

.footer{
  text-align:center;
  padding:10px;
  font-size:18px;
  opacity:.7;
}
</style>
</head>

<body>
<div class="bg"></div>

<div class="header">
  <div class="mini" id="mini"></div>
  <div class="title" id="title"></div>
</div>

<div class="neon" id="neon"></div>

<div class="board">
  <div class="track" id="track"></div>
</div>

<div class="footer">KEIMYUNG TAEKWONDO DISPLAY BOARD</div>

<script>
const mini = document.getElementById("mini");
const title = document.getElementById("title");
const neon = document.getElementById("neon");
const track = document.getElementById("track");

mini.textContent = CONFIG.topMini;
title.textContent = CONFIG.topTitle;
neon.textContent = CONFIG.neonText;

track.style.animationDuration = CONFIG.speed + "s";

/* 문장 생성 */
function makeLine(arr){
  const div = document.createElement("div");
  div.className="text";

  arr.forEach((t,i)=>{
    const span=document.createElement("span");
    span.textContent=t+" ";
    span.className = i % 2 === 0 ? "main" : "point";
    div.appendChild(span);
  });

  return div;
}

/* 구성 */
function build(){
  const sets = [CONFIG.set1, CONFIG.set2];

  sets.forEach(s=>{
    track.appendChild(makeLine(s.left));
    track.appendChild(makeLine(s.right));
  });

  /* 반복 (끊김 방지) */
  sets.forEach(s=>{
    track.appendChild(makeLine(s.left));
    track.appendChild(makeLine(s.right));
  });
}

build();
</script>

</body>
</html>
