<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

<title>계명태권도 TAB SIGN</title>

<meta name="theme-color" content="#060b18" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<script>
/* =========================================================
   🔥 여기만 수정하면 전체 바뀜
   ========================================================= */
const CONFIG = {
  topMini: "WELCOME TO",
  topTitle: "아이들이 행복한 계명태권도장입니다~",
  neonText: "오늘은 수련을 모두 마친 후에 자신감캠프가 진행됩니다.",

  speed: 52,

  set1: {
    left: ["지금은", "차량운행 시간", "입니다."],
    right: ["🙂","오늘도 최선을 다해 수련에 임하고", "규칙과 질서를 지켜주세요~"]
  },

  set2: {
    left: [ "🙂","계명태권도는", "홈페이지를", "운영중입니다 "],
    right: ["인터넷 주소창에", "계명태권도.com 입력해주세요!"]
  }
};
</script>

<style>
:root{
  --bg1:#060b18;
  --bg2:#091a36;
  --bg3:#0c254c;
  --gold1:#fff6c9;
  --gold2:#ffd76a;
  --gold3:#ffbf2f;
  --blue:#77c9ff;
  --blue2:#b9edff;
  --white:#ffffff;
}

*{ box-sizing:border-box; }

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#060b18;
  font-family:"Pretendard","Noto Sans KR",sans-serif;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

body{
  position:relative;
  display:flex;
  flex-direction:column;
}

/* 배경 */
.bg{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 15% 20%, rgba(119,201,255,.18), transparent 28%),
    radial-gradient(circle at 82% 18%, rgba(255,215,106,.10), transparent 24%),
    radial-gradient(circle at 50% 85%, rgba(119,201,255,.10), transparent 28%),
    linear-gradient(145deg, var(--bg1), var(--bg2), var(--bg3));
  z-index:0;
}

/* 은은한 광선 */
.bg::before{
  content:"";
  position:absolute;
  inset:-20%;
  background:
    linear-gradient(115deg,
      transparent 0%,
      rgba(255,255,255,.04) 35%,
      transparent 52%,
      rgba(119,201,255,.05) 70%,
      transparent 100%);
  animation:bgSweep 10s linear infinite;
  pointer-events:none;
}

@keyframes bgSweep{
  from{ transform:translateX(-8%) translateY(0); }
  to{ transform:translateX(8%) translateY(0); }
}

/* 상단 */
.header{
  position:relative;
  z-index:2;
  text-align:center;
  padding:18px 18px 8px;
}

.mini{
  font-size:20px;
  font-weight:700;
  letter-spacing:4px;
  color:#9fe2ff;
  text-shadow:
    0 0 8px rgba(159,226,255,.35),
    0 0 18px rgba(119,201,255,.18);
  margin-bottom:6px;
}

/* 헤드 메인 타이틀 */
.titleWrap{
  position:relative;
  display:inline-block;
  max-width:95vw;
}

.title{
  position:relative;
  display:inline-block;
  font-size:66px;
  line-height:1.08;
  font-weight:900;
  letter-spacing:-1px;
  padding:4px 20px 10px;
  border-radius:20px;

  background:linear-gradient(
    90deg,
    var(--gold1) 0%,
    var(--gold2) 24%,
    #ffffff 38%,
    var(--gold2) 54%,
    var(--gold3) 74%,
    var(--gold1) 100%
  );
  background-size:220% auto;
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;

  text-shadow:
    0 0 8px rgba(255,215,106,.12),
    0 0 16px rgba(255,215,106,.10);

  animation:
    titleGlow 3.4s ease-in-out infinite,
    titleFloat 3.8s ease-in-out infinite,
    titleShine 4.8s linear infinite;
}

/* 빛이 스쳐가는 느낌 */
.title::after{
  content:"";
  position:absolute;
  top:0;
  left:-25%;
  width:18%;
  height:100%;
  background:linear-gradient(
    90deg,
    transparent 0%,
    rgba(255,255,255,.0) 10%,
    rgba(255,255,255,.35) 50%,
    rgba(255,255,255,.0) 90%,
    transparent 100%
  );
  transform:skewX(-20deg);
  filter:blur(2px);
  animation:titleSweep 3.6s linear infinite;
  pointer-events:none;
}

@keyframes titleGlow{
  0%,100%{
    text-shadow:
      0 0 10px rgba(255,215,106,.22),
      0 0 24px rgba(255,215,106,.12),
      0 0 42px rgba(255,191,47,.08);
  }
  50%{
    text-shadow:
      0 0 14px rgba(255,215,106,.34),
      0 0 32px rgba(255,215,106,.18),
      0 0 52px rgba(255,191,47,.12);
  }
}

@keyframes titleFloat{
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-2px); }
}

@keyframes titleShine{
  0%{ background-position:0% 50%; }
  100%{ background-position:200% 50%; }
}

@keyframes titleSweep{
  0%{ left:-28%; opacity:0; }
  10%{ opacity:1; }
  45%{ opacity:1; }
  60%{ opacity:0; }
  100%{ left:120%; opacity:0; }
}

/* 네온 문구 */
.neonWrap{
  position:relative;
  z-index:2;
  padding:4px 18px 2px;
}

.neon{
  position:relative;
  text-align:center;
  font-size:54px;
  line-height:1.18;
  font-weight:900;
  color:#d8f5ff;
  text-shadow:
    0 0 10px rgba(159,226,255,.9),
    0 0 26px rgba(119,201,255,.7),
    0 0 44px rgba(119,201,255,.28);
  animation:neonPulse 2.6s ease-in-out infinite;
  padding:4px 28px;
}

/* 반짝 효과 */
.neon::before,
.neon::after{
  content:"✨";
  position:absolute;
  font-size:.7em;
  animation:sparkle 2.2s ease-in-out infinite;
}

.neon::before{
  left:12px;
  top:-6px;
}

.neon::after{
  right:12px;
  top:-6px;
  animation-delay:1.1s;
}

@keyframes neonPulse{
  0%,100%{
    opacity:1;
    transform:translateY(0);
  }
  50%{
    opacity:.86;
    transform:translateY(-1px);
  }
}

@keyframes sparkle{
  0%,100%{
    transform:scale(.8) rotate(0deg);
    opacity:.65;
  }
  50%{
    transform:scale(1.25) rotate(12deg);
    opacity:1;
  }
}

/* 전광판 영역 */
.board{
  position:relative;
  z-index:2;
  flex:1;
  display:flex;
  align-items:center;
  overflow:hidden;
  padding:0 0 4px;
}

/* 상하 은은한 그라데이션 */
.board::before,
.board::after{
  content:"";
  position:absolute;
  left:0;
  width:100%;
  height:18%;
  pointer-events:none;
  z-index:3;
}

.board::before{
  top:0;
  background:linear-gradient(to bottom, rgba(6,11,24,.8), transparent);
}

.board::after{
  bottom:0;
  background:linear-gradient(to top, rgba(6,11,24,.78), transparent);
}

.track{
  display:flex;
  align-items:center;
  gap:90px;
  white-space:nowrap;
  will-change:transform;
  animation:move linear infinite;
}

@keyframes move{
  from{ transform:translateX(0); }
  to{ transform:translateX(-50%); }
}

/* 큰 글자 - 더 크게 */
.text{
  display:inline-flex;
  align-items:center;
  gap:12px;
  font-size:136px;
  line-height:1;
  font-weight:900;
  letter-spacing:-2px;
  padding:0 6px;
  text-rendering:geometricPrecision;
  -webkit-font-smoothing:antialiased;
}

/* 색상 */
.main{
  color:var(--white);
  text-shadow:
    0 0 10px rgba(255,255,255,.08),
    0 0 24px rgba(255,255,255,.05);
}

.point{
  color:var(--gold2);
  text-shadow:
    0 0 10px rgba(255,215,106,.14),
    0 0 24px rgba(255,215,106,.08);
}

.footer{
  position:relative;
  z-index:2;
  text-align:center;
  padding:6px 12px 12px;
  font-size:18px;
  font-weight:700;
  letter-spacing:1.5px;
  color:rgba(255,255,255,.72);
  text-shadow:0 0 8px rgba(119,201,255,.12);
}

/* 태블릿 대응 */
@media (max-width:1200px){
  .title{ font-size:56px; }
  .neon{ font-size:44px; }
  .text{ font-size:118px; }
}

@media (max-width:900px){
  .mini{ font-size:18px; }
  .title{ font-size:46px; }
  .neon{ font-size:36px; }
  .text{ font-size:102px; }
  .track{ gap:72px; }
}
</style>
</head>

<body>
<div class="bg"></div>

<div class="header">
  <div class="mini" id="mini"></div>
  <div class="titleWrap">
    <div class="title" id="title"></div>
  </div>
</div>

<div class="neonWrap">
  <div class="neon" id="neon"></div>
</div>

<div class="board">
  <div class="track" id="track"></div>
</div>

<div class="footer">KEIMYUNG TAEKWONDO DISPLAY BOARD</div>

<script>
const mini = document.getElementById("mini");
const title = document.getElementById("title");
const neon = document.getElementById("neon");
const track = document.getElementById("track");

mini.textContent = CONFIG.topMini;
title.textContent = CONFIG.topTitle;
neon.textContent = CONFIG.neonText;

track.style.animationDuration = CONFIG.speed + "s";

/* 문장 생성 */
function makeLine(arr){
  const div = document.createElement("div");
  div.className = "text";

  arr.forEach((t,i)=>{
    const span = document.createElement("span");
    span.textContent = t + " ";
    span.className = i % 2 === 0 ? "main" : "point";
    div.appendChild(span);
  });

  return div;
}

/* 구성 */
function build(){
  const sets = [CONFIG.set1, CONFIG.set2];

  sets.forEach(s=>{
    track.appendChild(makeLine(s.left));
    track.appendChild(makeLine(s.right));
  });

  /* 반복 (끊김 방지) */
  sets.forEach(s=>{
    track.appendChild(makeLine(s.left));
    track.appendChild(makeLine(s.right));
  });
}

build();
</script>

</body>
</html>
