<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>계명태권도 전광판</title>

  <meta name="theme-color" content="#050816" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    :root{
      --bg1:#050816;
      --bg2:#09142c;
      --bg3:#0b1c3f;
      --gold:#ffd76a;
      --gold2:#ffefb0;
      --blue:#5db8ff;
      --white:#ffffff;

      --panelWidth:min(94vw, 1700px);
      --panelHeight:min(46vh, 320px);
      --radius:34px;

      /* 기존보다 살짝 안정적으로 */
      --textSize:clamp(42px, 7.2vw, 118px);

      --safeTop: calc(env(safe-area-inset-top, 0px) + 14px);
      --safeRight: calc(env(safe-area-inset-right, 0px) + 14px);
      --safeBottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
      --safeLeft: calc(env(safe-area-inset-left, 0px) + 14px);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      background:#050816;
      font-family:
        "Pretendard Variable",
        "Pretendard",
        "Noto Sans KR",
        "Apple SD Gothic Neo",
        "Malgun Gothic",
        sans-serif;
    }

    body{
      position:relative;
      min-height:100svh;
      min-height:100dvh;
      color:#fff;
      user-select:none;
      -webkit-user-select:none;
      touch-action:manipulation;
    }

    /* 배경 */
    .bg{
      position:absolute;
      inset:0;
      overflow:hidden;
      background:
        radial-gradient(circle at 18% 20%, rgba(76,154,255,.22), transparent 26%),
        radial-gradient(circle at 82% 24%, rgba(255,215,106,.12), transparent 20%),
        radial-gradient(circle at 50% 88%, rgba(69,124,255,.14), transparent 25%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 48%, var(--bg3) 100%);
    }

    .bg::before{
      content:"";
      position:absolute;
      inset:-10%;
      background:
        linear-gradient(90deg,
          transparent 0%,
          rgba(255,255,255,.02) 25%,
          transparent 50%,
          rgba(255,255,255,.015) 75%,
          transparent 100%);
      transform:translate3d(0,0,0);
      animation:bgSweep 16s linear infinite;
      pointer-events:none;
    }

    .bg::after{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        radial-gradient(rgba(255,255,255,.10) 0.8px, transparent 0.8px);
      background-size:22px 22px;
      opacity:.10;
      pointer-events:none;
    }

    @keyframes bgSweep{
      from{ transform:translate3d(-8%,0,0); }
      to{ transform:translate3d(8%,0,0); }
    }

    /* 전체 래퍼 */
    .screen{
      position:relative;
      z-index:2;
      width:100%;
      height:100%;
      min-height:100svh;
      min-height:100dvh;

      display:grid;
      grid-template-rows:auto 1fr;
      justify-items:center;
      align-items:start;

      padding:
        var(--safeTop)
        var(--safeRight)
        var(--safeBottom)
        var(--safeLeft);

      gap:clamp(10px, 1.8vh, 18px);
    }

    /* 상단 바 */
    .topbar{
      width:var(--panelWidth);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      min-height:0;
    }

    .chip{
      min-height:54px;
      padding:10px 20px;
      border-radius:999px;
      display:flex;
      align-items:center;
      gap:14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 8px 24px rgba(0,0,0,.28);
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
    }

    .chip.left{
      flex:1 1 auto;
      justify-content:flex-start;
      min-width:0;
    }

    .chip.right{
      flex:0 0 auto;
      min-width:140px;
      justify-content:center;
    }

    .led{
      width:22px;
      height:22px;
      border-radius:50%;
      flex:0 0 22px;
      box-shadow:0 0 14px currentColor;
      animation:pulse 2.2s ease-in-out infinite;
    }

    .led.gold{ color:#ffd94f; background:#ffd94f; }
    .led.green{ color:#35f0b4; background:#35f0b4; }

    .chip-text{
      font-weight:900;
      letter-spacing:.04em;
      white-space:nowrap;
      font-size:clamp(18px, 2.3vw, 32px);
      line-height:1;
    }

    .chip.left .chip-text{
      color:var(--gold);
      text-shadow:
        0 0 6px rgba(255,215,106,.18),
        0 0 12px rgba(255,215,106,.10);
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chip.right .chip-text{
      color:#d9f7ff;
      text-shadow:0 0 8px rgba(93,184,255,.18);
    }

    @keyframes pulse{
      0%,100%{ transform:scale(1); opacity:1; }
      50%{ transform:scale(.88); opacity:.78; }
    }

    /* 메인 패널 */
    .panel-wrap{
      width:100%;
      min-width:0;
      min-height:0;
      height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .panel{
      position:relative;
      width:var(--panelWidth);
      height:var(--panelHeight);
      max-height:100%;
      border-radius:var(--radius);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.025)),
        linear-gradient(135deg, rgba(24,38,72,.92), rgba(8,15,35,.96));
      box-shadow:
        0 12px 28px rgba(0,0,0,.34),
        inset 0 0 0 1px rgba(255,255,255,.035);
    }

    .panel::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.06), transparent 18%),
        radial-gradient(circle at 80% 75%, rgba(93,184,255,.06), transparent 24%);
      pointer-events:none;
    }

    .panel::after{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        radial-gradient(rgba(255,255,255,.14) 0.7px, transparent 0.7px);
      background-size:24px 24px;
      opacity:.08;
      pointer-events:none;
    }

    /* 메시지 영역 */
    .message-stage{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 clamp(16px, 4.2vw, 72px);
      overflow:hidden;
    }

    .message{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:.26em;
      max-width:100%;
      font-size:var(--textSize);
      font-weight:950;
      line-height:1.02;
      letter-spacing:-0.045em;
      white-space:nowrap;
      opacity:1;

      /* 흔들림 줄이는 핵심 */
      will-change:opacity;
      transform:none;
      backface-visibility:hidden;
      -webkit-font-smoothing:antialiased;
      text-rendering:auto;

      animation:messageSwap 12s ease-in-out infinite;
    }

    .word-main,
    .word-point,
    .spark,
    .dot-face{
      flex:0 0 auto;
    }

    .word-main{
      color:#fffef9;
      text-shadow:
        0 0 5px rgba(255,255,255,.16),
        0 0 10px rgba(255,214,106,.08);
    }

    .word-point{
      color:var(--gold2);
      text-shadow:
        0 0 5px rgba(255,215,106,.18),
        0 0 10px rgba(255,215,106,.10);
    }

    .spark{
      font-size:.68em;
      color:#b7e4ff;
      text-shadow:
        0 0 5px rgba(93,184,255,.18),
        0 0 10px rgba(93,184,255,.10);
      animation:sparkle 1.8s ease-in-out infinite;
    }

    .dot-face{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:.92em;
      height:.92em;
      border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #fff8d2 0%, #ffe27f 55%, #ffc94a 100%);
      box-shadow:
        0 0 8px rgba(255,215,106,.18),
        0 0 14px rgba(255,215,106,.10);
      font-size:.42em;
      line-height:1;
      transform:none;
    }

    @keyframes sparkle{
      0%,100%{ opacity:1; transform:scale(1); }
      50%{ opacity:.85; transform:scale(.92); }
    }

    /* 문구 교체: 이동 없이 페이드만 */
    .message.m2{
      position:absolute;
      opacity:0;
      animation:messageSwap2 12s ease-in-out infinite;
    }

    @keyframes messageSwap{
      0%, 42%   { opacity:1; }
      46%, 96%  { opacity:0; }
      100%      { opacity:1; }
    }

    @keyframes messageSwap2{
      0%, 42%   { opacity:0; }
      46%, 96%  { opacity:1; }
      100%      { opacity:0; }
    }

    /* 상태 */
    .status{
      position:fixed;
      right:12px;
      bottom:10px;
      z-index:4;
      font-size:12px;
      color:rgba(255,255,255,.5);
      letter-spacing:.04em;
      pointer-events:none;
    }

    /* 완전 꽉차게 쓰고 싶을 때 */
    body.tight .screen{
      grid-template-rows:auto 1fr;
      padding:
        calc(env(safe-area-inset-top, 0px) + 8px)
        0
        calc(env(safe-area-inset-bottom, 0px) + 8px)
        0;
      gap:8px;
    }

    body.tight .topbar{
      width:min(96vw, 1800px);
      padding:0 10px;
    }

    body.tight .panel-wrap{
      width:100%;
      height:100%;
      min-height:0;
    }

    body.tight .panel{
      width:100vw;
      width:100dvw;
      height:calc(100vh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px) - 80px);
      height:calc(100dvh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px) - 80px);
      min-height:220px;
      border-radius:0;
      border:none;
      box-shadow:none;
    }

    body.tight .message-stage{
      padding:0 clamp(14px, 3.5vw, 56px);
    }

    body.tight .message{
      font-size:clamp(42px, 8vw, 138px);
    }

    /* 아주 낮은 화면 */
    @media (max-height: 620px){
      :root{
        --panelHeight:min(44vh, 260px);
        --textSize:clamp(34px, 6.3vw, 86px);
      }

      .screen{
        gap:10px;
        padding-top:calc(env(safe-area-inset-top, 0px) + 10px);
        padding-bottom:calc(env(safe-area-inset-bottom, 0px) + 10px);
      }

      .topbar{
        gap:10px;
      }

      .chip{
        min-height:46px;
        padding:8px 14px;
      }

      .led{
        width:16px;
        height:16px;
        flex-basis:16px;
      }

      .chip-text{
        font-size:clamp(14px, 2vw, 24px);
      }
    }

    /* 세로 화면 대응 */
    @media (max-width: 900px){
      :root{
        --panelWidth:min(96vw, 1700px);
        --textSize:clamp(30px, 6.9vw, 74px);
      }

      .topbar{
        gap:10px;
      }

      .chip{
        min-height:46px;
        padding:8px 14px;
      }

      .chip.right{
        min-width:100px;
      }

      .message{
        letter-spacing:-0.05em;
        gap:.22em;
      }
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="screen">
    <div class="topbar">
      <div class="chip left">
        <span class="led gold"></span>
        <span class="chip-text">계명태권도 전광판 안내</span>
      </div>
      <div class="chip right">
        <span class="led green"></span>
        <span class="chip-text">NOW</span>
      </div>
    </div>

    <div class="panel-wrap">
      <div class="panel">
        <div class="message-stage">
          <div class="message m1" aria-label="현재 문구 1">
            <span class="word-main">지금은</span>
            <span class="word-point">유치부 수련 시간</span>
            <span class="word-main">입니다</span>
            <span class="dot-face">🙂</span>
            <span class="spark">✦</span>
          </div>

          <div class="message m2" aria-label="현재 문구 2">
            <span class="word-main">아이들의 집중을 위해</span>
            <span class="word-point">잠시만 기다려 주세요</span>
            <span class="spark">✦</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="status" id="statusText">display ready</div>

  <script>
    const statusText = document.getElementById('statusText');
    let wakeLock = null;

    async function requestWakeLock(){
      try{
        if('wakeLock' in navigator){
          wakeLock = await navigator.wakeLock.request('screen');
          statusText.textContent = 'wake lock on';
          wakeLock.addEventListener('release', () => {
            statusText.textContent = 'wake lock released';
          });
        }else{
          statusText.textContent = 'wake lock unsupported';
        }
      }catch(err){
        statusText.textContent = 'wake lock fail';
      }
    }

    document.addEventListener('visibilitychange', async () => {
      if(document.visibilityState === 'visible'){
        await requestWakeLock();
      }
    });

    window.addEventListener('load', async () => {
      await requestWakeLock();
      window.scrollTo(0, 1);
      fitScreenHeight();
    });

    document.body.addEventListener('click', async () => {
      await requestWakeLock();
    });

    /* 주소 파라미터로 꽉찬 모드 가능
       예: /display/?tight=1
    */
    const params = new URLSearchParams(location.search);
    if(params.get('tight') === '1'){
      document.body.classList.add('tight');
      statusText.style.display = 'none';
    }

    function fitScreenHeight(){
      document.body.style.minHeight = window.innerHeight + 'px';
    }

    window.addEventListener('resize', fitScreenHeight);
    fitScreenHeight();
  </script>
</body>
</html>
