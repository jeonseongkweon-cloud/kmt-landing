<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>계명태권도 전광판</title>

  <meta name="theme-color" content="#050816" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    :root{
      --bg1:#050816;
      --bg2:#09142c;
      --bg3:#0b1c3f;
      --gold:#ffd76a;
      --gold2:#ffefb0;
      --blue:#5db8ff;
      --white:#ffffff;
      --panelTop: clamp(16px, 2.2vh, 22px);
      --panelWidth: min(94vw, 1700px);
      --panelHeight: min(52vh, 340px);
      --radius: 34px;
      --textSize: clamp(54px, 8.3vw, 140px);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      background:#050816;
      font-family:
        "Pretendard Variable",
        "Pretendard",
        "Noto Sans KR",
        "Apple SD Gothic Neo",
        "Malgun Gothic",
        sans-serif;
    }

    body{
      position:relative;
      min-height:100svh;
      min-height:100dvh;
      color:#fff;
      user-select:none;
      -webkit-user-select:none;
      touch-action:manipulation;
    }

    /* 배경 */
    .bg{
      position:absolute;
      inset:0;
      overflow:hidden;
      background:
        radial-gradient(circle at 18% 20%, rgba(76,154,255,.26), transparent 26%),
        radial-gradient(circle at 82% 24%, rgba(255,215,106,.16), transparent 20%),
        radial-gradient(circle at 50% 88%, rgba(69,124,255,.18), transparent 25%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 48%, var(--bg3) 100%);
    }

    .bg::before{
      content:"";
      position:absolute;
      inset:-10%;
      background:
        linear-gradient(90deg,
          transparent 0%,
          rgba(255,255,255,.02) 25%,
          transparent 50%,
          rgba(255,255,255,.018) 75%,
          transparent 100%);
      transform:translate3d(0,0,0);
      animation:bgSweep 14s linear infinite;
      pointer-events:none;
    }

    .bg::after{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        radial-gradient(rgba(255,255,255,.12) 0.8px, transparent 0.8px);
      background-size:22px 22px;
      opacity:.12;
      pointer-events:none;
    }

    @keyframes bgSweep{
      from{ transform:translate3d(-8%,0,0); }
      to{ transform:translate3d(8%,0,0); }
    }

    /* 전체 래퍼 */
    .screen{
      position:relative;
      z-index:2;
      width:100%;
      height:100%;
      min-height:100svh;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:
        calc(env(safe-area-inset-top, 0px) + 18px)
        calc(env(safe-area-inset-right, 0px) + 18px)
        calc(env(safe-area-inset-bottom, 0px) + 18px)
        calc(env(safe-area-inset-left, 0px) + 18px);
    }

    /* 상단 바 */
    .topbar{
      width:var(--panelWidth);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:18px;
    }

    .chip{
      min-height:54px;
      padding:10px 20px;
      border-radius:999px;
      display:flex;
      align-items:center;
      gap:14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 8px 24px rgba(0,0,0,.28);
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
    }

    .chip.left{
      flex:1 1 auto;
      justify-content:flex-start;
      min-width:0;
    }

    .chip.right{
      flex:0 0 auto;
      min-width:140px;
      justify-content:center;
    }

    .led{
      width:22px;
      height:22px;
      border-radius:50%;
      flex:0 0 22px;
      box-shadow:0 0 14px currentColor;
      animation:pulse 2.2s ease-in-out infinite;
    }

    .led.gold{ color:#ffd94f; background:#ffd94f; }
    .led.green{ color:#35f0b4; background:#35f0b4; }

    .chip-text{
      font-weight:900;
      letter-spacing:.04em;
      white-space:nowrap;
      font-size:clamp(18px, 2.3vw, 32px);
      line-height:1;
    }

    .chip.left .chip-text{
      color:var(--gold);
      text-shadow:
        0 0 8px rgba(255,215,106,.22),
        0 0 14px rgba(255,215,106,.12);
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chip.right .chip-text{
      color:#d9f7ff;
      text-shadow:0 0 10px rgba(93,184,255,.24);
    }

    @keyframes pulse{
      0%,100%{ transform:scale(1); opacity:1; }
      50%{ transform:scale(.88); opacity:.78; }
    }

    /* 메인 패널 */
    .panel-wrap{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      flex:0 0 auto;
      transform:translateY(-6px); /* 아래 치우침 미세 보정 */
    }

    .panel{
      position:relative;
      width:var(--panelWidth);
      height:var(--panelHeight);
      border-radius:var(--radius);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.025)),
        linear-gradient(135deg, rgba(24,38,72,.92), rgba(8,15,35,.96));
      box-shadow:
        0 12px 28px rgba(0,0,0,.34),
        inset 0 0 0 1px rgba(255,255,255,.035);
    }

    .panel::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.08), transparent 18%),
        radial-gradient(circle at 80% 75%, rgba(93,184,255,.08), transparent 24%);
      pointer-events:none;
    }

    .panel::after{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        radial-gradient(rgba(255,255,255,.16) 0.7px, transparent 0.7px);
      background-size:24px 24px;
      opacity:.10;
      pointer-events:none;
    }

    /* 메시지 영역 */
    .message-stage{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 5vw;
      overflow:hidden;
    }

    .message{
      display:flex;
      align-items:center;
      gap:.32em;
      font-size:var(--textSize);
      font-weight:950;
      line-height:1;
      letter-spacing:-0.04em;
      white-space:nowrap;
      will-change:transform, opacity;
      transform:translate3d(0,0,0);
      backface-visibility:hidden;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      animation:messageSwap 12s ease-in-out infinite;
    }

    .word-main{
      color:#fffef9;
      text-shadow:
        0 0 8px rgba(255,255,255,.22),
        0 0 16px rgba(255,214,106,.12);
    }

    .word-point{
      color:var(--gold2);
      text-shadow:
        0 0 8px rgba(255,215,106,.24),
        0 0 18px rgba(255,215,106,.16);
    }

    .spark{
      font-size:.72em;
      color:#b7e4ff;
      text-shadow:
        0 0 8px rgba(93,184,255,.22),
        0 0 16px rgba(93,184,255,.16);
      animation:sparkle 1.8s ease-in-out infinite;
    }

    .dot-face{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:.95em;
      height:.95em;
      border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #fff8d2 0%, #ffe27f 55%, #ffc94a 100%);
      box-shadow:
        0 0 10px rgba(255,215,106,.22),
        0 0 18px rgba(255,215,106,.14);
      font-size:.46em;
      line-height:1;
      transform:translateY(.02em);
    }

    @keyframes sparkle{
      0%,100%{ transform:scale(1); opacity:1; }
      50%{ transform:scale(.88); opacity:.82; }
    }

    /* 문구 교체 */
    .message.m2{
      position:absolute;
      opacity:0;
      animation:messageSwap2 12s ease-in-out infinite;
    }

    @keyframes messageSwap{
      0%, 42%   { opacity:1; transform:translate3d(0,0,0); }
      46%, 96%  { opacity:0; transform:translate3d(0,-6px,0); }
      100%      { opacity:1; transform:translate3d(0,0,0); }
    }

    @keyframes messageSwap2{
      0%, 42%   { opacity:0; transform:translate3d(0,6px,0); }
      46%, 96%  { opacity:1; transform:translate3d(0,0,0); }
      100%      { opacity:0; transform:translate3d(0,6px,0); }
    }

    /* 상태 */
    .status{
      position:fixed;
      right:12px;
      bottom:10px;
      z-index:4;
      font-size:12px;
      color:rgba(255,255,255,.5);
      letter-spacing:.04em;
      pointer-events:none;
    }

    /* 완전 꽉차게 쓰고 싶을 때 */
    body.tight .topbar{
      display:none;
    }

    body.tight .panel-wrap{
      transform:none;
      width:100%;
      height:100%;
    }

    body.tight .panel{
      width:100vw;
      width:100dvw;
      height:100vh;
      height:100dvh;
      border-radius:0;
      border:none;
      box-shadow:none;
    }

    body.tight .message-stage{
      padding:0 3.5vw;
    }

    body.tight .message{
      font-size:clamp(58px, 9vw, 160px);
    }

    /* 모바일 미세 조정 */
    @media (max-height: 500px){
      :root{
        --panelHeight:min(56vh, 300px);
      }
      .topbar{
        margin-bottom:12px;
      }
      .chip{
        min-height:48px;
        padding:9px 16px;
      }
      .led{
        width:18px;
        height:18px;
        flex-basis:18px;
      }
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="screen">
    <div class="topbar">
      <div class="chip left">
        <span class="led gold"></span>
        <span class="chip-text">계명태권도 전광판 안내</span>
      </div>
      <div class="chip right">
        <span class="led green"></span>
        <span class="chip-text">NOW</span>
      </div>
    </div>

    <div class="panel-wrap">
      <div class="panel">
        <div class="message-stage">
          <div class="message m1" aria-label="현재 문구 1">
            <span class="word-main">지금은</span>
            <span class="word-point">즐거운 수련 시간</span>
            <span class="word-main">입니다</span>
            <span class="dot-face">🙂</span>
            <span class="spark">✦</span>
          </div>

          <div class="message m2" aria-label="현재 문구 2">
            <span class="word-main">아이들의 집중을 위해</span>
            <span class="word-point">잠시만 기다려 주세요</span>
            <span class="spark">✦</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="status" id="statusText">display ready</div>

  <script>
    const statusText = document.getElementById('statusText');
    let wakeLock = null;

    async function requestWakeLock(){
      try{
        if('wakeLock' in navigator){
          wakeLock = await navigator.wakeLock.request('screen');
          statusText.textContent = 'wake lock on';
          wakeLock.addEventListener('release', () => {
            statusText.textContent = 'wake lock released';
          });
        }else{
          statusText.textContent = 'wake lock unsupported';
        }
      }catch(err){
        statusText.textContent = 'wake lock fail';
      }
    }

    document.addEventListener('visibilitychange', async () => {
      if(document.visibilityState === 'visible'){
        await requestWakeLock();
      }
    });

    window.addEventListener('load', async () => {
      await requestWakeLock();
      window.scrollTo(0, 1);
    });

    document.body.addEventListener('click', async () => {
      await requestWakeLock();
    });

    /* 주소 파라미터로 꽉찬 모드 가능
       예: /display/?tight=1
    */
    const params = new URLSearchParams(location.search);
    if(params.get('tight') === '1'){
      document.body.classList.add('tight');
      statusText.style.display = 'none';
    }

    /* 오래된 브라우저에서 리사이즈 후 중앙 맞춤 */
    window.addEventListener('resize', () => {
      document.body.style.minHeight = window.innerHeight + 'px';
    });
    document.body.style.minHeight = window.innerHeight + 'px';
  </script>
</body>
</html>
