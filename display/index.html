<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>계명태권도 | 전광판 안내</title>
  <meta name="description" content="계명태권도 전광판 안내 페이지" />
  <meta name="theme-color" content="#05070d" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />

  <style>
    :root{
      --bg1:#02040a;
      --bg2:#07111f;
      --gold:#ffd54a;
      --gold2:#fff0a8;
      --white:#f8fbff;
      --blue:#57b8ff;
      --blue2:#9cddff;
      --line:rgba(255,255,255,.12);
      --shadowGold:0 0 10px rgba(255,213,74,.45), 0 0 22px rgba(255,213,74,.22);
      --shadowBlue:0 0 10px rgba(87,184,255,.38), 0 0 20px rgba(87,184,255,.18);
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      font-family:"Malgun Gothic","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    body{
      position:relative;
      color:var(--white);
      background:
        radial-gradient(circle at 20% 20%, rgba(87,184,255,.14), transparent 28%),
        radial-gradient(circle at 80% 30%, rgba(255,213,74,.12), transparent 24%),
        radial-gradient(circle at 50% 80%, rgba(87,184,255,.08), transparent 28%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 58%, #03060d);
      touch-action:manipulation;
      overscroll-behavior:none;
    }

    body::before{
      content:"";
      position:absolute; inset:-20%;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.02) 0 2px,
          transparent 2px 16px
        ),
        repeating-linear-gradient(
          180deg,
          rgba(255,255,255,.018) 0 2px,
          transparent 2px 16px
        );
      opacity:.18;
      animation:bgShift 16s linear infinite;
      pointer-events:none;
    }

    @keyframes bgShift{
      0%{transform:translateX(0)}
      100%{transform:translateX(-40px)}
    }

    .wrap{
      position:relative;
      width:100vw;
      height:100vh;
      height:100dvh;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      padding:2.2vh 2vw;
      overflow:hidden;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      min-height:12vh;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      padding:.7vh 1.2vw;
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(255,255,255,.04);
      box-shadow:0 10px 30px rgba(0,0,0,.24);
      backdrop-filter:blur(8px);
      min-width:0;
    }

    .brand-badge{
      width:1.2em;
      height:1.2em;
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%, var(--gold2), var(--gold) 55%, #ffb300 100%);
      box-shadow:var(--shadowGold);
      animation:pulseDot 1.8s ease-in-out infinite;
      flex:0 0 auto;
    }

    @keyframes pulseDot{
      0%,100%{transform:scale(1); opacity:1}
      50%{transform:scale(1.15); opacity:.8}
    }

    .brand-text{
      font-size:clamp(18px, 2.2vw, 34px);
      font-weight:800;
      letter-spacing:.06em;
      color:var(--gold2);
      text-shadow:var(--shadowGold);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .status{
      display:flex;
      align-items:center;
      gap:10px;
      padding:.7vh 1.2vw;
      border:1px solid rgba(87,184,255,.18);
      border-radius:18px;
      background:rgba(87,184,255,.06);
      box-shadow:0 8px 24px rgba(0,0,0,.2);
      backdrop-filter:blur(8px);
      white-space:nowrap;
    }

    .status .lamp{
      width:12px; height:12px; border-radius:50%;
      background:#62ff9b;
      box-shadow:0 0 10px rgba(98,255,155,.8),0 0 20px rgba(98,255,155,.35);
      animation:blink 1.1s steps(2,end) infinite;
    }

    @keyframes blink{
      0%,100%{opacity:1}
      50%{opacity:.35}
    }

    .status span{
      font-size:clamp(15px, 1.45vw, 24px);
      font-weight:700;
      color:#dff3ff;
      text-shadow:var(--shadowBlue);
    }

    .board{
      position:relative;
      flex:1;
      margin:1.5vh 0;
      border-radius:28px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015)),
        radial-gradient(circle at 50% 50%, rgba(255,213,74,.05), transparent 42%),
        #05070d;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.03),
        inset 0 0 80px rgba(87,184,255,.05),
        0 18px 60px rgba(0,0,0,.38);
    }

    .board::before{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(circle, rgba(255,255,255,.18) 0 1px, transparent 1.6px);
      background-size:14px 14px;
      opacity:.12;
      pointer-events:none;
    }

    .board::after{
      content:"";
      position:absolute; inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 20%, transparent 80%, rgba(255,255,255,.04));
      pointer-events:none;
    }

    .marquee-shell{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      overflow:hidden;
      padding:0 2vw;
    }

    .marquee{
      display:inline-flex;
      align-items:center;
      gap:6vw;
      white-space:nowrap;
      will-change:transform;
      animation:marqueeMove 18s linear infinite;
      min-width:max-content;
      padding-left:100%;
    }

    @keyframes marqueeMove{
      0%{transform:translateX(0)}
      100%{transform:translateX(-50%)}
    }

    .msg{
      display:inline-flex;
      align-items:center;
      gap:2vw;
      font-size:clamp(40px, 5.5vw, 92px);
      font-weight:900;
      letter-spacing:.02em;
      line-height:1.1;
      color:var(--gold2);
      text-shadow:
        0 0 8px rgba(255,239,154,.45),
        0 0 16px rgba(255,213,74,.32),
        0 0 30px rgba(255,213,74,.18);
      animation:textGlow 1.6s ease-in-out infinite alternate;
    }

    .msg .accent{
      color:#ffffff;
      text-shadow:
        0 0 8px rgba(255,255,255,.42),
        0 0 18px rgba(87,184,255,.22),
        0 0 28px rgba(87,184,255,.16);
    }

    .separator{
      font-size:clamp(30px,4vw,64px);
      color:var(--blue2);
      text-shadow:var(--shadowBlue);
      opacity:.9;
    }

    @keyframes textGlow{
      0%{filter:brightness(.96)}
      100%{filter:brightness(1.12)}
    }

    .footer{
      min-height:12vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 1vw;
    }

    .subnote{
      width:100%;
      text-align:center;
      font-size:clamp(15px, 1.5vw, 26px);
      font-weight:700;
      color:#d8eaff;
      padding:1.1vh 1vw;
      border:1px solid rgba(255,255,255,.1);
      border-radius:18px;
      background:rgba(255,255,255,.04);
      box-shadow:0 10px 24px rgba(0,0,0,.22);
      backdrop-filter:blur(8px);
      text-shadow:0 0 10px rgba(87,184,255,.12);
    }

    /* 전체화면 시작 오버레이 */
    .fs-overlay{
      position:fixed;
      inset:0;
      z-index:9999;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at 50% 40%, rgba(87,184,255,.16), transparent 30%),
        radial-gradient(circle at 50% 60%, rgba(255,213,74,.10), transparent 34%),
        rgba(0,0,0,.66);
      backdrop-filter:blur(10px);
    }

    .fs-card{
      width:min(92vw, 760px);
      padding:28px 24px;
      border-radius:26px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(5,10,18,.86);
      box-shadow:0 24px 80px rgba(0,0,0,.45);
      text-align:center;
    }

    .fs-title{
      margin:0 0 10px;
      font-size:clamp(24px, 4vw, 42px);
      font-weight:900;
      color:var(--gold2);
      text-shadow:var(--shadowGold);
    }

    .fs-desc{
      margin:0 0 20px;
      font-size:clamp(14px, 2vw, 20px);
      line-height:1.6;
      color:#dbe9f7;
    }

    .fs-actions{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      border-radius:16px;
      padding:14px 22px;
      font-size:clamp(15px, 1.8vw, 20px);
      font-weight:800;
      transition:transform .15s ease, opacity .15s ease, box-shadow .15s ease;
    }

    .btn:active{transform:scale(.98)}

    .btn-primary{
      background:linear-gradient(135deg, #ffe88a, #ffd54a 55%, #ffbe2e);
      color:#111;
      box-shadow:0 12px 30px rgba(255,213,74,.28);
    }

    .btn-secondary{
      background:rgba(255,255,255,.08);
      color:#eaf4ff;
      border:1px solid rgba(255,255,255,.14);
    }

    .fs-note{
      margin-top:14px;
      font-size:clamp(12px, 1.6vw, 16px);
      color:#b9cde0;
      opacity:.92;
    }

    .hidden{
      display:none !important;
    }

    .fullscreen-active .topbar,
    .fullscreen-active .footer{
      opacity:0;
      pointer-events:none;
      transition:opacity .25s ease;
    }

    .fullscreen-active .wrap{
      padding:0;
    }

    .fullscreen-active .board{
      margin:0;
      border-radius:0;
      border:none;
      box-shadow:none;
    }

    .fullscreen-active .marquee-shell{
      padding:0 1.5vw;
    }

    .fullscreen-active .msg{
      font-size:clamp(48px, 6vw, 110px);
    }

    @media (orientation:portrait){
      .topbar{min-height:10vh}
      .footer{min-height:10vh}
      .msg{font-size:clamp(34px, 7vw, 66px)}
      .brand-text{font-size:clamp(16px, 3.8vw, 28px)}
      .status span{font-size:clamp(13px, 2.8vw, 20px)}
      .subnote{font-size:clamp(13px, 2.8vw, 18px)}
    }

    @media (prefers-reduced-motion:reduce){
      body::before,
      .brand-badge,
      .status .lamp,
      .marquee,
      .msg{
        animation:none !important;
      }
    }
  </style>
</head>
<body>
  <!--
    ============================
    문구 수정은 아래 3곳만 바꾸면 됩니다
    1) brand-text
    2) msg 안의 문구
    3) subnote
    ============================
  -->

  <div id="fsOverlay" class="fs-overlay">
    <div class="fs-card">
      <h1 class="fs-title">전체화면 전광판 시작</h1>
      <p class="fs-desc">
        버튼을 한 번 누르면 가능한 범위에서 전체화면으로 전환합니다.<br>
        노트8에서는 가로로 돌려 사용하면 가장 보기 좋습니다.
      </p>
      <div class="fs-actions">
        <button id="enterFsBtn" class="btn btn-primary" type="button">전체화면 시작</button>
        <button id="closeOverlayBtn" class="btn btn-secondary" type="button">그냥 보기</button>
      </div>
      <div class="fs-note">
        브라우저 종류에 따라 주소창은 일부 남을 수 있습니다.
      </div>
    </div>
  </div>

  <div class="wrap" id="app">
    <div class="topbar">
      <div class="brand">
        <div class="brand-badge"></div>
        <div class="brand-text">계명태권도 전광판 안내</div>
      </div>

      <div class="status">
        <div class="lamp"></div>
        <span>NOW DISPLAYING</span>
      </div>
    </div>

    <section class="board" aria-label="전광판 안내 문구">
      <div class="marquee-shell">
        <div class="marquee">
          <div class="msg">
            <span>지금은 유치부 수련 시간입니다 🙂</span>
            <span class="separator">✦</span>
            <span class="accent">아이들의 집중을 위해 잠시만 기다려 주세요</span>
            <span class="separator">✦</span>
          </div>

          <div class="msg" aria-hidden="true">
            <span>지금은 유치부 수련 시간입니다 🙂</span>
            <span class="separator">✦</span>
            <span class="accent">아이들의 집중을 위해 잠시만 기다려 주세요</span>
            <span class="separator">✦</span>
          </div>
        </div>
      </div>
    </section>

    <div class="footer">
      <div class="subnote">
        아이들이 즐겁게 성장하는 공간 · 계명태권도
      </div>
    </div>
  </div>

  <script>
    const fsOverlay = document.getElementById('fsOverlay');
    const enterFsBtn = document.getElementById('enterFsBtn');
    const closeOverlayBtn = document.getElementById('closeOverlayBtn');
    const docEl = document.documentElement;
    const bodyEl = document.body;

    async function enterFullscreen() {
      try {
        if (!document.fullscreenElement) {
          if (docEl.requestFullscreen) {
            await docEl.requestFullscreen({ navigationUI: "hide" });
          } else if (docEl.webkitRequestFullscreen) {
            docEl.webkitRequestFullscreen();
          } else if (docEl.msRequestFullscreen) {
            docEl.msRequestFullscreen();
          }
        }
      } catch (e) {
        console.log('Fullscreen request failed:', e);
      } finally {
        activateDisplayMode();
      }
    }

    function activateDisplayMode() {
      fsOverlay.classList.add('hidden');
      bodyEl.classList.add('fullscreen-active');
      window.scrollTo(0, 1);
    }

    function exitDisplayMode() {
      bodyEl.classList.remove('fullscreen-active');
      fsOverlay.classList.remove('hidden');
    }

    enterFsBtn.addEventListener('click', async () => {
      await enterFullscreen();
    });

    closeOverlayBtn.addEventListener('click', () => {
      activateDisplayMode();
    });

    document.addEventListener('fullscreenchange', () => {
      if (document.fullscreenElement) {
        bodyEl.classList.add('fullscreen-active');
        fsOverlay.classList.add('hidden');
      } else {
        bodyEl.classList.remove('fullscreen-active');
      }
    });

    document.addEventListener('webkitfullscreenchange', () => {
      if (document.webkitFullscreenElement) {
        bodyEl.classList.add('fullscreen-active');
        fsOverlay.classList.add('hidden');
      } else {
        bodyEl.classList.remove('fullscreen-active');
      }
    });

    // 더블탭으로 오버레이 다시 열기
    let lastTap = 0;
    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTap < 300) {
        if (fsOverlay.classList.contains('hidden')) {
          if (document.fullscreenElement && document.exitFullscreen) {
            document.exitFullscreen().catch(() => {});
          }
          exitDisplayMode();
        }
      }
      lastTap = now;
    }, { passive: true });

    // 화면 회전/리사이즈 시 주소창 최소화 유도
    window.addEventListener('resize', () => {
      setTimeout(() => window.scrollTo(0, 1), 50);
    });

    window.addEventListener('orientationchange', () => {
      setTimeout(() => window.scrollTo(0, 1), 100);
    });

    // 초기 스크롤 살짝 내려 주소창 줄이기 유도
    window.addEventListener('load', () => {
      setTimeout(() => window.scrollTo(0, 1), 120);
    });
  </script>
</body>
</html>
