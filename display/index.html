<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>계명태권도 전광판</title>

  <meta name="theme-color" content="#050816" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    :root{
      --bg1:#050816;
      --bg2:#09142c;
      --bg3:#0b1c3f;
      --gold:#ffd76a;
      --gold2:#fff0b5;
      --blue:#63baff;
      --white:#ffffff;

      --safeTop: calc(env(safe-area-inset-top, 0px) + 6px);
      --safeRight: calc(env(safe-area-inset-right, 0px) + 10px);
      --safeBottom: calc(env(safe-area-inset-bottom, 0px) + 6px);
      --safeLeft: calc(env(safe-area-inset-left, 0px) + 10px);

      --panelWidth:min(98vw, 1800px);
      --panelHeight:min(58vh, 400px);

      --topHeight: clamp(58px, 10vh, 92px);
      --radius: 28px;
      --msgSize: clamp(48px, 8vw, 138px);

      --topGap: clamp(6px, 1vh, 12px);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      background:#050816;
      font-family:
        "Pretendard Variable",
        "Pretendard",
        "Noto Sans KR",
        "Apple SD Gothic Neo",
        "Malgun Gothic",
        sans-serif;
    }

    body{
      position:relative;
      min-height:100svh;
      min-height:100dvh;
      color:#fff;
      user-select:none;
      -webkit-user-select:none;
      touch-action:manipulation;
    }

    .bg{
      position:absolute;
      inset:0;
      overflow:hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(90,166,255,.22), transparent 25%),
        radial-gradient(circle at 80% 22%, rgba(255,215,106,.14), transparent 18%),
        radial-gradient(circle at 50% 85%, rgba(71,126,255,.16), transparent 24%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 48%, var(--bg3) 100%);
    }

    .bg::before{
      content:"";
      position:absolute;
      inset:-10%;
      background:
        linear-gradient(90deg,
          transparent 0%,
          rgba(255,255,255,.02) 25%,
          transparent 50%,
          rgba(255,255,255,.015) 75%,
          transparent 100%);
      animation:bgSweep 16s linear infinite;
      pointer-events:none;
    }

    .bg::after{
      content:"";
      position:absolute;
      inset:0;
      background-image: radial-gradient(rgba(255,255,255,.10) .8px, transparent .8px);
      background-size:22px 22px;
      opacity:.10;
      pointer-events:none;
    }

    @keyframes bgSweep{
      from{ transform:translate3d(-8%,0,0); }
      to{ transform:translate3d(8%,0,0); }
    }

    .screen{
      position:relative;
      z-index:2;
      width:100%;
      height:100%;
      min-height:100svh;
      min-height:100dvh;

      display:grid;
      grid-template-rows:auto 1fr;
      align-items:start;
      justify-items:center;
      gap:var(--topGap);

      padding:
        var(--safeTop)
        var(--safeRight)
        var(--safeBottom)
        var(--safeLeft);
    }

    .topbar{
      width:var(--panelWidth);
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:clamp(2px, .6vh, 8px);
    }

    .top-chip{
      width:100%;
      min-height:var(--topHeight);
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:16px;
      padding:0 clamp(18px, 2.5vw, 30px);
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.14);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 10px 28px rgba(0,0,0,.28);
    }

    .led{
      width:clamp(16px, 2vw, 26px);
      height:clamp(16px, 2vw, 26px);
      border-radius:50%;
      flex:0 0 auto;
      background:#ffd94f;
      box-shadow:
        0 0 16px rgba(255,217,79,.85),
        0 0 36px rgba(255,217,79,.35);
      animation:pulse 2.2s ease-in-out infinite;
    }

    @keyframes pulse{
      0%,100%{ transform:scale(1); opacity:1; }
      50%{ transform:scale(.92); opacity:.82; }
    }

    .site-name{
      min-width:0;
      font-size:clamp(28px, 4vw, 60px);
      font-weight:950;
      line-height:1;
      color:var(--gold2);
      letter-spacing:-0.03em;
      white-space:nowrap;
      overflow:visible;
      text-overflow:clip;
      text-shadow:
        0 0 8px rgba(255,215,106,.18),
        0 0 16px rgba(255,215,106,.10);
    }

    .panel-wrap{
      width:100%;
      height:100%;
      min-height:0;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .panel{
      position:relative;
      width:var(--panelWidth);
      height:var(--panelHeight);
      max-height:100%;
      overflow:hidden;
      border-radius:var(--radius);
      border:1px solid rgba(255,255,255,.12);
      background:
        linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03)),
        linear-gradient(135deg, rgba(25,40,78,.93), rgba(8,15,35,.97));
      box-shadow:
        0 12px 28px rgba(0,0,0,.34),
        inset 0 0 0 1px rgba(255,255,255,.03);
    }

    .panel::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 25% 20%, rgba(255,255,255,.07), transparent 18%),
        radial-gradient(circle at 75% 75%, rgba(93,184,255,.07), transparent 24%);
      pointer-events:none;
    }

    .panel::after{
      content:"";
      position:absolute;
      inset:0;
      background-image: radial-gradient(rgba(255,255,255,.14) .7px, transparent .7px);
      background-size:24px 24px;
      opacity:.08;
      pointer-events:none;
    }

    .marquee-stage{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      overflow:hidden;
      padding:0 18px;
      mask-image: linear-gradient(to right, transparent 0, #000 5%, #000 95%, transparent 100%);
      -webkit-mask-image: linear-gradient(to right, transparent 0, #000 5%, #000 95%, transparent 100%);
    }

    .marquee-track{
      position:absolute;
      left:0;
      top:50%;
      display:flex;
      align-items:center;
      gap:clamp(36px, 4vw, 64px);
      width:max-content;
      min-width:max-content;
      white-space:nowrap;
      will-change:transform;
      transform:translate3d(0,-50%,0);
      backface-visibility:hidden;
    }

    .message-set{
      display:flex;
      align-items:center;
      gap:clamp(26px, 2.8vw, 44px);
      padding-right:clamp(54px, 6vw, 100px);
      flex:0 0 auto;
    }

    .message{
      display:flex;
      align-items:center;
      gap:.22em;
      font-size:var(--msgSize);
      font-weight:950;
      line-height:1;
      letter-spacing:-0.05em;
      white-space:nowrap;
      text-rendering:geometricPrecision;
      -webkit-font-smoothing:antialiased;
      backface-visibility:hidden;
      transform:translateZ(0);
    }

    .word-main{
      color:#fffef9;
      text-shadow:
        0 0 5px rgba(255,255,255,.14),
        0 0 10px rgba(255,255,255,.08);
    }

    .word-point{
      color:var(--gold2);
      text-shadow:
        0 0 6px rgba(255,215,106,.18),
        0 0 12px rgba(255,215,106,.10);
    }

    .spark{
      font-size:.68em;
      color:#b7e4ff;
      text-shadow:
        0 0 5px rgba(93,184,255,.18),
        0 0 10px rgba(93,184,255,.10);
      animation:sparkle 1.8s ease-in-out infinite;
    }

    .dot-face{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:.9em;
      height:.9em;
      border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #fff8d2 0%, #ffe27f 55%, #ffc94a 100%);
      box-shadow:
        0 0 8px rgba(255,215,106,.18),
        0 0 14px rgba(255,215,106,.10);
      font-size:.42em;
      line-height:1;
    }

    .divider{
      font-size:clamp(40px, 5vw, 78px);
      font-weight:900;
      color:rgba(183,228,255,.9);
      text-shadow:0 0 12px rgba(93,184,255,.12);
      transform:translateY(-2px);
      flex:0 0 auto;
    }

    @keyframes sparkle{
      0%,100%{ opacity:1; transform:scale(1); }
      50%{ opacity:.84; transform:scale(.92); }
    }

    .fullscreen-hint{
      position:fixed;
      left:50%;
      bottom:12px;
      transform:translateX(-50%);
      z-index:5;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(10,18,40,.72);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 8px 20px rgba(0,0,0,.25);
      color:rgba(255,255,255,.88);
      font-size:14px;
      font-weight:700;
      letter-spacing:.01em;
      white-space:nowrap;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      animation:hintFade 8s ease forwards;
      pointer-events:none;
    }

    @keyframes hintFade{
      0%,70%{ opacity:1; }
      100%{ opacity:0; visibility:hidden; }
    }

    body.tight .screen{
      gap:4px;
      padding:
        calc(env(safe-area-inset-top, 0px) + 4px)
        0
        calc(env(safe-area-inset-bottom, 0px) + 4px)
        0;
    }

    body.tight .topbar{
      width:min(99vw, 1850px);
      padding:0 6px;
      margin-bottom:2px;
    }

    body.tight .top-chip{
      min-height:clamp(50px, 8vh, 78px);
    }

    body.tight .panel{
      width:100vw;
      width:100dvw;
      height:calc(100dvh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px) - 72px);
      border-radius:0;
      border:none;
      box-shadow:none;
    }

    body.tight .panel-wrap{
      width:100%;
      height:100%;
    }

    body.tight .site-name{
      font-size:clamp(22px, 4vw, 54px);
    }

    body.tight .message{
      font-size:clamp(44px, 7.6vw, 140px);
    }

    @media (max-height: 620px){
      :root{
        --panelHeight:min(54vh, 260px);
        --msgSize:clamp(34px, 6.2vw, 86px);
        --topHeight:50px;
        --topGap:4px;
      }

      .site-name{
        font-size:clamp(20px, 3.2vw, 32px);
      }

      .fullscreen-hint{
        font-size:12px;
        padding:8px 12px;
      }
    }

    @media (max-width: 900px){
      :root{
        --panelWidth:min(98vw, 1700px);
        --panelHeight:min(52vh, 340px);
        --msgSize:clamp(38px, 8vw, 92px);
      }

      .site-name{
        font-size:clamp(21px, 4.4vw, 38px);
      }

      .marquee-stage{
        padding:0 12px;
      }
    }
  </style>
</head>
<body>
  <script>
    /* =========================================================
       [여기만 수정하면 됨]  ← 문구 수정 전용 영역
       ========================================================= */

    const BOARD_CONFIG = {
      topTitle: "계명태권도.com",

      /* 초당 이동 픽셀 수 : 숫자가 작을수록 천천히 */
      speedPxPerSec: 95,

      /* 한 바퀴 끝난 뒤 다시 시작 전 대기시간(ms) */
      restartDelay: 1200,

      /* 세트 사이 구분점 */
      divider: "•",

      /* 문구 세트 */
      sets: [
        {
          left: [
            { text: "지금은", cls: "word-main" },
            { text: "1,2부 연결수련 시간", cls: "word-point" },
            { text: "입니다", cls: "word-main" },
            { text: "🙂", cls: "dot-face" },
            { text: "✦", cls: "spark" }
          ],
          right: [
            { text: "아이들의 집중을 위해", cls: "word-main" },
            { text: "조용히 호출해 주세요", cls: "word-point" },
            { text: "✦", cls: "spark" }
          ]
        },
        {
          left: [
            { text: "계명태권도는", cls: "word-main" },
            { text: "홈페이지를", cls: "word-point" },
            { text: "운영중입니다", cls: "word-main" },
            { text: "🙂", cls: "dot-face" },
            { text: "✦", cls: "spark" }
          ],
          right: [
            { text: "인터넷 주소창에", cls: "word-main" },
            { text: "계명태권도.com을 입력해주세요~", cls: "word-point" },
            { text: "✦", cls: "spark" }
          ]
        }
      ]
    };
  </script>

  <div class="bg"></div>

  <div class="screen">
    <div class="topbar">
      <div class="top-chip">
        <span class="led" aria-hidden="true"></span>
        <span class="site-name" id="siteName">계명태권도.com</span>
      </div>
    </div>

    <div class="panel-wrap">
      <div class="panel">
        <div class="marquee-stage" id="marqueeStage">
          <div class="marquee-track" id="marqueeTrack"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="fullscreen-hint" id="fullscreenHint">화면을 한 번 터치하면 전체화면과 화면꺼짐 방지를 시도합니다</div>

  <script>
    let wakeLock = null;
    let wakeLockTimer = null;
    let marqueeRaf = null;
    let marqueeStartTime = null;
    let cycleDistance = 0;
    let cycleDuration = 0;
    let resetWaiting = false;
    let resetStartTime = 0;

    const params = new URLSearchParams(location.search);
    const marqueeStage = document.getElementById('marqueeStage');
    const marqueeTrack = document.getElementById('marqueeTrack');
    const fullscreenHint = document.getElementById('fullscreenHint');
    const siteName = document.getElementById('siteName');

    if(params.get('tight') === '1'){
      document.body.classList.add('tight');
    }

    function setBodyHeight(){
      document.body.style.minHeight = window.innerHeight + 'px';
    }

    async function requestWakeLock(){
      try{
        if('wakeLock' in navigator){
          if(wakeLock) return;
          wakeLock = await navigator.wakeLock.request('screen');

          wakeLock.addEventListener('release', async () => {
            wakeLock = null;
            if(document.visibilityState === 'visible'){
              try{
                wakeLock = await navigator.wakeLock.request('screen');
              }catch(e){}
            }
          });
        }
      }catch(err){}
    }

    async function refreshWakeLock(){
      try{
        if(wakeLock){
          await wakeLock.release();
          wakeLock = null;
        }
      }catch(err){}
      await requestWakeLock();
    }

    async function requestFullscreen(){
      try{
        const el = document.documentElement;
        if(!document.fullscreenElement && el.requestFullscreen){
          await el.requestFullscreen();
        }
      }catch(err){}
    }

    function hideHint(){
      if(fullscreenHint){
        fullscreenHint.style.display = 'none';
      }
    }

    async function activateDisplayMode(){
      await requestFullscreen();
      await requestWakeLock();
      hideHint();
      window.scrollTo(0, 1);
      setBodyHeight();
    }

    function startWakeLockKeeper(){
      if(wakeLockTimer) clearInterval(wakeLockTimer);

      wakeLockTimer = setInterval(async () => {
        if(document.visibilityState === 'visible'){
          await requestWakeLock();
        }
      }, 25000);
    }

    function createPiece(piece){
      const span = document.createElement('span');
      span.className = piece.cls || 'word-main';
      span.textContent = piece.text;
      return span;
    }

    function createMessage(pieces, ariaLabel){
      const div = document.createElement('div');
      div.className = 'message';
      if(ariaLabel) div.setAttribute('aria-label', ariaLabel);

      pieces.forEach(piece => {
        div.appendChild(createPiece(piece));
      });

      return div;
    }

    function buildBoard(){
      siteName.textContent = BOARD_CONFIG.topTitle || '계명태권도.com';
      marqueeTrack.innerHTML = '';

      BOARD_CONFIG.sets.forEach((setObj, index) => {
        const set = document.createElement('div');
        set.className = 'message-set';

        const leftMsg = createMessage(setObj.left, `현재 문구 ${index * 2 + 1}`);
        const divider = document.createElement('div');
        divider.className = 'divider';
        divider.textContent = BOARD_CONFIG.divider || '•';
        const rightMsg = createMessage(setObj.right, `현재 문구 ${index * 2 + 2}`);

        set.appendChild(leftMsg);
        set.appendChild(divider);
        set.appendChild(rightMsg);

        marqueeTrack.appendChild(set);
      });
    }

    function measureAndReset(){
      cancelAnimationFrame(marqueeRaf);
      marqueeRaf = null;

      const stageWidth = marqueeStage.clientWidth;
      const trackWidth = marqueeTrack.scrollWidth;

      cycleDistance = trackWidth + stageWidth;
      cycleDuration = (cycleDistance / Math.max(30, BOARD_CONFIG.speedPxPerSec)) * 1000;

      marqueeTrack.style.transform = `translate3d(${stageWidth}px, -50%, 0)`;

      marqueeStartTime = null;
      resetWaiting = false;
      resetStartTime = 0;

      marqueeRaf = requestAnimationFrame(animateMarquee);
    }

    function animateMarquee(timestamp){
      if(!marqueeStartTime) marqueeStartTime = timestamp;

      if(resetWaiting){
        if(timestamp - resetStartTime >= BOARD_CONFIG.restartDelay){
          const stageWidth = marqueeStage.clientWidth;
          marqueeTrack.style.transform = `translate3d(${stageWidth}px, -50%, 0)`;
          marqueeStartTime = timestamp;
          resetWaiting = false;
        }
        marqueeRaf = requestAnimationFrame(animateMarquee);
        return;
      }

      const elapsed = timestamp - marqueeStartTime;
      const progress = Math.min(elapsed / cycleDuration, 1);

      const stageWidth = marqueeStage.clientWidth;
      const x = stageWidth - (cycleDistance * progress);

      marqueeTrack.style.transform = `translate3d(${x}px, -50%, 0)`;

      if(progress >= 1){
        resetWaiting = true;
        resetStartTime = timestamp;
      }

      marqueeRaf = requestAnimationFrame(animateMarquee);
    }

    document.addEventListener('visibilitychange', async () => {
      if(document.visibilityState === 'visible'){
        await requestWakeLock();
        setBodyHeight();
        measureAndReset();
      }
    });

    window.addEventListener('load', async () => {
      buildBoard();
      setBodyHeight();
      await requestWakeLock();
      startWakeLockKeeper();
      window.scrollTo(0, 1);

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          measureAndReset();
        });
      });
    });

    window.addEventListener('resize', () => {
      setBodyHeight();
      measureAndReset();
    });

    window.addEventListener('orientationchange', () => {
      setBodyHeight();
      setTimeout(measureAndReset, 250);
    });

    window.addEventListener('focus', requestWakeLock);

    document.body.addEventListener('click', activateDisplayMode, { passive:true });
    document.body.addEventListener('touchstart', activateDisplayMode, { passive:true });

    document.body.addEventListener('touchend', async () => {
      await requestWakeLock();
    }, { passive:true });

    document.body.addEventListener('mousemove', async () => {
      await requestWakeLock();
    }, { passive:true });

    document.body.addEventListener('keydown', async () => {
      await requestWakeLock();
    });

    setInterval(() => {
      window.scrollTo(0, 1);
    }, 15000);

    setInterval(async () => {
      await refreshWakeLock();
    }, 180000);
  </script>
</body>
</html>
