<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>갤러리 & 영상 | 계명태권도</title>
  <meta name="description" content="계명태권도 공식 갤러리 & 영상. 수련, 심사, 행사, 성장 기록을 한 곳에서 확인하세요." />
  <meta name="theme-color" content="#0b0f19" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="계명태권도 | 갤러리 & 영상" />
  <meta property="og:description" content="수련·심사·행사·성장 기록. 모바일 최적화 갤러리." />

  <style>
    :root{
      --bg:#0b0f19;
      --line:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.68);
      --gold:#d7b56d;
      --blue:#66b3ff;
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --r:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: radial-gradient(1200px 700px at 18% -10%, rgba(102,179,255,.15), transparent 55%),
                  radial-gradient(900px 650px at 100% 0%, rgba(215,181,109,.14), transparent 58%),
                  linear-gradient(180deg, #070b14, var(--bg));
      color:var(--text);
    }
    a{color:inherit; text-decoration:none}
    .wrap{max-width:1100px; margin:0 auto; padding:20px 16px 90px}

    .topbar{
      position:sticky; top:0; z-index:50;
      backdrop-filter: blur(10px);
      background: rgba(11,15,25,.68);
      border-bottom:1px solid var(--line);
    }
    .topbar .inner{
      max-width:1100px; margin:0 auto;
      display:flex; align-items:center; gap:10px;
      padding:10px 16px;
    }
    .brand{display:flex; flex-direction:column; gap:2px}
    .brand b{letter-spacing:.2px}
    .brand small{color:var(--muted)}
    .spacer{flex:1}
    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      color:var(--text);
      cursor:pointer;
      user-select:none;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
      font-weight:650;
      white-space:nowrap;
    }
    .btn:hover{transform: translateY(-1px); border-color: rgba(215,181,109,.35)}
    .btn:active{transform: translateY(0px)}
    .btn.primary{
      border-color: rgba(102,179,255,.35);
      background: linear-gradient(180deg, rgba(102,179,255,.16), rgba(255,255,255,.03));
    }
    .btn.gold{
      border-color: rgba(215,181,109,.45);
      background: linear-gradient(180deg, rgba(215,181,109,.18), rgba(255,255,255,.03));
    }

    .status{
      display:flex; gap:10px; flex-wrap:wrap; align-items:center;
      padding:10px 12px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.16);
      margin-top:14px;
      color: rgba(255,255,255,.78);
      font-size:12px;
    }
    .pill{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      font-weight:800;
      color: rgba(255,255,255,.90);
    }
    .pill.ok{border-color: rgba(102,179,255,.35)}
    .pill.bad{border-color: rgba(255,120,120,.35)}

    .cardBox{
      margin-top:18px;
      border:1px solid var(--line);
      border-radius: var(--r);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .cardBox .head{
      display:flex; align-items:flex-end; justify-content:space-between; gap:12px;
      padding:16px 16px 12px;
      border-bottom:1px solid var(--line);
    }
    .cardBox .head h2{margin:0; font-size:18px}
    .cardBox .head p{margin:0; color:var(--muted); font-size:13px; line-height:1.55}
    .cardBox .body{padding:14px 14px 16px}

    .searchRow{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    .searchRow .field{
      flex:1; display:flex; align-items:center; gap:8px;
      padding:10px 12px; border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      min-width: 220px;
    }
    .searchRow input{
      width:100%; border:0; outline:none; background:transparent;
      color:var(--text); font-size:14px;
    }
    .xbtn{
      width:34px; height:34px; border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.86);
      cursor:pointer;
      display:grid; place-items:center;
      font-weight:800;
    }

    .resultTop{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 12px; border-radius: 16px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.16);
      margin-top:12px;
    }
    .resultTop b{font-size:13px}
    .resultTop small{color: rgba(255,255,255,.70)}

    .carousel{
      margin-top:10px;
      border:1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      background: rgba(0,0,0,.18);
      overflow:hidden;
    }
    .pages{
      display:flex; overflow-x:auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior:smooth;
    }
    .page{scroll-snap-align: start; flex:0 0 100%; padding:12px;}

    .gridThumb{display:grid; gap:10px;}
    .gridThumb{ grid-template-columns: repeat(3, 1fr); }
    @media (min-width: 560px){ .gridThumb{ grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 920px){ .gridThumb{ grid-template-columns: repeat(6, 1fr); } }

    .pitem{
      border-radius: 14px; overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      cursor:pointer;
    }
    .pitem img{
      width:100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display:block;
      transition: transform .18s ease, filter .18s ease;
    }
    .pitem:hover img{transform: scale(1.05); filter:saturate(1.08)}

    .dotsRow{
      display:flex; align-items:center; justify-content:center; gap:7px;
      padding:10px 10px 12px;
      border-top:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.10);
    }
    .dot{
      width:7px;height:7px;border-radius:999px;
      background: rgba(255,255,255,.35);
      border:1px solid rgba(255,255,255,.22);
      cursor:pointer;
    }
    .dot.on{ background: rgba(102,179,255,.92); border-color: rgba(102,179,255,.35); }

    .cover{display:grid; grid-template-columns: 1.2fr .8fr; gap:12px; align-items:stretch;}
    .coverMain{
      border:1px solid var(--line);
      border-radius: 18px;
      overflow:hidden;
      background: rgba(0,0,0,.22);
      height: 380px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    /* ✅ 대표사진: 짤림 방지 */
    .coverMain img{
      width:100%;
      height:100%;
      object-fit: contain;
      display:block;
      background:#000;
    }
    @media (max-width: 980px){
      .cover{grid-template-columns: 1fr}
      .coverMain{height: 280px;}
    }

    .thumbRail{
      border:1px solid var(--line);
      border-radius: 18px;
      background: rgba(0,0,0,.18);
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width: 280px;
    }
    .railTopRow{display:flex; align-items:center; justify-content:space-between; gap:10px;}
    .railNav{display:flex; gap:8px; align-items:center;}
    .navMini{
      width:40px; height:36px; border-radius: 12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.92);
      cursor:pointer; font-weight:900;
      display:grid; place-items:center;
    }
    .railMeta{color: rgba(255,255,255,.70); font-size:12px;}
    .thumbPager{
      border:1px solid rgba(255,255,255,.10);
      border-radius: 16px;
      overflow:hidden;
      background: rgba(0,0,0,.12);
    }
    .thumbPages{
      display:flex; overflow-x:auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior:smooth;
    }
    .thumbPage{scroll-snap-align: start; flex:0 0 100%; padding:8px;}
    .thumbGrid{display:grid; grid-template-columns: repeat(3, 1fr); gap:8px;}

    .titem{
      border-radius: 14px; overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      cursor:pointer;
      position:relative;
    }
    .titem img{width:100%; aspect-ratio:1/1; object-fit:cover; display:block;}
    .titem.active{border-color: rgba(102,179,255,.45);}
    .titem.active::after{
      content:""; position:absolute; inset:0;
      box-shadow: inset 0 0 0 2px rgba(102,179,255,.55);
      border-radius: 14px; pointer-events:none;
    }
    .thumbDots{
      display:flex; align-items:center; justify-content:center; gap:7px;
      padding:10px;
      border-top:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.10);
    }

    .slideshow{
      margin-top:12px;
      border:1px solid var(--line);
      border-radius: 18px;
      overflow:hidden;
      background: rgba(0,0,0,.18);
    }
    .slideTop{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .slideTop b{font-size:14px}
    .slideTop small{color:var(--muted); font-size:12px}
    .slideBox{
      position:relative;
      width:100%;
      aspect-ratio: 16 / 9;
      background:#000;
      overflow:hidden;
    }

    /* ✅✅✅ 핵심 수정: 슬라이드쇼도 짤림 방지 */
    .slideBox img{
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit: contain;   /* ← cover → contain 으로 변경 */
      display:block;
      opacity:0;
      transition: opacity .35s ease;
      background:#000;       /* 검은 여백 자연스럽게 */
    }
    .slideBox img.show{opacity:1}

    .navBtn{
      position:absolute; top:50%;
      transform: translateY(-50%);
      width:44px; height:44px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.35);
      color: rgba(255,255,255,.92);
      display:grid; place-items:center;
      cursor:pointer;
      user-select:none;
      z-index: 2;
    }
    .navBtn.prev{left:10px}
    .navBtn.next{right:10px}

    .lb{
      position:fixed; inset:0;
      background: rgba(0,0,0,.78);
      display:none;
      z-index: 9999;
      padding: 16px;
    }
    .lb.show{display:flex}
    .lb .panel{
      margin:auto;
      width:min(980px, 100%);
      border-radius: 18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(15,22,42,.88);
      backdrop-filter: blur(10px);
      box-shadow: 0 30px 120px rgba(0,0,0,.65);
    }
    .lb-top{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.12);
    }
    .iconbtn{
      padding:9px 10px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.20);
      cursor:pointer;
      color: rgba(255,255,255,.88);
      font-weight:750;
      white-space:nowrap;
    }
    .lb-img{
      width:100%;
      max-height: calc(100vh - 220px);
      object-fit: contain;
      display:block;
      margin: 0 auto;
      background: rgba(0,0,0,.30);
    }

    #toast{
      position:fixed; left:50%; bottom:18px; transform: translateX(-50%);
      padding:10px 12px; border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(15,22,42,.88);
      backdrop-filter: blur(10px);
      color: rgba(255,255,255,.92);
      font-weight:750;
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
      z-index: 10000;
      opacity:0;
      transition: opacity .2s ease;
      pointer-events:none;
    }

    .videoGrid{
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
    }
    @media (min-width: 860px){
      .videoGrid{ grid-template-columns: 1fr 1fr; }
    }
    .vCard{
      border:1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      overflow:hidden;
      background: rgba(0,0,0,.18);
    }
    .vHead{
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .vHead b{font-size:13px}
    .vHead small{color: rgba(255,255,255,.70)}
    .vFrame{
      width:100%;
      aspect-ratio: 16 / 9;
      background:#000;
    }
    .vFrame iframe{width:100%; height:100%; border:0; display:block;}

    .channelCard{
      padding:14px 12px;
      text-align:center;
    }
    .channelCard a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(102,179,255,.35);
      background: linear-gradient(180deg, rgba(102,179,255,.16), rgba(255,255,255,.03));
      color: rgba(255,255,255,.92);
      font-weight:800;
      text-decoration:none;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="inner">
      <div class="brand">
        <b>계명태권도</b>
        <small>Gallery & Video</small>
      </div>

      <div class="spacer"></div>

      <a class="btn gold" href="../index.html">🏠 홈으로</a>

      <div class="searchRow" style="margin:0; flex-wrap:nowrap;">
        <div class="field" style="min-width:240px;">
          🔎
          <input id="qTop" type="text" inputmode="search" autocomplete="off" placeholder="이름/아이디 검색 (예: 김예담 / KM001)" />
          <button class="xbtn" id="btnClearTop" type="button" title="지우기">✕</button>
        </div>
        <button class="btn primary" id="btnSearchTop" type="button">조회</button>
      </div>

      <button class="btn primary" id="btnScrollTop" type="button">⬆️</button>
    </div>
  </div>

  <main class="wrap">

    <div class="status" id="statusBar">
      <span class="pill" id="pillDevice">기기</span>
      <span class="pill" id="pillData">데이터</span>
      <span class="pill" id="pillRender">렌더</span>
      <span id="statusMsg">초기화 중…</span>
    </div>

    <section class="cardBox" id="searchSection">
      <div class="head">
        <div>
          <h2>사진 조회</h2>
          <p>이름/아이디로 검색 후 사진을 확인합니다. (검색 결과는 썸네일 5줄 단위로 페이지가 나뉩니다)</p>
        </div>
      </div>

      <div class="body">
        <div class="searchRow">
          <div class="field">
            🔎
            <input id="q" type="text" inputmode="search" autocomplete="off" placeholder="이름/아이디 입력 (예: 김예담 / KM001)" />
            <button class="xbtn" id="btnClear" type="button" title="지우기">✕</button>
          </div>
          <button class="btn primary" id="btnSearch" type="button">조회</button>
          <button class="btn" id="btnShowAll" type="button">전체</button>
        </div>

        <div id="resultArea" style="display:none;">
          <div class="resultTop">
            <div>
              <b id="resultTitle">결과</b><br/>
              <small id="resultMeta">—</small>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;">
              <button class="btn" id="btnCopyQueryLink" type="button">🔗 결과 링크복사</button>
            </div>
          </div>

          <div class="carousel">
            <div class="pages" id="pages"></div>
            <div class="dotsRow" id="dotsRow"></div>
          </div>
        </div>

        <div id="emptyArea" style="display:none; margin-top:12px; color:rgba(255,255,255,.72); font-size:12px;">
          검색 결과가 없습니다.
        </div>
      </div>
    </section>

    <section class="cardBox">
      <div class="head">
        <div>
          <h2>대표 사진</h2>
          <p>오른쪽 썸네일은 5줄(15장) 단위로 페이지가 나뉘고, 아래 점으로 이동합니다.</p>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap">
          <button class="btn" id="btnCoverPrev" type="button">‹ 이전</button>
          <button class="btn" id="btnCoverNext" type="button">다음 ›</button>
          <button class="btn" id="btnOpenCover" type="button">🔍 확대</button>
        </div>
      </div>

      <div class="body">
        <div class="cover">
          <div class="coverMain">
            <img id="coverImg" src="" alt="대표 사진" />
          </div>

          <aside class="thumbRail">
            <div class="railTopRow">
              <div>
                <b>썸네일</b> <small style="color:var(--muted)">(<span id="thumbCount">0</span>장)</small>
              </div>
              <div class="railNav">
                <button class="navMini" id="btnThumbPrev" type="button">‹</button>
                <button class="navMini" id="btnThumbNext" type="button">›</button>
              </div>
            </div>

            <div class="railMeta" id="thumbMeta">1/1</div>

            <div class="thumbPager">
              <div class="thumbPages" id="thumbPages"></div>
              <div class="thumbDots" id="thumbDots"></div>
            </div>

            <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:2px">
              <button class="btn" id="btnShuffleThumbs" type="button">🎲 섞기</button>
            </div>
          </aside>
        </div>
      </div>
    </section>

    <section class="cardBox">
      <div class="head">
        <div>
          <h2>갤러리 슬라이드 쇼</h2>
          <p>이전/다음 · 자동재생(4초)</p>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap">
          <button class="btn" id="btnPrev" type="button">⟵</button>
          <button class="btn primary" id="btnPlay" type="button">▶ 자동재생</button>
          <button class="btn" id="btnPause" type="button">⏸ 정지</button>
          <button class="btn" id="btnNext" type="button">⟶</button>
          <button class="btn" id="btnOpenSlide" type="button">🔍 확대</button>
        </div>
      </div>

      <div class="body">
        <div class="slideshow">
          <div class="slideTop">
            <div>
              <b id="slideTitle">사진</b><br/>
              <small id="slideSub">—</small>
            </div>
          </div>
          <div class="slideBox" id="slideBox">
            <img id="slideImgA" src="" alt="슬라이드 A" />
            <img id="slideImgB" src="" alt="슬라이드 B" />
            <div class="navBtn prev" id="navPrev">‹</div>
            <div class="navBtn next" id="navNext">›</div>
          </div>
        </div>
      </div>
    </section>

    <section class="cardBox" id="videoSection">
      <div class="head">
        <div>
          <h2>동영상</h2>
          <p>사진 아래에 공식 영상/시범 영상을 배치합니다.</p>
        </div>
      </div>
      <div class="body">
        <div class="videoGrid" id="videoGrid"></div>
      </div>
    </section>

  </main>

  <div class="lb" id="lb" aria-hidden="true">
    <div class="panel" role="dialog" aria-modal="true">
      <div class="lb-top">
        <div>
          <b id="lbTitle">사진</b><br/>
          <small id="lbSub" style="color:rgba(255,255,255,.70)"></small>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end">
          <button class="iconbtn" id="lbClose" type="button">✕ 닫기</button>
        </div>
      </div>
      <div style="background: rgba(0,0,0,.35)">
        <img class="lb-img" id="lbImg" src="" alt="확대 이미지" />
      </div>
    </div>
  </div>

  <div id="toast">복사 완료</div>

  <script>
    // =========================
    // ✅ 1) 이름-아이디 매핑 (전총재님이 수정할 부분)
    // =========================
    var STUDENTS = [
      { id:"KM001", name:"김예담" },
      { id:"KM002", name:"김예성" },
      { id:"KM003", name:"김민규" },
      { id:"KM004", name:"강찬희" },

    function norm(s){
      return String(s||"").toLowerCase()
        .replace(/\s+/g,"")
        .replace(/[._\-]/g,"");
    }

    function uniq(arr){
      var out = [];
      var seen = {};
      for(var i=0;i<arr.length;i++){
        var k = String(arr[i]);
        if(!seen[k]){ seen[k]=1; out.push(arr[i]); }
      }
      return out;
    }

    function chunk(arr, size){
      var out = [];
      for(var i=0;i<arr.length;i+=size){
        out.push(arr.slice(i, i+size));
      }
      return out;
    }

    function findIdsByNamePartial(nameQuery){

        var nm = norm(STUDENTS[i].name);

        }
      }
      return uniq(ids);
    }

    async function fetchGitHubAllFiles(){
      var treeUrl =
        "https://api.github.com/repos/" + GH.owner + "/" + GH.repo +
        "/git/trees/" + encodeURIComponent(GH.branch) + "?recursive=1";

      var res = await fetch(treeUrl, { cache:"no-store" });
      if(!res.ok) throw new Error("GitHub API 오류: " + res.status);
      var data = await res.json();
      var tree = Array.isArray(data.tree) ? data.tree : [];

      var files = [];
      var basePath = GH.path.replace(/^\/+/,"").replace(/\/+$/,"") + "/";
      for(var i=0;i<tree.length;i++){
        var node = tree[i];
        if(!node || node.type !== "blob") continue;
        var p = String(node.path||"");
        if(p.indexOf(basePath) !== 0) continue;

        var lower = p.toLowerCase();
        if(!(lower.endsWith(".jpg") || lower.endsWith(".jpeg") || lower.endsWith(".png") || lower.endsWith(".webp"))) continue;

        var name = p.split("/").pop();
        files.push({ path:p, name:name });
      }
      return files;
    }

    function makeRawUrl(path){
      return "https://raw.githubusercontent.com/" + GH.owner + "/" + GH.repo + "/" + GH.branch + "/" + path;
    }

    function buildItemsFromFiles(files){
      var items = [];
      for(var i=0;i<files.length;i++){
        var f = files[i];
        var id = extractIdFromFilename(f.name);
        var url = makeRawUrl(f.path);

        var studentName = (id && MAPS.idToName[id]) ? MAPS.idToName[id] : "";
        var base = studentName ? (studentName + " (" + id + ")") : (id || f.name);

        var tags = [f.name, id, studentName, base].filter(Boolean);
        tags = uniq(tags);

        items.push({
          id: i+1,
          file: f.name,
          studentId: id,
          studentName: studentName,
          base: base,
          url: url,
          tags: tags
        });
      }
      return items;
    }

    function matchByKeyword(item, query){
      var nq = norm(query);
      if(!nq) return true;
      var ntags = norm((item.tags || []).join(" "));
      var nbase = norm(item.base || "");
      var nid = norm(item.studentId || "");
      return ntags.indexOf(nq) !== -1 || nbase.indexOf(nq) !== -1 || nid.indexOf(nq) !== -1;
    }

    function runSearch(query){
      if(!ITEMS.length) return;

      var queryText = String(query || "").trim();

      var filtered = [];

      if(looksLikeId(queryText)){
        var id = queryText.toUpperCase();
        for(var i=0;i<ITEMS.length;i++){
          if(String(ITEMS[i].studentId||"").toUpperCase() === id) filtered.push(ITEMS[i]);
        }
      } else if(norm(queryText)){
        var ids = findIdsByNamePartial(queryText);
        if(ids.length){
          var set = {};
          for(var a=0;a<ids.length;a++) set[ids[a]] = 1;
          for(var j=0;j<ITEMS.length;j++){
            var it = ITEMS[j];
            if(set[String(it.studentId||"").toUpperCase()]) filtered.push(it);
          }
        } else {
          for(var k=0;k<ITEMS.length;k++){
            if(matchByKeyword(ITEMS[k], queryText)) filtered.push(ITEMS[k]);
          }
        }
      } else {
        filtered = ITEMS.slice();
      }

      if(filtered.length === 0){
        resultArea.style.display = "none";
        emptyArea.style.display = "block";
        return;
      }

      renderResultCarousel(filtered);

      try{
        var u = new URL(location.href);
        if(queryText) u.searchParams.set("q", queryText);
        else u.searchParams.delete("q");
        history.replaceState({}, "", u.toString());
      }catch(e){}
    }

      var u = String(url||"").trim();
      if(!u) return "";
      var m1 = u.match(/youtu\.be\/([a-zA-Z0-9_-]{6,})/);
      if(m1) return "https://www.youtube.com/embed/" + m1[1];
      var m2 = u.match(/[?&]v=([a-zA-Z0-9_-]{6,})/);
      if(m2) return "https://www.youtube.com/embed/" + m2[1];
      var m3 = u.match(/shorts\/([a-zA-Z0-9_-]{6,})/);
      if(m3) return "https://www.youtube.com/embed/" + m3[1];
      var m4 = u.match(/embed\/([a-zA-Z0-9_-]{6,})/);
      if(m4) return "https://www.youtube.com/embed/" + m4[1];
      return "";
    }

    function renderVideos(){
      var grid = document.getElementById("videoGrid");
      var section = document.getElementById("videoSection");
      var list = (window.VIDEOS && Array.isArray(window.VIDEOS)) ? window.VIDEOS : [];
      if(!grid || !section) return;

      if(!list.length){
        section.style.display = "none";
        return;
      }

      grid.innerHTML = "";

      list.forEach(function(v, idx){
        var title = String(v.title || ("동영상 " + (idx+1))).trim();
        var embed = toYoutubeEmbed(v.url);
        if(!embed) return;

        var card = document.createElement("div");
        card.className = "vCard";

        var head = document.createElement("div");
        head.className = "vHead";
        head.innerHTML = '<b>' + title + ' ' + (idx+1) + '</b><small>YouTube</small>';

        var frame = document.createElement("div");
        frame.className = "vFrame";
        frame.innerHTML =
          '<iframe src="' + embed + '" ' +
          'title="' + title.replace(/"/g,"") + '" ' +
          'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" ' +
          'allowfullscreen></iframe>';

        card.appendChild(head);
        card.appendChild(frame);
        grid.appendChild(card);
      });

      var ch = document.createElement("div");
      ch.className = "vCard channelCard";
      ch.innerHTML =
        '<a href="' + CHANNEL_URL + '" target="_blank" rel="noopener">▶ 공식 유튜브 채널 바로가기</a>';
      grid.appendChild(ch);
    }

    // INIT
    (async function init(){
      try{
        setPill(pillRender, "렌더: 로딩", true);
        statusMsg.textContent = "GitHub students 폴더에서 사진 목록을 가져오는 중…";

        var files = await fetchGitHubAllFiles();
        ITEMS = buildItemsFromFiles(files);

        ITEMS.sort(function(a,b){
          return String(a.file).localeCompare(String(b.file), "en");
        });

        THUMB_ITEMS = ITEMS.slice();

        setPill(pillData, "데이터: " + ITEMS.length + "장", ITEMS.length > 0);
        setPill(pillRender, ITEMS.length ? "렌더: 완료" : "렌더: 없음", ITEMS.length > 0);

        statusMsg.textContent = ITEMS.length
          ? "정상 동작 중 ✅ (GitHub students 폴더 자동 로드)"
          : "이미지 파일을 찾지 못했습니다. GH.path 경로를 확인해 주세요.";

        if(ITEMS.length){
          renderThumbPager();
          setSlide(0);
          renderVideos();
        }

        try{
          var u = new URL(location.href);
          var qq = u.searchParams.get("q");
          if(qq){
            if(q) q.value = qq;
            if(qTop) qTop.value = qq;
            runSearch(qq);
          }
        }catch(e){}
      }catch(e){
        console.error(e);
        setPill(pillRender, "렌더: 에러", false);
        statusMsg.textContent = "로딩 실패: " + (e && e.message ? e.message : "오류") + " (GH.owner/repo/path 확인)";
      }
    })();
  </script>
