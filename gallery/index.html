<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>갤러리 & 영상 | 계명태권도</title>
  <meta name="description" content="계명태권도 공식 갤러리 & 영상. 수련, 심사, 행사, 성장 기록을 한 곳에서 확인하세요." />
  <meta name="theme-color" content="#0b0f19" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="계명태권도 | 갤러리 & 영상" />
  <meta property="og:description" content="수련·심사·행사·성장 기록. 모바일 최적화 갤러리." />
  <meta property="og:image" content="https://static.wixstatic.com/media/abf917_38e0bc3b3d804b3caa6aa8363163950d~mv2.jpg" />

  <!-- (선택) favicon 404 없애기: 아이콘이 있으면 경로 맞춰주세요 -->
  <!-- <link rel="icon" href="../assets/icons/favicon.ico"> -->

  <style>
    :root{
      --bg:#0b0f19;
      --line:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.68);
      --gold:#d7b56d;
      --blue:#66b3ff;
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --r:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: radial-gradient(1200px 700px at 18% -10%, rgba(102,179,255,.15), transparent 55%),
                  radial-gradient(900px 650px at 100% 0%, rgba(215,181,109,.14), transparent 58%),
                  linear-gradient(180deg, #070b14, var(--bg));
      color:var(--text);
    }
    a{color:inherit; text-decoration:none}
    .wrap{max-width:1100px; margin:0 auto; padding:20px 16px 90px}

    .topbar{
      position:sticky; top:0; z-index:50;
      backdrop-filter: blur(10px);
      background: rgba(11,15,25,.68);
      border-bottom:1px solid var(--line);
    }
    .topbar .inner{
      max-width:1100px; margin:0 auto;
      display:flex; align-items:center; gap:10px;
      padding:10px 16px;
    }
    .brand{display:flex; flex-direction:column; gap:2px}
    .brand b{letter-spacing:.2px}
    .brand small{color:var(--muted)}
    .spacer{flex:1}
    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      color:var(--text);
      cursor:pointer;
      user-select:none;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
      font-weight:650;
      white-space:nowrap;
    }
    .btn:hover{transform: translateY(-1px); border-color: rgba(215,181,109,.35)}
    .btn:active{transform: translateY(0px)}
    .btn.primary{
      border-color: rgba(102,179,255,.35);
      background: linear-gradient(180deg, rgba(102,179,255,.16), rgba(255,255,255,.03));
    }
    .btn.gold{
      border-color: rgba(215,181,109,.45);
      background: linear-gradient(180deg, rgba(215,181,109,.18), rgba(255,255,255,.03));
    }

    .status{
      display:flex; gap:10px; flex-wrap:wrap; align-items:center;
      padding:10px 12px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.16);
      margin-top:14px;
      color: rgba(255,255,255,.78);
      font-size:12px;
    }
    .pill{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      font-weight:800;
      color: rgba(255,255,255,.90);
    }
    .pill.ok{border-color: rgba(102,179,255,.35)}
    .pill.bad{border-color: rgba(255,120,120,.35)}

    .cardBox{
      margin-top:18px;
      border:1px solid var(--line);
      border-radius: var(--r);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .cardBox .head{
      display:flex; align-items:flex-end; justify-content:space-between; gap:12px;
      padding:16px 16px 12px;
      border-bottom:1px solid var(--line);
    }
    .cardBox .head h2{margin:0; font-size:18px}
    .cardBox .head p{margin:0; color:var(--muted); font-size:13px; line-height:1.55}
    .cardBox .body{padding:14px 14px 16px}

    .searchRow{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    .searchRow .field{
      flex:1; display:flex; align-items:center; gap:8px;
      padding:10px 12px; border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      min-width: 220px;
    }
    .searchRow input{
      width:100%; border:0; outline:none; background:transparent;
      color:var(--text); font-size:14px;
    }
    .xbtn{
      width:34px; height:34px; border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.86);
      cursor:pointer;
      display:grid; place-items:center;
      font-weight:800;
    }

    .resultTop{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 12px; border-radius: 16px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.16);
      margin-top:12px;
    }
    .resultTop b{font-size:13px}
    .resultTop small{color: rgba(255,255,255,.70)}

    .carousel{
      margin-top:10px;
      border:1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      background: rgba(0,0,0,.18);
      overflow:hidden;
    }
    .pages{
      display:flex; overflow-x:auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior:smooth;
    }
    .page{scroll-snap-align: start; flex:0 0 100%; padding:12px;}
    .gridThumb{display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;}
    @media (min-width: 820px){ .gridThumb{ grid-template-columns: repeat(6, 1fr); } }
    @media (max-width: 420px){ .gridThumb{ grid-template-columns: repeat(3, 1fr); } }

    .pitem{
      border-radius: 14px; overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      cursor:pointer;
    }
    .pitem img{
      width:100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display:block;
      transition: transform .18s ease, filter .18s ease;
    }
    .pitem:hover img{transform: scale(1.05); filter:saturate(1.08)}

    .dotsRow{
      display:flex; align-items:center; justify-content:center; gap:7px;
      padding:10px 10px 12px;
      border-top:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.10);
    }
    .dot{
      width:7px;height:7px;border-radius:999px;
      background: rgba(255,255,255,.35);
      border:1px solid rgba(255,255,255,.22);
      cursor:pointer;
    }
    .dot.on{ background: rgba(102,179,255,.92); border-color: rgba(102,179,255,.35); }

    .cover{display:grid; grid-template-columns: 1.2fr .8fr; gap:12px; align-items:stretch;}
    .coverMain{
      border:1px solid var(--line);
      border-radius: 18px;
      overflow:hidden;
      background: rgba(0,0,0,.22);
      height: 380px;
    }
    .coverMain img{width:100%; height:100%; object-fit: cover; display:block;}
    @media (max-width: 980px){
      .cover{grid-template-columns: 1fr}
      .coverMain{height: 280px;}
    }

    .thumbRail{
      border:1px solid var(--line);
      border-radius: 18px;
      background: rgba(0,0,0,.18);
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width: 280px;
    }
    .railTopRow{display:flex; align-items:center; justify-content:space-between; gap:10px;}
    .railNav{display:flex; gap:8px; align-items:center;}
    .navMini{
      width:40px; height:36px; border-radius: 12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.92);
      cursor:pointer; font-weight:900;
      display:grid; place-items:center;
    }
    .railMeta{color: rgba(255,255,255,.70); font-size:12px;}
    .thumbPager{
      border:1px solid rgba(255,255,255,.10);
      border-radius: 16px;
      overflow:hidden;
      background: rgba(0,0,0,.12);
    }
    .thumbPages{
      display:flex; overflow-x:auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior:smooth;
    }
    .thumbPage{scroll-snap-align: start; flex:0 0 100%; padding:8px;}
    .thumbGrid{display:grid; grid-template-columns: repeat(3, 1fr); gap:8px;}
    .titem{
      border-radius: 14px; overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      cursor:pointer;
      position:relative;
    }
    .titem img{width:100%; aspect-ratio:1/1; object-fit:cover; display:block;}
    .titem.active{border-color: rgba(102,179,255,.45);}
    .titem.active::after{
      content:""; position:absolute; inset:0;
      box-shadow: inset 0 0 0 2px rgba(102,179,255,.55);
      border-radius: 14px; pointer-events:none;
    }
    .thumbDots{
      display:flex; align-items:center; justify-content:center; gap:7px;
      padding:10px;
      border-top:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.10);
    }

    .slideshow{
      margin-top:12px;
      border:1px solid var(--line);
      border-radius: 18px;
      overflow:hidden;
      background: rgba(0,0,0,.18);
    }
    .slideTop{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .slideTop b{font-size:14px}
    .slideTop small{color:var(--muted); font-size:12px}
    .slideBox{
      position:relative;
      width:100%;
      aspect-ratio: 16 / 9;
      background:#000;
      overflow:hidden;
    }
    .slideBox img{
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit: cover;
      display:block;
      opacity:0;
      transition: opacity .35s ease;
    }
    .slideBox img.show{opacity:1}
    .navBtn{
      position:absolute; top:50%;
      transform: translateY(-50%);
      width:44px; height:44px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.35);
      color: rgba(255,255,255,.92);
      display:grid; place-items:center;
      cursor:pointer;
      user-select:none;
      z-index: 2;
    }
    .navBtn.prev{left:10px}
    .navBtn.next{right:10px}

    .lb{
      position:fixed; inset:0;
      background: rgba(0,0,0,.78);
      display:none;
      z-index: 9999;
      padding: 16px;
    }
    .lb.show{display:flex}
    .lb .panel{
      margin:auto;
      width:min(980px, 100%);
      border-radius: 18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(15,22,42,.88);
      backdrop-filter: blur(10px);
      box-shadow: 0 30px 120px rgba(0,0,0,.65);
    }
    .lb-top{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.12);
    }
    .iconbtn{
      padding:9px 10px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.20);
      cursor:pointer;
      color: rgba(255,255,255,.88);
      font-weight:750;
      white-space:nowrap;
    }
    .lb-img{
      width:100%;
      max-height: calc(100vh - 220px);
      object-fit: contain;
      display:block;
      margin: 0 auto;
      background: rgba(0,0,0,.30);
    }

    #toast{
      position:fixed; left:50%; bottom:18px; transform: translateX(-50%);
      padding:10px 12px; border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(15,22,42,.88);
      backdrop-filter: blur(10px);
      color: rgba(255,255,255,.92);
      font-weight:750;
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
      z-index: 10000;
      opacity:0;
      transition: opacity .2s ease;
      pointer-events:none;
    }
  </style>
</head>

  </main>

  <div class="lb" id="lb" aria-hidden="true">
    <div class="panel" role="dialog" aria-modal="true">

        <div>
          <b id="lbTitle">사진</b><br/>

        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end">
          <button class="iconbtn" id="lbCopy" type="button">🔗 링크복사</button>

      <div style="background: rgba(0,0,0,.35)">
        <img class="lb-img" id="lbImg" src="" alt="확대 이미지" referrerpolicy="no-referrer" />
      </div>
    </div>
  </div>

  <div id="toast">복사 완료</div>

  <script>
    // =========================
    // ✅ 완전 안정형 JS (문법 깨짐 방지)
    // =========================

    // --- 유틸 ---
    function isMobile(){
      try{
        if(window.matchMedia && window.matchMedia("(max-width: 900px)").matches) return true;
      }catch(e){}
      return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    }
    var IS_MOBILE = isMobile();

    var pillDevice = document.getElementById("pillDevice");
    var pillData   = document.getElementById("pillData");
    var pillRender = document.getElementById("pillRender");
    var statusMsg  = document.getElementById("statusMsg");

    function setPill(el, text, ok){
      if(!el) return;
      el.textContent = text;
      if(ok){
        el.classList.add("ok");
        el.classList.remove("bad");
      }else{
        el.classList.add("bad");
        el.classList.remove("ok");
      }
    }

    function pad2(n){
      var s = String(n);
      return (s.length>=2) ? s : ("0"+s);
    }

    function toast(msg){
      var el = document.getElementById("toast");
      if(!el) return;
      el.textContent = msg;
      el.style.opacity = "1";
      if(window.__toastTimer) clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(function(){ el.style.opacity="0"; }, 1500);
    }

    function copyText(t){
      try{
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(t).then(function(){
            toast("복사 완료 ✅");
          }).catch(function(){
            toast("복사 실패 😅 주소창에서 복사해주세요.");
          });
        }else{
          // fallback
          var ta = document.createElement("textarea");
          ta.value = t;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
          toast("복사 완료 ✅");
        }
      }catch(e){
        toast("복사 실패 😅 주소창에서 복사해주세요.");
      }
    }

    function norm(s){
      return String(s||"").toLowerCase().replace(/\s+/g,"").replace(/[._\-]/g,"");
    }
    function cleanUrl(u){
      return String(u||"").replace(/\s+/g,"").trim();
    }

    // --- 프록시 ---
    function toProxyUrl(originalUrl){
      var u = String(originalUrl || "").trim();
      if(!u) return u;
      var noScheme = u.replace(/^https?:\/\//, "");
      return "https://images.weserv.nl/?url=" + encodeURIComponent(noScheme) + "&ssl=1";
    }
    function primarySrc(url){
      var u = cleanUrl(url);
      return IS_MOBILE ? u : toProxyUrl(u);
    }
    function secondarySrc(url){
      var u = cleanUrl(url);
      return IS_MOBILE ? toProxyUrl(u) : u;
    }
    function setImgWithFallback(imgEl, originalUrl){
      if(!imgEl) return;
      var u = cleanUrl(originalUrl);
      var a = primarySrc(u);
      var b = secondarySrc(u);

      imgEl.referrerPolicy = "no-referrer";
      imgEl.setAttribute("data-try","0");

      imgEl.onerror = function(){
        var tried = Number(imgEl.getAttribute("data-try") || "0");
        if(tried >= 1){
          imgEl.onerror = null;
          return;
        }
        imgEl.setAttribute("data-try", String(tried+1));
        imgEl.src = b;
      };

      imgEl.src = a;
    }

    // --- JSON 로더 ---
    function loadRawList(){
      try{
        var node = document.getElementById("RAW_JSON");
        if(!node) return [];
        var txt = (node.textContent || "").trim();
        var arr = JSON.parse(txt);
        return Array.isArray(arr) ? arr : [];
      }catch(e){
        console.error("RAW_JSON parse error:", e);
        return [];
      }
    }

    function uniq(arr){
      var out = [];
      var seen = {};
      for(var i=0;i<arr.length;i++){
        var k = String(arr[i]);
        if(!seen[k]){
          seen[k]=1;
          out.push(arr[i]);
        }
      }
      return out;
    }

    function buildItemsFromRaw(raw){
      var cleaned = [];
      for(var i=0;i<raw.length;i++){
        var row = raw[i];
        var name = "";
        var url  = "";
        if(row && row.length >= 2){
          name = String(row[0] || "").trim();
          url  = cleanUrl(row[1] || "");
        }
        if(name && url){
          cleaned.push([name,url]);
        }
      }

      var totalByName = {};
      for(var t=0;t<cleaned.length;t++){
        var nm = cleaned[t][0];
        totalByName[nm] = (totalByName[nm]||0) + 1;
      }

      var seenByName = {};
      var items = [];
      for(var j=0;j<cleaned.length;j++){
        var base = cleaned[j][0];
        var u = cleaned[j][1];

        seenByName[base] = (seenByName[base]||0) + 1;
        var needSuffix = (totalByName[base]||0) > 1;
        var internalName = needSuffix ? (base + pad2(seenByName[base])) : base;

        var parts = String(base).split("_");
        var tagList = [base, internalName];
        for(var p=0;p<parts.length;p++){
          var s = String(parts[p]).trim();
          if(s) tagList.push(s);
        }
        tagList = uniq(tagList);

        items.push({
          id: j+1,
          name: internalName,
          base: base,
          url: u,
          tags: tagList
        });
      }
      return items;
    }

    // --- 페이징/도트 ---
    function chunk(arr, size){
      var out = [];
      for(var i=0;i<arr.length;i+=size){
        out.push(arr.slice(i, i+size));
      }
      return out;
    }
    function buildDots(el, n, onClick){
      if(!el) return;
      el.innerHTML = "";
      for(var i=0;i<n;i++){
        (function(idx){
          var d = document.createElement("div");
          d.className = "dot" + (idx===0 ? " on" : "");
          d.addEventListener("click", function(){ onClick(idx); });
          el.appendChild(d);
        })(i);
      }
    }
    function setDotActive(el, idx){
      if(!el) return;
      var kids = el.children;
      for(var i=0;i<kids.length;i++){
        if(i===idx) kids[i].classList.add("on");
        else kids[i].classList.remove("on");
      }
    }

    // --- 라이트박스 ---
    function openLightboxByUrl(url){
      var lb = document.getElementById("lb");
      var lbImg = document.getElementById("lbImg");
      var lbDownload = document.getElementById("lbDownload");
      if(!lb || !lbImg || !lbDownload) return;

      setImgWithFallback(lbImg, url);
      lbDownload.href = url;
      window.__lbUrl = url;

      lb.classList.add("show");
      lb.setAttribute("aria-hidden","false");
      document.body.style.overflow="hidden";
    }
    function closeLightbox(){
      var lb = document.getElementById("lb");
      if(!lb) return;
      lb.classList.remove("show");
      lb.setAttribute("aria-hidden","true");
      document.body.style.overflow="";
      var img = document.getElementById("lbImg");
      if(img) img.src = "";
      window.__lbUrl = "";
    }

    // --- 엘리먼트 ---
    var q = document.getElementById("q");
    var btnClear = document.getElementById("btnClear");
    var btnSearch = document.getElementById("btnSearch");
    var btnShowAll = document.getElementById("btnShowAll");
    var resultArea = document.getElementById("resultArea");
    var emptyArea = document.getElementById("emptyArea");
    var resultTitle = document.getElementById("resultTitle");
    var resultMeta = document.getElementById("resultMeta");
    var pagesEl = document.getElementById("pages");
    var dotsRow = document.getElementById("dotsRow");
    var btnCopyQueryLink = document.getElementById("btnCopyQueryLink");

    var coverImg = document.getElementById("coverImg");
    var thumbCount = document.getElementById("thumbCount");
    var btnCoverPrev = document.getElementById("btnCoverPrev");
    var btnCoverNext = document.getElementById("btnCoverNext");
    var btnOpenCover = document.getElementById("btnOpenCover");
    var btnCopyCover = document.getElementById("btnCopyCover");
    var btnShuffleThumbs = document.getElementById("btnShuffleThumbs");

    var thumbPagesEl = document.getElementById("thumbPages");
    var thumbDotsEl = document.getElementById("thumbDots");
    var btnThumbPrev = document.getElementById("btnThumbPrev");
    var btnThumbNext = document.getElementById("btnThumbNext");
    var thumbMeta = document.getElementById("thumbMeta");

    var slideTitle = document.getElementById("slideTitle");
    var slideSub = document.getElementById("slideSub");
    var imgA = document.getElementById("slideImgA");
    var imgB = document.getElementById("slideImgB");
    var btnPrev = document.getElementById("btnPrev");
    var btnNext = document.getElementById("btnNext");
    var btnPlay = document.getElementById("btnPlay");
    var btnPause = document.getElementById("btnPause");
    var btnOpenSlide = document.getElementById("btnOpenSlide");
    var btnCopySlide = document.getElementById("btnCopySlide");
    var navPrev = document.getElementById("navPrev");
    var navNext = document.getElementById("navNext");

    var btnScrollTop = document.getElementById("btnScrollTop");
    if(btnScrollTop){
      btnScrollTop.addEventListener("click", function(){
        window.scrollTo({top:0, behavior:"smooth"});
      });
    }

    // 라이트박스 바인딩
    var lbClose = document.getElementById("lbClose");
    var lbCopy  = document.getElementById("lbCopy");
    var lbBg    = document.getElementById("lb");
    if(lbClose) lbClose.addEventListener("click", closeLightbox);
    if(lbCopy)  lbCopy.addEventListener("click", function(){ copyText(window.__lbUrl || ""); });
    if(lbBg){
      lbBg.addEventListener("click", function(e){
        if(e && e.target && e.target.id === "lb") closeLightbox();
      });
    }
    window.addEventListener("keydown", function(e){
      var lb = document.getElementById("lb");
      if(lb && lb.classList.contains("show") && e.key === "Escape"){
        closeLightbox();
      }
    });

    // --- 데이터 ---
    var RAW_LIST = loadRawList();
    var ITEMS = buildItemsFromRaw(RAW_LIST);

    setPill(pillDevice, IS_MOBILE ? "모바일" : "PC", true);
    setPill(pillData, "데이터: " + ITEMS.length + "장", ITEMS.length > 0);

    if(ITEMS.length === 0){
      setPill(pillRender, "렌더: 중단", false);
      statusMsg.textContent = "RAW_JSON이 깨졌거나(파싱 실패) 스크립트가 중단되었습니다. JSON을 먼저 확인해주세요.";
    }else{
      setPill(pillRender, "렌더: 준비", true);
      statusMsg.textContent = "정상 로드. (PC는 프록시 우선 로딩)";
    }

    // --- 검색 ---
    function matchItem(item, query){
      var nq = norm(query);
      if(!nq) return true;
      var nname = norm(item.name);
      var nbase = norm(item.base);
      var ntags = norm((item.tags || []).join(" "));
      return (nname.indexOf(nq) !== -1) || (nbase.indexOf(nq) !== -1) || (ntags.indexOf(nq) !== -1);
    }

    function renderResultCarousel(list){
      var PER_PAGE = 12;
      var pages = chunk(list, PER_PAGE);

      pagesEl.innerHTML = "";
      dotsRow.innerHTML = "";

      for(var i=0;i<pages.length;i++){
        var page = pages[i];
        var pageEl = document.createElement("div");
        pageEl.className = "page";

        var grid = document.createElement("div");
        grid.className = "gridThumb";

        for(var k=0;k<page.length;k++){
          (function(it){
            var wrap = document.createElement("div");
            wrap.className = "pitem";
            wrap.addEventListener("click", function(){ openLightboxByUrl(it.url); });

            var img = document.createElement("img");
            img.loading = "lazy";
            img.alt = "갤러리 사진";
            setImgWithFallback(img, it.url);

            wrap.appendChild(img);
            grid.appendChild(wrap);
          })(page[k]);
        }

        pageEl.appendChild(grid);
        pagesEl.appendChild(pageEl);
      }

      buildDots(dotsRow, pages.length, function(i){
        var w = pagesEl.clientWidth || 1;
        pagesEl.scrollTo({ left: i*w, behavior:"smooth" });
      });

      pagesEl.onscroll = function(){
        var w = pagesEl.clientWidth || 1;
        var idx = Math.round(pagesEl.scrollLeft / w);
        if(idx < 0) idx = 0;
        if(idx > pages.length-1) idx = pages.length-1;
        setDotActive(dotsRow, idx);
      };

      resultTitle.textContent = "검색 결과";
      resultMeta.textContent = "총 " + list.length + "장 · " + pages.length + "페이지";
      resultArea.style.display = "block";
      emptyArea.style.display = "none";
    }

    function runSearch(query){
      if(ITEMS.length === 0) return;
      var queryText = String(query || "").trim();

      var filtered = [];
      for(var i=0;i<ITEMS.length;i++){
        if(matchItem(ITEMS[i], queryText)) filtered.push(ITEMS[i]);
      }

      if(filtered.length === 0){
        resultArea.style.display = "none";
        emptyArea.style.display = "block";
        return;
      }

      renderResultCarousel(filtered);

      try{
        var u = new URL(location.href);
        if(queryText) u.searchParams.set("q", queryText);
        else u.searchParams.delete("q");
        history.replaceState({}, "", u.toString());
      }catch(e){}
    }

    if(btnClear) btnClear.addEventListener("click", function(){ q.value=""; q.focus(); runSearch(""); });
    if(btnSearch) btnSearch.addEventListener("click", function(){ runSearch(q.value); });
    if(btnShowAll) btnShowAll.addEventListener("click", function(){ q.value=""; runSearch(""); });
    if(q) q.addEventListener("keydown", function(e){ if(e.key==="Enter") runSearch(q.value); });
    if(btnCopyQueryLink) btnCopyQueryLink.addEventListener("click", function(){ copyText(location.href); });

    // --- 대표/썸네일 ---
    var THUMBS_PER_PAGE = 15;
    var THUMB_ITEMS = [];
    for(var i=0;i<ITEMS.length;i++){
      var obj = {};
      for(var key in ITEMS[i]) obj[key] = ITEMS[i][key];
      obj._globalIndex = i;
      THUMB_ITEMS.push(obj);
    }

    var coverIndex = 0;
    var thumbPageCount = 1;

    function setCover(idx){
      if(THUMB_ITEMS.length === 0) return;
      coverIndex = (idx + THUMB_ITEMS.length) % THUMB_ITEMS.length;
      setImgWithFallback(coverImg, THUMB_ITEMS[coverIndex].url);

      // active 표시
      var tiles = thumbPagesEl ? thumbPagesEl.querySelectorAll(".titem") : [];
      for(var t=0;t<tiles.length;t++) tiles[t].classList.remove("active");

      // data-i로 찾기
      var activeTiles = thumbPagesEl ? thumbPagesEl.querySelectorAll('.titem[data-i="'+ coverIndex +'"]') : [];
      for(var a=0;a<activeTiles.length;a++) activeTiles[a].classList.add("active");
    }

    function renderThumbPager(){
      if(THUMB_ITEMS.length === 0) return;
      if(thumbCount) thumbCount.textContent = String(THUMB_ITEMS.length);

      var pages = chunk(THUMB_ITEMS, THUMBS_PER_PAGE);
      thumbPageCount = pages.length;

      thumbPagesEl.innerHTML = "";
      for(var i=0;i<pages.length;i++){
        var page = pages[i];
        var pageEl = document.createElement("div");
        pageEl.className = "thumbPage";

        var grid = document.createElement("div");
        grid.className = "thumbGrid";

        for(var k=0;k<page.length;k++){
          (function(it){
            var tile = document.createElement("div");
            tile.className = "titem";
            tile.setAttribute("data-i", String(it._globalIndex));
            tile.addEventListener("click", function(){ setCover(it._globalIndex); });

            var img = document.createElement("img");
            img.loading = "lazy";
            img.alt = "thumb";
            setImgWithFallback(img, it.url);

            tile.appendChild(img);
            grid.appendChild(tile);
          })(page[k]);
        }

        pageEl.appendChild(grid);
        thumbPagesEl.appendChild(pageEl);
      }

      buildDots(thumbDotsEl, thumbPageCount, function(i){
        var w = thumbPagesEl.clientWidth || 1;
        thumbPagesEl.scrollTo({ left: i*w, behavior:"smooth" });
      });

      function updateThumbPagerUI(){
        var w = thumbPagesEl.clientWidth || 1;
        var pi = Math.round(thumbPagesEl.scrollLeft / w);
        if(pi < 0) pi = 0;
        if(pi > thumbPageCount-1) pi = thumbPageCount-1;
        setDotActive(thumbDotsEl, pi);
        if(thumbMeta) thumbMeta.textContent = (pi+1) + "/" + thumbPageCount;
      }

      thumbPagesEl.onscroll = updateThumbPagerUI;
      updateThumbPagerUI();

      setCover(coverIndex);
    }

    if(btnThumbPrev) btnThumbPrev.addEventListener("click", function(){
      var w = thumbPagesEl.clientWidth || 1;
      var pi = Math.round(thumbPagesEl.scrollLeft / w);
      var target = Math.max(0, pi-1);
      thumbPagesEl.scrollTo({ left: target*w, behavior:"smooth" });
    });
    if(btnThumbNext) btnThumbNext.addEventListener("click", function(){
      var w = thumbPagesEl.clientWidth || 1;
      var pi = Math.round(thumbPagesEl.scrollLeft / w);
      var target = Math.min(thumbPageCount-1, pi+1);
      thumbPagesEl.scrollTo({ left: target*w, behavior:"smooth" });
    });

    if(btnCoverPrev) btnCoverPrev.addEventListener("click", function(){ setCover(coverIndex-1); });
    if(btnCoverNext) btnCoverNext.addEventListener("click", function(){ setCover(coverIndex+1); });
    if(btnOpenCover) btnOpenCover.addEventListener("click", function(){
      openLightboxByUrl(THUMB_ITEMS[coverIndex] ? THUMB_ITEMS[coverIndex].url : "");
    });
    if(btnCopyCover) btnCopyCover.addEventListener("click", function(){
      copyText(THUMB_ITEMS[coverIndex] ? THUMB_ITEMS[coverIndex].url : "");
    });

    if(btnShuffleThumbs) btnShuffleThumbs.addEventListener("click", function(){
      // Fisher–Yates
      for(var i=THUMB_ITEMS.length-1; i>0; i--){
        var j = Math.floor(Math.random()*(i+1));
        var tmp = THUMB_ITEMS[i];
        THUMB_ITEMS[i] = THUMB_ITEMS[j];
        THUMB_ITEMS[j] = tmp;
      }
      // index 재부여
      for(var k=0;k<THUMB_ITEMS.length;k++){
        THUMB_ITEMS[k]._globalIndex = k;
      }
      coverIndex = 0;
      renderThumbPager();
      toast("썸네일을 섞었습니다 🎲");
    });

    // --- 슬라이드쇼 ---
    var slideIndex = 0;
    var showingA = true;
    var timer = null;
    var speedMs = 4000;

    function setSlide(idx){
      if(ITEMS.length === 0) return;
      slideIndex = (idx + ITEMS.length) % ITEMS.length;
      var it = ITEMS[slideIndex];

      if(slideTitle) slideTitle.textContent = "사진 " + (slideIndex+1);
      if(slideSub) slideSub.textContent = (slideIndex+1) + "/" + ITEMS.length;

      var target = showingA ? imgA : imgB;
      var other  = showingA ? imgB : imgA;

      setImgWithFallback(target, it.url);
      target.classList.add("show");
      other.classList.remove("show");

      showingA = !showingA;
    }

    function play(){
      if(timer || ITEMS.length === 0) return;
      timer = setInterval(function(){ setSlide(slideIndex+1); }, speedMs);
      toast("자동재생 시작 ▶");
    }
    function pause(){
      if(timer) clearInterval(timer);
      timer = null;
      toast("자동재생 정지 ⏸");
    }

    if(btnPrev) btnPrev.addEventListener("click", function(){ setSlide(slideIndex-1); });
    if(btnNext) btnNext.addEventListener("click", function(){ setSlide(slideIndex+1); });
    if(navPrev) navPrev.addEventListener("click", function(){ setSlide(slideIndex-1); });
    if(navNext) navNext.addEventListener("click", function(){ setSlide(slideIndex+1); });
    if(btnPlay) btnPlay.addEventListener("click", play);
    if(btnPause) btnPause.addEventListener("click", pause);
    if(btnOpenSlide) btnOpenSlide.addEventListener("click", function(){
      openLightboxByUrl(ITEMS[slideIndex] ? ITEMS[slideIndex].url : "");
    });
    if(btnCopySlide) btnCopySlide.addEventListener("click", function(){
      copyText(ITEMS[slideIndex] ? ITEMS[slideIndex].url : "");
    });

    // --- INIT ---
    (function init(){
      try{
        if(ITEMS.length){
          renderThumbPager();
          setSlide(0);
          setPill(pillRender, "렌더: 완료", true);
          statusMsg.textContent = "정상 동작 중 ✅ (PC는 프록시→원본 자동 대체)";
        }

        try{
          var u = new URL(location.href);
          var qq = u.searchParams.get("q");
          if(qq){
            q.value = qq;
            runSearch(qq);
          }
        }catch(e){}
      }catch(e){
        console.error(e);
        setPill(pillRender, "렌더: 에러", false);
        statusMsg.textContent = "JS 에러로 중단됨. 콘솔의 빨간 에러 1줄만 캡처해 주세요.";
      }
    })();
  </script>
</body>
</html>
