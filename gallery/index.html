<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>갤러리 & 영상 | 계명태권도</title>
  <meta name="description" content="계명태권도 공식 갤러리 & 영상. 수련, 심사, 행사, 성장 기록을 한 곳에서 확인하세요." />
  <meta name="theme-color" content="#0b0f19" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="계명태권도 | 갤러리 & 영상" />
  <meta property="og:description" content="수련·심사·행사·성장 기록. 모바일 최적화 갤러리." />
  <!-- ✅ OG 이미지는 Wix 말고, 가능하면 GitHub에 올린 대표 이미지를 쓰세요 -->
  <!-- <meta property="og:image" content="https://계명태권도.com/gallery/images/og.jpg" /> -->

  <style>
    :root{
      --bg:#0b0f19;
      --line:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.68);
      --gold:#d7b56d;
      --blue:#66b3ff;
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --r:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: radial-gradient(1200px 700px at 18% -10%, rgba(102,179,255,.15), transparent 55%),
                  radial-gradient(900px 650px at 100% 0%, rgba(215,181,109,.14), transparent 58%),
                  linear-gradient(180deg, #070b14, var(--bg));
      color:var(--text);
    }
    a{color:inherit; text-decoration:none}
    .wrap{max-width:1100px; margin:0 auto; padding:20px 16px 90px}

    .topbar{
      position:sticky; top:0; z-index:50;
      backdrop-filter: blur(10px);
      background: rgba(11,15,25,.68);
      border-bottom:1px solid var(--line);
    }
    .topbar .inner{
      max-width:1100px; margin:0 auto;
      display:flex; align-items:center; gap:10px;
      padding:10px 16px;
    }
    .brand{display:flex; flex-direction:column; gap:2px}
    .brand b{letter-spacing:.2px}
    .brand small{color:var(--muted)}
    .spacer{flex:1}
    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      color:var(--text);
      cursor:pointer;
      user-select:none;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
      font-weight:650;
      white-space:nowrap;
    }
    .btn:hover{transform: translateY(-1px); border-color: rgba(215,181,109,.35)}
    .btn:active{transform: translateY(0px)}
    .btn.primary{
      border-color: rgba(102,179,255,.35);
      background: linear-gradient(180deg, rgba(102,179,255,.16), rgba(255,255,255,.03));
    }
    .btn.gold{
      border-color: rgba(215,181,109,.45);
      background: linear-gradient(180deg, rgba(215,181,109,.18), rgba(255,255,255,.03));
    }

    .status{
      display:flex; gap:10px; flex-wrap:wrap; align-items:center;
      padding:10px 12px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.16);
      margin-top:14px;
      color: rgba(255,255,255,.78);
      font-size:12px;
    }
    .pill{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      font-weight:800;
      color: rgba(255,255,255,.90);
    }
    .pill.ok{border-color: rgba(102,179,255,.35)}
    .pill.bad{border-color: rgba(255,120,120,.35)}

    .cardBox{
      margin-top:18px;
      border:1px solid var(--line);
      border-radius: var(--r);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .cardBox .head{
      display:flex; align-items:flex-end; justify-content:space-between; gap:12px;
      padding:16px 16px 12px;
      border-bottom:1px solid var(--line);
    }
    .cardBox .head h2{margin:0; font-size:18px}
    .cardBox .head p{margin:0; color:var(--muted); font-size:13px; line-height:1.55}
    .cardBox .body{padding:14px 14px 16px}

    .searchRow{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    .searchRow .field{
      flex:1; display:flex; align-items:center; gap:8px;
      padding:10px 12px; border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      min-width: 220px;
    }
    .searchRow input{
      width:100%; border:0; outline:none; background:transparent;
      color:var(--text); font-size:14px;
    }
    .xbtn{
      width:34px; height:34px; border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.86);
      cursor:pointer;
      display:grid; place-items:center;
      font-weight:800;
    }

    .resultTop{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 12px; border-radius: 16px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.16);
      margin-top:12px;
    }
    .resultTop b{font-size:13px}
    .resultTop small{color: rgba(255,255,255,.70)}

    .carousel{
      margin-top:10px;
      border:1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      background: rgba(0,0,0,.18);
      overflow:hidden;
    }
    .pages{
      display:flex; overflow-x:auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior:smooth;
    }
    .page{scroll-snap-align: start; flex:0 0 100%; padding:12px;}

    /* ✅ 검색 결과 썸네일 그리드 */
    .gridThumb{display:grid; gap:10px;}
    /* 기본(모바일) 3열 → 5줄이면 15장/페이지 */
    .gridThumb{ grid-template-columns: repeat(3, 1fr); }
    @media (min-width: 560px){ .gridThumb{ grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 920px){ .gridThumb{ grid-template-columns: repeat(6, 1fr); } }

    .pitem{
      border-radius: 14px; overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      cursor:pointer;
    }
    .pitem img{
      width:100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display:block;
      transition: transform .18s ease, filter .18s ease;
    }
    .pitem:hover img{transform: scale(1.05); filter:saturate(1.08)}

    .dotsRow{
      display:flex; align-items:center; justify-content:center; gap:7px;
      padding:10px 10px 12px;
      border-top:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.10);
    }
    .dot{
      width:7px;height:7px;border-radius:999px;
      background: rgba(255,255,255,.35);
      border:1px solid rgba(255,255,255,.22);
      cursor:pointer;
    }
    .dot.on{ background: rgba(102,179,255,.92); border-color: rgba(102,179,255,.35); }

    .cover{display:grid; grid-template-columns: 1.2fr .8fr; gap:12px; align-items:stretch;}
    .coverMain{
      border:1px solid var(--line);
      border-radius: 18px;
      overflow:hidden;
      background: rgba(0,0,0,.22);
      height: 380px;
    }
    .coverMain img{width:100%; height:100%; object-fit: cover; display:block;}
    @media (max-width: 980px){
      .cover{grid-template-columns: 1fr}
      .coverMain{height: 280px;}
    }

    .thumbRail{
      border:1px solid var(--line);
      border-radius: 18px;
      background: rgba(0,0,0,.18);
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width: 280px;
    }
    .railTopRow{display:flex; align-items:center; justify-content:space-between; gap:10px;}
    .railNav{display:flex; gap:8px; align-items:center;}
    .navMini{
      width:40px; height:36px; border-radius: 12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.92);
      cursor:pointer; font-weight:900;
      display:grid; place-items:center;
    }
    .railMeta{color: rgba(255,255,255,.70); font-size:12px;}
    .thumbPager{
      border:1px solid rgba(255,255,255,.10);
      border-radius: 16px;
      overflow:hidden;
      background: rgba(0,0,0,.12);
    }
    .thumbPages{
      display:flex; overflow-x:auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior:smooth;
    }
    .thumbPage{scroll-snap-align: start; flex:0 0 100%; padding:8px;}

    /* ✅ 대표사진 옆 썸네일: 3열 고정 → 5줄 = 15장/페이지 */
    .thumbGrid{display:grid; grid-template-columns: repeat(3, 1fr); gap:8px;}

    .titem{
      border-radius: 14px; overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      cursor:pointer;
      position:relative;
    }
    .titem img{width:100%; aspect-ratio:1/1; object-fit:cover; display:block;}
    .titem.active{border-color: rgba(102,179,255,.45);}
    .titem.active::after{
      content:""; position:absolute; inset:0;
      box-shadow: inset 0 0 0 2px rgba(102,179,255,.55);
      border-radius: 14px; pointer-events:none;
    }
    .thumbDots{
      display:flex; align-items:center; justify-content:center; gap:7px;
      padding:10px;
      border-top:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.10);
    }

    .slideshow{
      margin-top:12px;
      border:1px solid var(--line);
      border-radius: 18px;
      overflow:hidden;
      background: rgba(0,0,0,.18);
    }
    .slideTop{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .slideTop b{font-size:14px}
    .slideTop small{color:var(--muted); font-size:12px}
    .slideBox{
      position:relative;
      width:100%;
      aspect-ratio: 16 / 9;
      background:#000;
      overflow:hidden;
    }
    .slideBox img{
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit: cover;
      display:block;
      opacity:0;
      transition: opacity .35s ease;
    }
    .slideBox img.show{opacity:1}
    .navBtn{
      position:absolute; top:50%;
      transform: translateY(-50%);
      width:44px; height:44px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.35);
      color: rgba(255,255,255,.92);
      display:grid; place-items:center;
      cursor:pointer;
      user-select:none;
      z-index: 2;
    }
    .navBtn.prev{left:10px}
    .navBtn.next{right:10px}

    .lb{
      position:fixed; inset:0;
      background: rgba(0,0,0,.78);
      display:none;
      z-index: 9999;
      padding: 16px;
    }
    .lb.show{display:flex}
    .lb .panel{
      margin:auto;
      width:min(980px, 100%);
      border-radius: 18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(15,22,42,.88);
      backdrop-filter: blur(10px);
      box-shadow: 0 30px 120px rgba(0,0,0,.65);
    }
    .lb-top{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.12);
    }
    .iconbtn{
      padding:9px 10px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.20);
      cursor:pointer;
      color: rgba(255,255,255,.88);
      font-weight:750;
      white-space:nowrap;
    }
    .lb-img{
      width:100%;
      max-height: calc(100vh - 220px);
      object-fit: contain;
      display:block;
      margin: 0 auto;
      background: rgba(0,0,0,.30);
    }

    #toast{
      position:fixed; left:50%; bottom:18px; transform: translateX(-50%);
      padding:10px 12px; border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(15,22,42,.88);
      backdrop-filter: blur(10px);
      color: rgba(255,255,255,.92);
      font-weight:750;
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
      z-index: 10000;
      opacity:0;
      transition: opacity .2s ease;
      pointer-events:none;
    }

    /* ✅ 동영상 영역 */
    .videoGrid{
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
    }
    @media (min-width: 860px){
      .videoGrid{ grid-template-columns: 1fr 1fr; }
    }
    .vCard{
      border:1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      overflow:hidden;
      background: rgba(0,0,0,.18);
    }
    .vHead{
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .vHead b{font-size:13px}
    .vHead small{color: rgba(255,255,255,.70)}
    .vFrame{
      width:100%;
      aspect-ratio: 16 / 9;
      background:#000;
    }
    .vFrame iframe{width:100%; height:100%; border:0; display:block;}
  </style>
</head>

<body>

  <div class="topbar">
    <div class="inner">
      <div class="brand">
        <b>계명태권도</b>
        <small>Gallery & Video</small>
      </div>

      <div class="spacer"></div>

      <!-- ✅ 상단 홈 -->
      <a class="btn gold" href="../index.html">🏠 홈으로</a>

      <!-- ✅ 상단 검색창 -->
      <div class="searchRow" style="margin:0; flex-wrap:nowrap;">
        <div class="field" style="min-width:240px;">
          🔎
          <input id="qTop" type="text" inputmode="search" autocomplete="off" placeholder="이름/키워드 검색" />
          <button class="xbtn" id="btnClearTop" type="button" title="지우기">✕</button>
        </div>
        <button class="btn primary" id="btnSearchTop" type="button">조회</button>
      </div>

      <button class="btn primary" id="btnScrollTop" type="button">⬆️</button>
    </div>
  </div>

  <main class="wrap">

    <div class="status" id="statusBar">
      <span class="pill" id="pillDevice">기기</span>
      <span class="pill" id="pillData">데이터</span>
      <span class="pill" id="pillRender">렌더</span>
      <span id="statusMsg">초기화 중…</span>
    </div>

    <!-- ✅ 검색 결과 -->
    <section class="cardBox" id="searchSection">
      <div class="head">
        <div>
          <h2>사진 조회</h2>
          <p>이름/키워드로 검색 후 사진을 확인합니다. (검색 결과는 썸네일 5줄 단위로 페이지가 나뉩니다)</p>
        </div>
      </div>

      <div class="body">
        <div class="searchRow">
          <div class="field">
            🔎
            <input id="q" type="text" inputmode="search" autocomplete="off" placeholder="이름/키워드 입력" />
            <button class="xbtn" id="btnClear" type="button" title="지우기">✕</button>
          </div>
          <button class="btn primary" id="btnSearch" type="button">조회</button>
          <button class="btn" id="btnShowAll" type="button">전체</button>
        </div>

        <div id="resultArea" style="display:none;">
          <div class="resultTop">
            <div>
              <b id="resultTitle">결과</b><br/>
              <small id="resultMeta">—</small>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;">
              <button class="btn" id="btnCopyQueryLink" type="button">🔗 결과 링크복사</button>
            </div>
          </div>

          <div class="carousel">
            <div class="pages" id="pages"></div>
            <div class="dotsRow" id="dotsRow"></div>
          </div>
        </div>

        <div id="emptyArea" style="display:none; margin-top:12px; color:rgba(255,255,255,.72); font-size:12px;">
          검색 결과가 없습니다.
        </div>
      </div>
    </section>

    <!-- ✅ 대표사진 + 썸네일(5줄 페이징) -->
    <section class="cardBox">
      <div class="head">
        <div>
          <h2>대표 사진</h2>
          <p>오른쪽 썸네일은 5줄(15장) 단위로 페이지가 나뉘고, 아래 점으로 이동합니다.</p>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap">
          <button class="btn" id="btnCoverPrev" type="button">‹ 이전</button>
          <button class="btn" id="btnCoverNext" type="button">다음 ›</button>
          <button class="btn" id="btnOpenCover" type="button">🔍 확대</button>
        </div>
      </div>

      <div class="body">
        <div class="cover">
          <div class="coverMain">
            <img id="coverImg" src="" alt="대표 사진" />
          </div>

          <aside class="thumbRail">
            <div class="railTopRow">
              <div>
                <b>썸네일</b> <small style="color:var(--muted)">(<span id="thumbCount">0</span>장)</small>
              </div>
              <div class="railNav">
                <button class="navMini" id="btnThumbPrev" type="button">‹</button>
                <button class="navMini" id="btnThumbNext" type="button">›</button>
              </div>
            </div>

            <div class="railMeta" id="thumbMeta">1/1</div>

            <div class="thumbPager">
              <div class="thumbPages" id="thumbPages"></div>
              <div class="thumbDots" id="thumbDots"></div>
            </div>

            <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:2px">
              <button class="btn" id="btnShuffleThumbs" type="button">🎲 섞기</button>
            </div>
          </aside>
        </div>
      </div>
    </section>

    <!-- ✅ 슬라이드쇼 -->
    <section class="cardBox">
      <div class="head">
        <div>
          <h2>갤러리 슬라이드 쇼</h2>
          <p>이전/다음 · 자동재생(4초)</p>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap">
          <button class="btn" id="btnPrev" type="button">⟵</button>
          <button class="btn primary" id="btnPlay" type="button">▶ 자동재생</button>
          <button class="btn" id="btnPause" type="button">⏸ 정지</button>
          <button class="btn" id="btnNext" type="button">⟶</button>
          <button class="btn" id="btnOpenSlide" type="button">🔍 확대</button>
        </div>
      </div>

      <div class="body">
        <div class="slideshow">
          <div class="slideTop">
            <div>
              <b id="slideTitle">사진</b><br/>
              <small id="slideSub">—</small>
            </div>
          </div>
          <div class="slideBox" id="slideBox">
            <img id="slideImgA" src="" alt="슬라이드 A" />
            <img id="slideImgB" src="" alt="슬라이드 B" />
            <div class="navBtn prev" id="navPrev">‹</div>
            <div class="navBtn next" id="navNext">›</div>
          </div>
        </div>
      </div>
    </section>

    <!-- ✅ 사진 아래 동영상 -->
    <section class="cardBox" id="videoSection">
      <div class="head">
        <div>
          <h2>동영상</h2>
          <p>사진 아래에 공식 영상/시범 영상을 배치합니다.</p>
        </div>
      </div>
      <div class="body">
        <div class="videoGrid" id="videoGrid"></div>
      </div>
    </section>

  </main>

  <!-- ✅ 라이트박스 -->
  <div class="lb" id="lb" aria-hidden="true">
    <div class="panel" role="dialog" aria-modal="true">
      <div class="lb-top">
        <div>
          <b id="lbTitle">사진</b><br/>
          <small id="lbSub" style="color:rgba(255,255,255,.70)"></small>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end">
          <button class="iconbtn" id="lbClose" type="button">✕ 닫기</button>
        </div>
      </div>
      <div style="background: rgba(0,0,0,.35)">
        <img class="lb-img" id="lbImg" src="" alt="확대 이미지" />
      </div>
    </div>
  </div>

  <div id="toast">복사 완료</div>

  <!-- ✅ 데이터 -->
  <script src="data.js"></script>

  <script>
    // =========================
    // ✅ 로컬 이미지 전용 안정형 JS
    // =========================

    function isMobile(){
      try{
        if(window.matchMedia && window.matchMedia("(max-width: 900px)").matches) return true;
      }catch(e){}
      return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    }
    var IS_MOBILE = isMobile();

    var pillDevice = document.getElementById("pillDevice");
    var pillData   = document.getElementById("pillData");
    var pillRender = document.getElementById("pillRender");
    var statusMsg  = document.getElementById("statusMsg");

    function setPill(el, text, ok){
      if(!el) return;
      el.textContent = text;
      if(ok){ el.classList.add("ok"); el.classList.remove("bad"); }
      else  { el.classList.add("bad"); el.classList.remove("ok"); }
    }

    function toast(msg){
      var el = document.getElementById("toast");
      if(!el) return;
      el.textContent = msg;
      el.style.opacity = "1";
      if(window.__toastTimer) clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(function(){ el.style.opacity="0"; }, 1500);
    }

    function norm(s){
      return String(s||"").toLowerCase()
        .replace(/\s+/g,"")
        .replace(/[._\-]/g,"");
    }

    function uniq(arr){
      var out = [];
      var seen = {};
      for(var i=0;i<arr.length;i++){
        var k = String(arr[i]);
        if(!seen[k]){ seen[k]=1; out.push(arr[i]); }
      }
      return out;
    }

    function chunk(arr, size){
      var out = [];
      for(var i=0;i<arr.length;i+=size){
        out.push(arr.slice(i, i+size));
      }
      return out;
    }

    function buildDots(el, n, onClick){
      if(!el) return;
      el.innerHTML = "";
      for(var i=0;i<n;i++){
        (function(idx){
          var d = document.createElement("div");
          d.className = "dot" + (idx===0 ? " on" : "");
          d.addEventListener("click", function(){ onClick(idx); });
          el.appendChild(d);
        })(i);
      }
    }
    function setDotActive(el, idx){
      if(!el) return;
      var kids = el.children;
      for(var i=0;i<kids.length;i++){
        if(i===idx) kids[i].classList.add("on");
        else kids[i].classList.remove("on");
      }
    }

    // ✅ 라이트박스
    function openLightbox(src, title, sub){
      var lb = document.getElementById("lb");
      var lbImg = document.getElementById("lbImg");
      var lbTitle = document.getElementById("lbTitle");
      var lbSub = document.getElementById("lbSub");
      if(!lb || !lbImg) return;

      lbImg.src = src;
      lbTitle.textContent = title || "사진";
      lbSub.textContent = sub || "";
      lb.classList.add("show");
      lb.setAttribute("aria-hidden","false");
      document.body.style.overflow="hidden";
    }
    function closeLightbox(){
      var lb = document.getElementById("lb");
      if(!lb) return;
      lb.classList.remove("show");
      lb.setAttribute("aria-hidden","true");
      document.body.style.overflow="";
      var img = document.getElementById("lbImg");
      if(img) img.src = "";
    }

    var lbClose = document.getElementById("lbClose");
    var lbBg    = document.getElementById("lb");
    if(lbClose) lbClose.addEventListener("click", closeLightbox);
    if(lbBg){
      lbBg.addEventListener("click", function(e){
        if(e && e.target && e.target.id === "lb") closeLightbox();
      });
    }
    window.addEventListener("keydown", function(e){
      var lb = document.getElementById("lb");
      if(lb && lb.classList.contains("show") && e.key === "Escape"){
        closeLightbox();
      }
    });

    // ✅ 상단 스크롤
    var btnScrollTop = document.getElementById("btnScrollTop");
    if(btnScrollTop){
      btnScrollTop.addEventListener("click", function(){
        window.scrollTo({top:0, behavior:"smooth"});
      });
    }

    // =========================
    // ✅ data.js -> ITEMS 구성
    // =========================
    function buildItems(){
      var srcList = (window.GALLERY && Array.isArray(window.GALLERY)) ? window.GALLERY : [];
      var totalByName = {};
      for(var i=0;i<srcList.length;i++){
        var nm = String(srcList[i].name || "").trim();
        if(!nm) continue;
        totalByName[nm] = (totalByName[nm]||0) + 1;
      }

      var seenByName = {};
      var items = [];
      for(var j=0;j<srcList.length;j++){
        var row = srcList[j] || {};
        var base = String(row.name || "").trim();
        var url  = String(row.src  || "").trim();
        var tags = String(row.tags || "").trim();

        if(!base || !url) continue;

        seenByName[base] = (seenByName[base]||0) + 1;
        var needSuffix = (totalByName[base]||0) > 1;
        var internalName = needSuffix ? (base + String(seenByName[base]).padStart(2,"0")) : base;

        var tagList = [base, internalName];
        if(tags){
          tags.split(/[,\s]+/).forEach(function(t){
            t = String(t||"").trim();
            if(t) tagList.push(t);
          });
        }
        // "_" 분해도 태그로 넣기
        String(base).split("_").forEach(function(t){
          t = String(t||"").trim();
          if(t) tagList.push(t);
        });

        tagList = uniq(tagList);

        items.push({
          id: items.length + 1,
          name: internalName,
          base: base,
          url: url,
          tags: tagList
        });
      }
      return items;
    }

    var ITEMS = buildItems();

    setPill(pillDevice, IS_MOBILE ? "모바일" : "PC", true);
    setPill(pillData, "데이터: " + ITEMS.length + "장", ITEMS.length > 0);

    if(ITEMS.length === 0){
      setPill(pillRender, "렌더: 중단", false);
      statusMsg.textContent = "data.js의 GALLERY가 비어있거나 형식이 잘못되었습니다. (name, src 확인)";
    }else{
      setPill(pillRender, "렌더: 준비", true);
      statusMsg.textContent = "로컬 이미지로 정상 로드 ✅";
    }

    // =========================
    // ✅ 검색 + 5줄 페이징
    // =========================
    var q = document.getElementById("q");
    var btnClear = document.getElementById("btnClear");
    var btnSearch = document.getElementById("btnSearch");
    var btnShowAll = document.getElementById("btnShowAll");
    var resultArea = document.getElementById("resultArea");
    var emptyArea = document.getElementById("emptyArea");
    var resultTitle = document.getElementById("resultTitle");
    var resultMeta = document.getElementById("resultMeta");
    var pagesEl = document.getElementById("pages");
    var dotsRow = document.getElementById("dotsRow");
    var btnCopyQueryLink = document.getElementById("btnCopyQueryLink");

    // 상단 검색 연동
    var qTop = document.getElementById("qTop");
    var btnClearTop = document.getElementById("btnClearTop");
    var btnSearchTop = document.getElementById("btnSearchTop");

    function matchItem(item, query){
      var nq = norm(query);
      if(!nq) return true;
      var nname = norm(item.name);
      var nbase = norm(item.base);
      var ntags = norm((item.tags || []).join(" "));
      return (nname.indexOf(nq) !== -1) || (nbase.indexOf(nq) !== -1) || (ntags.indexOf(nq) !== -1);
    }

    // ✅ 현재 화면의 열(column) 수를 계산해서 "5줄" 단위로 페이지 크기 결정
    function getColumnsForGrid(){
      // gridThumb는 gap 포함 폭 기반으로 대충 추정
      // 모바일: 3, 중간: 4, 데스크탑: 6 (CSS와 동일하게 맞춤)
      var w = window.innerWidth || 360;
      if(w >= 920) return 6;
      if(w >= 560) return 4;
      return 3;
    }

    function renderResultCarousel(list){
      var cols = getColumnsForGrid();
      var PER_PAGE = cols * 5; // ✅ 5줄
      var pages = chunk(list, PER_PAGE);

      pagesEl.innerHTML = "";
      dotsRow.innerHTML = "";

      for(var i=0;i<pages.length;i++){
        var page = pages[i];
        var pageEl = document.createElement("div");
        pageEl.className = "page";

        var grid = document.createElement("div");
        grid.className = "gridThumb";

        for(var k=0;k<page.length;k++){
          (function(it){
            var wrap = document.createElement("div");
            wrap.className = "pitem";
            wrap.addEventListener("click", function(){
              openLightbox(it.url, it.base, "");
            });

            var img = document.createElement("img");
            img.loading = "lazy";
            img.alt = it.base;
            img.src = it.url;

            wrap.appendChild(img);
            grid.appendChild(wrap);
          })(page[k]);
        }

        pageEl.appendChild(grid);
        pagesEl.appendChild(pageEl);
      }

      buildDots(dotsRow, pages.length, function(i){
        var w = pagesEl.clientWidth || 1;
        pagesEl.scrollTo({ left: i*w, behavior:"smooth" });
      });

      pagesEl.onscroll = function(){
        var w = pagesEl.clientWidth || 1;
        var idx = Math.round(pagesEl.scrollLeft / w);
        if(idx < 0) idx = 0;
        if(idx > pages.length-1) idx = pages.length-1;
        setDotActive(dotsRow, idx);
      };

      resultTitle.textContent = "검색 결과";
      resultMeta.textContent = "총 " + list.length + "장 · " + pages.length + "페이지 (5줄 단위)";
      resultArea.style.display = "block";
      emptyArea.style.display = "none";
    }

    function runSearch(query){
      if(ITEMS.length === 0) return;
      var queryText = String(query || "").trim();

      var filtered = [];
      for(var i=0;i<ITEMS.length;i++){
        if(matchItem(ITEMS[i], queryText)) filtered.push(ITEMS[i]);
      }

      if(filtered.length === 0){
        resultArea.style.display = "none";
        emptyArea.style.display = "block";
        return;
      }

      renderResultCarousel(filtered);

      // URL에 q 반영 (공유용)
      try{
        var u = new URL(location.href);
        if(queryText) u.searchParams.set("q", queryText);
        else u.searchParams.delete("q");
        history.replaceState({}, "", u.toString());
      }catch(e){}
    }

    function bindSearchBox(inputEl){
      if(!inputEl) return;
      inputEl.addEventListener("keydown", function(e){
        if(e.key==="Enter") runSearch(inputEl.value);
      });
    }
    bindSearchBox(q);
    bindSearchBox(qTop);

    if(btnClear) btnClear.addEventListener("click", function(){ q.value=""; if(qTop) qTop.value=""; q.focus(); runSearch(""); });
    if(btnSearch) btnSearch.addEventListener("click", function(){ if(qTop) qTop.value = q.value; runSearch(q.value); });
    if(btnShowAll) btnShowAll.addEventListener("click", function(){ q.value=""; if(qTop) qTop.value=""; runSearch(""); });

    if(btnClearTop) btnClearTop.addEventListener("click", function(){ if(qTop) qTop.value=""; if(q) q.value=""; qTop.focus(); runSearch(""); });
    if(btnSearchTop) btnSearchTop.addEventListener("click", function(){ if(q) q.value = qTop.value; runSearch(qTop.value); });

    if(btnCopyQueryLink) btnCopyQueryLink.addEventListener("click", function(){
      try{
        navigator.clipboard.writeText(location.href).then(function(){ toast("복사 완료 ✅"); })
        .catch(function(){ toast("복사 실패 😅"); });
      }catch(e){ toast("복사 실패 😅"); }
    });

    // 창 크기 바뀌면 페이지당 개수(열수)가 달라지므로 결과 재렌더
    var __lastCols = getColumnsForGrid();
    window.addEventListener("resize", function(){
      var now = getColumnsForGrid();
      if(now !== __lastCols){
        __lastCols = now;
        // 결과가 열려 있으면 재렌더
        if(resultArea && resultArea.style.display !== "none"){
          runSearch((q && q.value) ? q.value : "");
        }
      }
    });

    // =========================
    // ✅ 대표/썸네일(5줄=15장) + 슬라이드쇼
    // =========================
    var coverImg = document.getElementById("coverImg");
    var thumbCount = document.getElementById("thumbCount");
    var btnCoverPrev = document.getElementById("btnCoverPrev");
    var btnCoverNext = document.getElementById("btnCoverNext");
    var btnOpenCover = document.getElementById("btnOpenCover");
    var btnShuffleThumbs = document.getElementById("btnShuffleThumbs");

    var thumbPagesEl = document.getElementById("thumbPages");
    var thumbDotsEl = document.getElementById("thumbDots");
    var btnThumbPrev = document.getElementById("btnThumbPrev");
    var btnThumbNext = document.getElementById("btnThumbNext");
    var thumbMeta = document.getElementById("thumbMeta");

    // ✅ 3열 고정이므로 5줄=15개
    var THUMBS_PER_PAGE = 15;
    var THUMB_ITEMS = ITEMS.slice(); // 복사

    var coverIndex = 0;
    var thumbPageCount = 1;

    function setCover(idx){
      if(THUMB_ITEMS.length === 0) return;
      coverIndex = (idx + THUMB_ITEMS.length) % THUMB_ITEMS.length;
      coverImg.src = THUMB_ITEMS[coverIndex].url;

      // active 표시
      var tiles = thumbPagesEl ? thumbPagesEl.querySelectorAll(".titem") : [];
      for(var t=0;t<tiles.length;t++) tiles[t].classList.remove("active");

      var activeTiles = thumbPagesEl ? thumbPagesEl.querySelectorAll('.titem[data-i="'+ coverIndex +'"]') : [];
      for(var a=0;a<activeTiles.length;a++) activeTiles[a].classList.add("active");
    }

    function renderThumbPager(){
      if(THUMB_ITEMS.length === 0) return;
      if(thumbCount) thumbCount.textContent = String(THUMB_ITEMS.length);

      var pages = chunk(THUMB_ITEMS, THUMBS_PER_PAGE);
      thumbPageCount = pages.length;

      thumbPagesEl.innerHTML = "";
      for(var i=0;i<pages.length;i++){
        var page = pages[i];
        var pageEl = document.createElement("div");
        pageEl.className = "thumbPage";

        var grid = document.createElement("div");
        grid.className = "thumbGrid";

        for(var k=0;k<page.length;k++){
          (function(localIdx, it){
            var globalIndex = (i*THUMBS_PER_PAGE) + localIdx;

            var tile = document.createElement("div");
            tile.className = "titem";
            tile.setAttribute("data-i", String(globalIndex));
            tile.addEventListener("click", function(){ setCover(globalIndex); });

            var img = document.createElement("img");
            img.loading = "lazy";
            img.alt = it.base;
            img.src = it.url;

            tile.appendChild(img);
            grid.appendChild(tile);
          })(k, page[k]);
        }

        pageEl.appendChild(grid);
        thumbPagesEl.appendChild(pageEl);
      }

      buildDots(thumbDotsEl, thumbPageCount, function(i){
        var w = thumbPagesEl.clientWidth || 1;
        thumbPagesEl.scrollTo({ left: i*w, behavior:"smooth" });
      });

      function updateThumbPagerUI(){
        var w = thumbPagesEl.clientWidth || 1;
        var pi = Math.round(thumbPagesEl.scrollLeft / w);
        if(pi < 0) pi = 0;
        if(pi > thumbPageCount-1) pi = thumbPageCount-1;
        setDotActive(thumbDotsEl, pi);
        if(thumbMeta) thumbMeta.textContent = (pi+1) + "/" + thumbPageCount;
      }

      thumbPagesEl.onscroll = updateThumbPagerUI;
      updateThumbPagerUI();

      setCover(coverIndex);
    }

    if(btnThumbPrev) btnThumbPrev.addEventListener("click", function(){
      var w = thumbPagesEl.clientWidth || 1;
      var pi = Math.round(thumbPagesEl.scrollLeft / w);
      var target = Math.max(0, pi-1);
      thumbPagesEl.scrollTo({ left: target*w, behavior:"smooth" });
    });
    if(btnThumbNext) btnThumbNext.addEventListener("click", function(){
      var w = thumbPagesEl.clientWidth || 1;
      var pi = Math.round(thumbPagesEl.scrollLeft / w);
      var target = Math.min(thumbPageCount-1, pi+1);
      thumbPagesEl.scrollTo({ left: target*w, behavior:"smooth" });
    });

    if(btnCoverPrev) btnCoverPrev.addEventListener("click", function(){ setCover(coverIndex-1); });
    if(btnCoverNext) btnCoverNext.addEventListener("click", function(){ setCover(coverIndex+1); });
    if(btnOpenCover) btnOpenCover.addEventListener("click", function(){
      if(THUMB_ITEMS[coverIndex]) openLightbox(THUMB_ITEMS[coverIndex].url, THUMB_ITEMS[coverIndex].base, "");
    });

    if(btnShuffleThumbs) btnShuffleThumbs.addEventListener("click", function(){
      for(var i=THUMB_ITEMS.length-1; i>0; i--){
        var j = Math.floor(Math.random()*(i+1));
        var tmp = THUMB_ITEMS[i];
        THUMB_ITEMS[i] = THUMB_ITEMS[j];
        THUMB_ITEMS[j] = tmp;
      }
      coverIndex = 0;
      renderThumbPager();
      toast("썸네일을 섞었습니다 🎲");
    });

    // ✅ 슬라이드쇼
    var slideTitle = document.getElementById("slideTitle");
    var slideSub = document.getElementById("slideSub");
    var imgA = document.getElementById("slideImgA");
    var imgB = document.getElementById("slideImgB");
    var btnPrev = document.getElementById("btnPrev");
    var btnNext = document.getElementById("btnNext");
    var btnPlay = document.getElementById("btnPlay");
    var btnPause = document.getElementById("btnPause");
    var btnOpenSlide = document.getElementById("btnOpenSlide");
    var navPrev = document.getElementById("navPrev");
    var navNext = document.getElementById("navNext");

    var slideIndex = 0;
    var showingA = true;
    var timer = null;
    var speedMs = 4000;

    function setSlide(idx){
      if(ITEMS.length === 0) return;
      slideIndex = (idx + ITEMS.length) % ITEMS.length;
      var it = ITEMS[slideIndex];

      if(slideTitle) slideTitle.textContent = it.base;
      if(slideSub) slideSub.textContent = (slideIndex+1) + "/" + ITEMS.length;

      var target = showingA ? imgA : imgB;
      var other  = showingA ? imgB : imgA;

      target.src = it.url;
      target.classList.add("show");
      other.classList.remove("show");

      showingA = !showingA;
    }

    function play(){
      if(timer || ITEMS.length === 0) return;
      timer = setInterval(function(){ setSlide(slideIndex+1); }, speedMs);
      toast("자동재생 시작 ▶");
    }
    function pause(){
      if(timer) clearInterval(timer);
      timer = null;
      toast("자동재생 정지 ⏸");
    }

    if(btnPrev) btnPrev.addEventListener("click", function(){ setSlide(slideIndex-1); });
    if(btnNext) btnNext.addEventListener("click", function(){ setSlide(slideIndex+1); });
    if(navPrev) navPrev.addEventListener("click", function(){ setSlide(slideIndex-1); });
    if(navNext) navNext.addEventListener("click", function(){ setSlide(slideIndex+1); });
    if(btnPlay) btnPlay.addEventListener("click", play);
    if(btnPause) btnPause.addEventListener("click", pause);
    if(btnOpenSlide) btnOpenSlide.addEventListener("click", function(){
      if(ITEMS[slideIndex]) openLightbox(ITEMS[slideIndex].url, ITEMS[slideIndex].base, "");
    });

    // =========================
    // ✅ 동영상 섹션
    // =========================
    function toYoutubeEmbed(url){
      var u = String(url||"").trim();
      if(!u) return "";
      // youtu.be/ID
      var m1 = u.match(/youtu\.be\/([a-zA-Z0-9_-]{6,})/);
      if(m1) return "https://www.youtube.com/embed/" + m1[1];
      // watch?v=ID
      var m2 = u.match(/[?&]v=([a-zA-Z0-9_-]{6,})/);
      if(m2) return "https://www.youtube.com/embed/" + m2[1];
      // shorts/ID
      var m3 = u.match(/shorts\/([a-zA-Z0-9_-]{6,})/);
      if(m3) return "https://www.youtube.com/embed/" + m3[1];
      // embed/ID
      var m4 = u.match(/embed\/([a-zA-Z0-9_-]{6,})/);
      if(m4) return "https://www.youtube.com/embed/" + m4[1];
      return "";
    }

    function renderVideos(){
      var grid = document.getElementById("videoGrid");
      var section = document.getElementById("videoSection");
      var list = (window.VIDEOS && Array.isArray(window.VIDEOS)) ? window.VIDEOS : [];
      if(!grid || !section) return;

      if(!list.length){
        // 영상이 없으면 섹션 숨김
        section.style.display = "none";
        return;
      }

      grid.innerHTML = "";
      list.forEach(function(v, idx){
        var title = String(v.title || ("동영상 " + (idx+1))).trim();
        var embed = toYoutubeEmbed(v.url);
        if(!embed) return;

        var card = document.createElement("div");
        card.className = "vCard";

        var head = document.createElement("div");
        head.className = "vHead";
        head.innerHTML = '<b>' + title + '</b><small>YouTube</small>';

        var frame = document.createElement("div");
        frame.className = "vFrame";
        frame.innerHTML =
          '<iframe src="' + embed + '" ' +
          'title="' + title.replace(/"/g,"") + '" ' +
          'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" ' +
          'allowfullscreen></iframe>';

        card.appendChild(head);
        card.appendChild(frame);
        grid.appendChild(card);
      });
    }

    // =========================
    // ✅ INIT
    // =========================
    (function init(){
      try{
        if(ITEMS.length){
          renderThumbPager();
          setSlide(0);
          renderVideos();

          setPill(pillRender, "렌더: 완료", true);
          statusMsg.textContent = "정상 동작 중 ✅ (로컬 이미지)";
        }

        // URL ?q= 로 들어오면 자동 검색
        try{
          var u = new URL(location.href);
          var qq = u.searchParams.get("q");
          if(qq){
            if(q) q.value = qq;
            if(qTop) qTop.value = qq;
            runSearch(qq);
          }else{
            // 기본은 전체 표시(원하면 주석 해제)
            // runSearch("");
          }
        }catch(e){}
      }catch(e){
        console.error(e);
        setPill(pillRender, "렌더: 에러", false);
        statusMsg.textContent = "JS 에러로 중단됨. 콘솔의 빨간 에러 1줄만 캡처해 주세요.";
      }
    })();
  </script>
</body>
</html>
