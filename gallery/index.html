<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>갤러리 & 영상 | 계명태권도</title>
  <meta name="description" content="계명태권도 공식 갤러리 & 영상. 수련, 심사, 행사, 성장 기록을 한 곳에서 확인하세요." />
  <meta name="theme-color" content="#0b0f19" />

  <!-- OG -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="계명태권도 | 갤러리 & 영상" />
  <meta property="og:description" content="수련·심사·행사·성장 기록. 모바일 최적화 갤러리." />
  <meta property="og:image" content="https://static.wixstatic.com/media/abf917_38e0bc3b3d804b3caa6aa8363163950d~mv2.jpg" />

  <style>
    :root{
      --bg:#0b0f19;
      --line:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.68);
      --gold:#d7b56d;
      --blue:#66b3ff;
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --r:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: radial-gradient(1200px 700px at 18% -10%, rgba(102,179,255,.15), transparent 55%),
                  radial-gradient(900px 650px at 100% 0%, rgba(215,181,109,.14), transparent 58%),
                  linear-gradient(180deg, #070b14, var(--bg));
      color:var(--text);
    }
    a{color:inherit; text-decoration:none}
    .wrap{max-width:1100px; margin:0 auto; padding:20px 16px 90px}

    /* Top Bar */
    .topbar{
      position:sticky; top:0; z-index:50;
      backdrop-filter: blur(10px);
      background: rgba(11,15,25,.68);
      border-bottom:1px solid var(--line);
    }
    .topbar .inner{
      max-width:1100px; margin:0 auto;
      display:flex; align-items:center; gap:10px;
      padding:10px 16px;
    }
    .brand{display:flex; flex-direction:column; gap:2px}
    .brand b{letter-spacing:.2px}
    .brand small{color:var(--muted)}
    .spacer{flex:1}
    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      color:var(--text);
      cursor:pointer;
      user-select:none;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
      font-weight:650;
      white-space:nowrap;
    }
    .btn:hover{transform: translateY(-1px); border-color: rgba(215,181,109,.35)}
    .btn:active{transform: translateY(0px)}
    .btn.primary{
      border-color: rgba(102,179,255,.35);
      background: linear-gradient(180deg, rgba(102,179,255,.16), rgba(255,255,255,.03));
    }
    .btn.gold{
      border-color: rgba(215,181,109,.45);
      background: linear-gradient(180deg, rgba(215,181,109,.18), rgba(255,255,255,.03));
    }
    .btn.cinema{
      border-color: rgba(215,181,109,.38);
      background: linear-gradient(180deg, rgba(215,181,109,.14), rgba(102,179,255,.06));
    }
    .btn.cinema.on{
      border-color: rgba(102,179,255,.55);
      background: linear-gradient(180deg, rgba(102,179,255,.18), rgba(215,181,109,.08));
      box-shadow: 0 10px 30px rgba(102,179,255,.10);
    }

    /* Section Cards */
    .cardBox{
      margin-top:18px;
      border:1px solid var(--line);
      border-radius: var(--r);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .cardBox .head{
      display:flex; align-items:flex-end; justify-content:space-between; gap:12px;
      padding:16px 16px 12px;
      border-bottom:1px solid var(--line);
    }
    .cardBox .head h2{margin:0; font-size:18px}
    .cardBox .head p{margin:0; color:var(--muted); font-size:13px; line-height:1.55}
    .cardBox .body{padding:14px 14px 16px}

    /* Search */
    .searchRow{
      display:flex; gap:10px; flex-wrap:wrap;
      align-items:center;
    }
    .searchRow .field{
      flex:1;
      display:flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      min-width: 220px;
    }
    .searchRow input{
      width:100%;
      border:0;
      outline:none;
      background:transparent;
      color:var(--text);
      font-size:14px;
    }
    .xbtn{
      width:34px; height:34px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.86);
      cursor:pointer;
      display:grid; place-items:center;
      font-weight:800;
    }

    /* Result carousel */
    .resultTop{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 12px;
      border-radius: 16px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.16);
      margin-top:12px;
    }
    .resultTop b{font-size:13px}
    .resultTop small{color: rgba(255,255,255,.70)}
    .carousel{
      margin-top:10px;
      border:1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      background: rgba(0,0,0,.18);
      overflow:hidden;
    }
    .pages{
      display:flex;
      overflow-x:auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior:smooth;
    }
    .page{
      scroll-snap-align: start;
      flex:0 0 100%;
      padding:12px;
    }
    .gridThumb{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
    }
    @media (min-width: 820px){
      .gridThumb{ grid-template-columns: repeat(6, 1fr); }
    }
    @media (max-width: 420px){
      .gridThumb{ grid-template-columns: repeat(3, 1fr); }
    }
    .pitem{
      border-radius: 14px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      cursor:pointer;
      position:relative;
    }
    .pitem img{
      width:100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display:block;
      transition: transform .18s ease, filter .18s ease;
      filter: saturate(1.02);
    }
    .pitem:hover img{transform: scale(1.05); filter:saturate(1.08)}

    .dotsRow{
      display:flex; align-items:center; justify-content:center; gap:7px;
      padding:10px 10px 12px;
      border-top:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.10);
    }
    .dot{
      width:7px;height:7px;border-radius:999px;
      background: rgba(255,255,255,.35);
      border:1px solid rgba(255,255,255,.22);
      cursor:pointer;
    }
    .dot.on{ background: rgba(102,179,255,.92); border-color: rgba(102,179,255,.35); }

    /* COVER + THUMBS */
    .cover{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:12px;
      align-items:stretch;
    }
    .coverMain{
      position:relative;
      border:1px solid var(--line);
      border-radius: 18px;
      overflow:hidden;
      background: rgba(0,0,0,.22);
      min-height: 240px;
      height: 360px;
      max-height: 420px;
    }
    .coverMain img{
      width:100%;
      height:100%;
      object-fit: cover;
      display:block;
      filter: contrast(1.02) saturate(1.03);
      transform: scale(1.01);
    }
    .coverMain .cap{display:none !important;}

    @media (min-width: 980px){
      .coverMain{ height: 420px; max-height: 420px; }
    }
    @media (min-width: 1280px){
      .coverMain{ height: 440px; max-height: 440px; }
    }

    /* THUMB RAIL */
    .thumbRail{
      border:1px solid var(--line);
      border-radius: 18px;
      background: rgba(0,0,0,.18);
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width: 280px;
    }
    .thumbTitle{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:0 4px;
    }
    .thumbTitle b{font-size:14px}
    .thumbTitle small{color:var(--muted)}
    .railTopRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:0 4px;
    }
    .railNav{
      display:flex; gap:8px; flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
    }
    .navMini{
      width:40px; height:36px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.92);
      cursor:pointer;
      font-weight:900;
      display:grid; place-items:center;
      user-select:none;
      transition: transform .12s ease, border-color .12s ease;
    }
    .navMini:hover{ border-color: rgba(215,181,109,.35); transform: translateY(-1px); }
    .navMini:active{ transform: translateY(0); }
    .railMeta{
      color: rgba(255,255,255,.70);
      font-size:12px;
      white-space:nowrap;
    }
    .thumbPager{
      border:1px solid rgba(255,255,255,.10);
      border-radius: 16px;
      overflow:hidden;
      background: rgba(0,0,0,.12);
    }
    .thumbPages{
      display:flex;
      overflow-x:auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior:smooth;
    }
    .thumbPage{
      scroll-snap-align: start;
      flex:0 0 100%;
      padding:8px;
    }
    .thumbGrid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:8px;
    }
    .titem{
      position:relative;
      border-radius: 14px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      cursor:pointer;
      transform: translateZ(0);
    }
    .titem img{
      width:100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display:block;
      transition: transform .2s ease, filter .2s ease;
      filter: saturate(1.02);
    }
    .titem:hover img{transform: scale(1.05); filter: saturate(1.08)}
    .titem.active{border-color: rgba(102,179,255,.45)}
    .titem.active::after{
      content:"";
      position:absolute; inset:0;
      box-shadow: inset 0 0 0 2px rgba(102,179,255,.55);
      border-radius: 14px;
      pointer-events:none;
    }
    .thumbDots{
      display:flex; align-items:center; justify-content:center; gap:7px;
      padding:10px 10px 10px;
      border-top:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.10);
    }

    /* ✅ SLIDESHOW */
    .slideshow{
      margin-top:12px;
      border:1px solid var(--line);
      border-radius: 18px;
      overflow:hidden;
      background: rgba(0,0,0,.18);
    }
    .slideTop{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .slideTop .info{
      display:flex; flex-direction:column; gap:2px;
      min-width:0;
    }
    .slideTop .info b{
      font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .slideTop .info small{color:var(--muted); font-size:12px}
    .controls{
      display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;
    }

    .slideBox{
      position:relative;
      width:100%;
      aspect-ratio: 16 / 9;
      background:#000;
      overflow:hidden;
      --bgurl: none;
      --blur: 26px;
      --bgOpacity: .62;
      --zoom: 1;
      --tx: 0px;
      --ty: 0px;
    }
    .slideBox::before{
      content:"";
      position:absolute; inset:-18%;
      background-image: var(--bgurl);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(var(--blur)) saturate(1.12);
      opacity: var(--bgOpacity);
      transform: scale(1.10);
      pointer-events:none;
    }
    .slideBox::after{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(120% 120% at 50% 40%, rgba(255,255,255,.08), rgba(0,0,0,.55) 55%, rgba(0,0,0,.78) 100%),
        linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.55));
      pointer-events:none;
    }
    .slideBox img{
      position:absolute; inset:0;
      width:100%; height:100%;
      display:block;
      opacity:0;
      transition: opacity .35s ease, transform .9s ease;
      z-index:1;
      transform: translate(var(--tx), var(--ty)) scale(var(--zoom));
      will-change: transform;
    }
    .slideBox img.show{opacity:1}

    .navBtn{
      position:absolute;
      top:50%;
      transform: translateY(-50%);
      width:44px; height:44px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.35);
      color: rgba(255,255,255,.92);
      display:grid; place-items:center;
      cursor:pointer;
      user-select:none;
      z-index: 2;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }
    .navBtn:hover{border-color: rgba(215,181,109,.45); transform: translateY(-50%) scale(1.02)}
    .navBtn.prev{left:10px}
    .navBtn.next{right:10px}

    /* Videos */
    .video-grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
    }
    @media (min-width: 900px){
      .video-grid{grid-template-columns: 1fr 1fr}
    }
    .video-card{
      border:1px solid var(--line);
      border-radius: var(--r);
      overflow:hidden;
      background: rgba(255,255,255,.03);
      box-shadow: var(--shadow);
    }
    .video-embed{
      position:relative;
      width:100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }
    .video-embed iframe{
      position:absolute; inset:0;
      width:100%; height:100%;
      border:0;
    }
    .video-body{
      padding:12px 12px 14px;
      display:flex; flex-direction:column; gap:6px;
    }
    .video-body b{font-size:14px; line-height:1.35}
    .video-body p{margin:0; color:var(--muted); font-size:13px; line-height:1.5}
    .moreRow{
      margin-top:12px;
      display:flex; gap:10px; flex-wrap:wrap;
    }

    /* Lightbox */
    .lb{
      position:fixed; inset:0;
      background: rgba(0,0,0,.78);
      display:none;
      z-index: 9999;
      padding: 16px;
    }
    .lb.show{display:flex}
    .lb .panel{
      margin:auto;
      width:min(980px, 100%);
      border-radius: 18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(15,22,42,.88);
      backdrop-filter: blur(10px);
      box-shadow: 0 30px 120px rgba(0,0,0,.65);
    }
    .lb-top{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.12);
    }
    .lb-top .title{
      display:flex; flex-direction:column; gap:2px;
      min-width:0;
    }
    .lb-top .title b{font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
    .lb-top .title small{color:rgba(255,255,255,.70); font-size:12px}
    .lb-actions{display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end}
    .iconbtn{
      padding:9px 10px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.20);
      cursor:pointer;
      color: rgba(255,255,255,.88);
      font-weight:750;
      white-space:nowrap;
    }
    .iconbtn:hover{border-color: rgba(102,179,255,.35)}
    .lb-body{background: rgba(0,0,0,.35)}
    .lb-img{
      width:100%;
      max-height: calc(100vh - 220px);
      object-fit: contain;
      display:block;
      margin: 0 auto;
      background: rgba(0,0,0,.30);
    }

    /* Toast */
    #toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform: translateX(-50%);
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(15,22,42,.88);
      backdrop-filter: blur(10px);
      color: rgba(255,255,255,.92);
      font-weight:750;
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
      z-index: 10000;
      opacity:0;
      transition: opacity .2s ease;
      pointer-events:none;
    }

    @media (max-width: 980px){
      .cover{grid-template-columns: 1fr}
      .thumbRail{min-width: auto}
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="inner">
      <div class="brand">
        <b>계명태권도</b>
        <small>Gallery & Video</small>
      </div>
      <div class="spacer"></div>
      <a class="btn gold" href="../index.html">🏠 홈으로</a>
      <button class="btn primary" id="btnScrollTop" type="button">⬆️</button>
    </div>
  </div>

  <main class="wrap">

    <!-- 검색 -->
    <section class="cardBox" id="searchSection">
      <div class="head">
        <div>
          <h2>사진 조회</h2>
          <p>이름/키워드로 검색 후 사진을 확인합니다.</p>
        </div>
      </div>

      <div class="body">
        <div class="searchRow">
          <div class="field">
            🔎
            <input id="q" type="text" inputmode="search" autocomplete="off" placeholder="검색어 입력" />
            <button class="xbtn" id="btnClear" type="button" title="지우기">✕</button>
          </div>
          <button class="btn primary" id="btnSearch" type="button">조회</button>
          <button class="btn" id="btnShowAll" type="button">전체</button>
        </div>

        <div id="resultArea" style="display:none;">
          <div class="resultTop">
            <div>
              <b id="resultTitle">결과</b><br/>
              <small id="resultMeta">—</small>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;">
              <button class="btn" id="btnCopyQueryLink" type="button">🔗 결과 링크복사</button>
            </div>
          </div>

          <div class="carousel">
            <div class="pages" id="pages"></div>
            <div class="dotsRow" id="dotsRow"></div>
          </div>
        </div>

        <div id="emptyArea" style="display:none; margin-top:12px; color:rgba(255,255,255,.72); font-size:12px;">
          검색 결과가 없습니다.
        </div>
      </div>
    </section>

    <!-- 대표 + 썸네일 -->
    <section class="cardBox">
      <div class="head">
        <div>
          <h2>대표 사진</h2>
          <p>썸네일은 5줄만 표시되며, 좌우로 넘겨 페이지 이동합니다.</p>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap">
          <button class="btn" id="btnCoverPrev" type="button">‹ 이전</button>
          <button class="btn" id="btnCoverNext" type="button">다음 ›</button>
          <button class="btn" id="btnOpenCover" type="button">🔍 확대</button>
        </div>
      </div>

      <div class="body">
        <div class="cover">
          <div class="coverMain" id="coverMain">
            <img id="coverImg" src="" alt="대표 사진" referrerpolicy="no-referrer" />
          </div>

          <aside class="thumbRail">
            <div class="railTopRow">
              <div class="thumbTitle" style="padding:0;">
                <b>썸네일</b>
                <small><span id="thumbCount">0</span>장</small>
              </div>
              <div class="railNav">
                <button class="navMini" id="btnThumbPrev" type="button" aria-label="썸네일 이전 페이지">‹</button>
                <button class="navMini" id="btnThumbNext" type="button" aria-label="썸네일 다음 페이지">›</button>
              </div>
            </div>

            <div class="railMeta" id="thumbMeta">1/1</div>

            <div class="thumbPager">
              <div class="thumbPages" id="thumbPages"></div>
              <div class="thumbDots" id="thumbDots"></div>
            </div>

            <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:2px">
              <button class="btn" id="btnCopyCover" type="button">🔗 링크복사</button>
              <button class="btn" id="btnShuffleThumbs" type="button">🎲 섞기</button>
            </div>
          </aside>
        </div>
      </div>
    </section>

    <!-- 슬라이드 쇼 -->
    <section class="cardBox">
      <div class="head">
        <div>
          <h2>갤러리 슬라이드 쇼</h2>
          <p>자동 재생(기본 4초) · 일시정지/이전/다음/속도 조절 · 🎥 시네마모드</p>
        </div>
        <div class="controls">
          <button class="btn" id="btnPrev" type="button">⟵</button>
          <button class="btn primary" id="btnPlay" type="button">▶ 자동재생</button>

  <script>
    /* =========================================================
      ✅ PC 최적화 핵심
      - 모바일: Wix 원본 우선(빠름) + 실패 시 프록시
      - PC: 프록시 우선(403 회피) + 실패 시 원본(최후)
      - YouTube oEmbed 제목 불러오기: 모바일에서만 실행(PC는 403/지연 방지)
    ========================================================= */

    const IS_MOBILE =
      (window.matchMedia && window.matchMedia("(max-width: 900px)").matches) ||
      /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    function toast(msg){
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.style.opacity = "1";
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(()=>{ el.style.opacity="0"; }, 1500);
    }
    async function copyText(t){
      try{ await navigator.clipboard.writeText(t); toast("복사 완료 ✅"); }
      catch(e){ toast("복사 실패 😅 주소창에서 복사해주세요."); }
    }
    function norm(s){
      return String(s||"")
        .toLowerCase()
        .replace(/\s+/g,"")
        .replace(/[._\-]/g,"");
    }
    function cleanUrl(u){
      return String(u||"").replace(/\s+/g,"").trim();
    }
    function pad2(n){ return String(n).padStart(2,"0"); }

    // ✅ 프록시(weServ) URL
    function toProxyUrl(originalUrl){
      const u = String(originalUrl || "").trim();
      if(!u) return u;
      const noScheme = u.replace(/^https?:\/\//, "");
      return `https://images.weserv.nl/?url=${encodeURIComponent(noScheme)}&ssl=1`;
    }

    // ✅ 어떤 src를 쓸지 결정 (모바일/PC 분기)
    function primarySrc(url){
      const u = cleanUrl(url);
      if(!u) return u;
      // 모바일: 원본 우선
      // PC: 프록시 우선(403 회피)
      return IS_MOBILE ? u : toProxyUrl(u);
    }
    function secondarySrc(url){
      const u = cleanUrl(url);
      if(!u) return u;
      // 모바일: 원본 실패 시 프록시
      // PC: 프록시 실패 시 원본(최후)
      return IS_MOBILE ? toProxyUrl(u) : u;
    }

    // ✅ 이미지 엘리먼트에 “1회만” 대체하는 안전한 onerror
    function setImgWithFallback(imgEl, originalUrl){
      const u = cleanUrl(originalUrl);
      const a = primarySrc(u);
      const b = secondarySrc(u);

      imgEl.referrerPolicy = "no-referrer";
      imgEl.dataset.try = "0";
      imgEl.onerror = () => {
        const tried = Number(imgEl.dataset.try || "0");
        if(tried >= 1) { imgEl.onerror = null; return; }
        imgEl.dataset.try = String(tried + 1);
        imgEl.src = b;
      };
      imgEl.src = a;
    }

    // ✅ JSON 블록에서 RAW_LIST 가져오기(절대 안 깨짐)
    function loadRawList(){
      try{
        const txt = document.getElementById("RAW_JSON").textContent.trim();
        const arr = JSON.parse(txt);
        if(Array.isArray(arr)) return arr;
      }catch(e){
        console.error("RAW_JSON parse error:", e);
      }
      return [];
    }

    const RAW_LIST = loadRawList();

    function buildItemsFromRaw(raw){
      const cleaned = raw
        .map((row)=> [String(row?.[0]||"").trim(), cleanUrl(row?.[1]||"")])
        .filter(([name,url])=> name && url);

      const totalByName = {};
      cleaned.forEach(([name])=> totalByName[name] = (totalByName[name]||0) + 1;

      const seenByName = {};
      return cleaned.map(([name,url], idx)=>{
        seenByName[name] = (seenByName[name]||0) + 1;
        const needSuffix = (totalByName[name]||0) > 1;
        const internalName = needSuffix ? `${name}${pad2(seenByName[name])}` : name;

        const parts = String(name).split("_").map(s=>s.trim()).filter(Boolean);
        const tags = Array.from(new Set([name, internalName, ...parts]));

        return { id: idx+1, name: internalName, base: name, url, tags };
      });
    }

    const ITEMS = buildItemsFromRaw(RAW_LIST);

    /* Top */
    document.getElementById("btnScrollTop").addEventListener("click", ()=>{
      window.scrollTo({top:0, behavior:"smooth"});
    });

    /* Lightbox */
    function openLightboxByUrl(url){
      const lb = document.getElementById("lb");
      const lbImg = document.getElementById("lbImg");
      const lbDownload = document.getElementById("lbDownload");

      setImgWithFallback(lbImg, url);
      lbDownload.href = url;

      lb.classList.add("show");
      lb.setAttribute("aria-hidden","false");
      document.body.style.overflow="hidden";
      window.__lbUrl = url;
    }
    function closeLightbox(){
      const lb = document.getElementById("lb");
      lb.classList.remove("show");
      lb.setAttribute("aria-hidden","true");
      document.body.style.overflow="";
      document.getElementById("lbImg").src = "";
      window.__lbUrl = "";
    }
    document.getElementById("lbClose").addEventListener("click", closeLightbox);
    document.getElementById("lbCopy").addEventListener("click", ()=> copyText(window.__lbUrl||""));
    document.getElementById("lb").addEventListener("click", (e)=>{ if(e.target.id==="lb") closeLightbox(); });
    window.addEventListener("keydown", (e)=>{ if(document.getElementById("lb").classList.contains("show") && e.key==="Escape") closeLightbox(); });

    /* ===========================
      (1) 검색 결과 캐러셀
    =========================== */
    const q = document.getElementById("q");
    const btnClear = document.getElementById("btnClear");
    const btnSearch = document.getElementById("btnSearch");
    const btnShowAll = document.getElementById("btnShowAll");
    const resultArea = document.getElementById("resultArea");
    const emptyArea = document.getElementById("emptyArea");
    const resultTitle = document.getElementById("resultTitle");
    const resultMeta = document.getElementById("resultMeta");
    const pagesEl = document.getElementById("pages");
    const dotsRow = document.getElementById("dotsRow");
    const btnCopyQueryLink = document.getElementById("btnCopyQueryLink");

    function matchItem(item, query){
      const nq = norm(query);
      if(!nq) return true;
      const nname = norm(item.name);
      const nbase = norm(item.base);
      const ntags = norm((item.tags||[]).join(" "));
      return nname.includes(nq) || nbase.includes(nq) || ntags.includes(nq);
    }
    function chunk(arr, size){
      const out = [];
      for(let i=0; i<arr.length; i+=size) out.push(arr.slice(i, i+size));
      return out;
    }
    function buildDots(el, n, onClick){
      el.innerHTML = "";
      for(let i=0;i<n;i++){
        const d = document.createElement("div");
        d.className = "dot" + (i===0 ? " on" : "");
        d.addEventListener("click", ()=> onClick(i));
        el.appendChild(d);
      }
    }
    function setDotActive(el, idx){
      [...el.children].forEach((d,i)=> d.classList.toggle("on", i===idx));
    }

    function renderResultCarousel(list){
      const PER_PAGE = 12;
      const pages = chunk(list, PER_PAGE);

      pagesEl.innerHTML = pages.map((page)=> {
        const thumbs = page.map((it)=> {
          const src = primarySrc(it.url);
          const alt = secondarySrc(it.url);
          return `
            <div class="pitem" data-url="${it.url}">
              <img loading="lazy"
                   src="${src}"
                   alt="갤러리 사진"
                   referrerpolicy="no-referrer"
                   data-try="0"
                   onerror="(function(img,alt){var t=Number(img.dataset.try||'0'); if(t>=1){img.onerror=null;return;} img.dataset.try=String(t+1); img.src=alt;})(this,'${alt}')">
            </div>
          `;
        }).join("");
        return `
          <div class="page">
            <div class="gridThumb">${thumbs}</div>
          </div>
        `;
      }).join("");

      pagesEl.querySelectorAll(".pitem").forEach(el=>{
        el.addEventListener("click", ()=>{
          const url = el.getAttribute("data-url") || "";
          openLightboxByUrl(url);
        });
      });

      buildDots(dotsRow, pages.length, (i)=>{
        const w = pagesEl.clientWidth || 1;
        pagesEl.scrollTo({ left: i*w, behavior:"smooth" });
      });

      pagesEl.onscroll = ()=>{
        const w = pagesEl.clientWidth || 1;
        const idx = Math.round(pagesEl.scrollLeft / w);
        setDotActive(dotsRow, Math.max(0, Math.min(pages.length-1, idx)));
      };

      resultTitle.textContent = "검색 결과";
      resultMeta.textContent = `총 ${list.length}장 · ${pages.length}페이지`;

      resultArea.style.display = "block";
      emptyArea.style.display = "none";
    }

    function runSearch(query){
      const queryText = String(query||"").trim();
      const filtered = ITEMS.filter(it=> matchItem(it, queryText));

      if(!filtered.length){
        resultArea.style.display = "none";
        emptyArea.style.display = "block";
        return;
      }
      renderResultCarousel(filtered);

      const u = new URL(location.href);
      if(queryText) u.searchParams.set("q", queryText);
      else u.searchParams.delete("q");
      history.replaceState({}, "", u.toString());
    }

    btnClear.addEventListener("click", ()=>{ q.value=""; q.focus(); runSearch(""); });
    btnSearch.addEventListener("click", ()=> runSearch(q.value));
    btnShowAll.addEventListener("click", ()=>{ q.value=""; runSearch(""); });
    q.addEventListener("keydown", (e)=>{ if(e.key==="Enter") runSearch(q.value); });

    btnCopyQueryLink.addEventListener("click", ()=> copyText(location.href));

    const coverImg = document.getElementById("coverImg");

    const btnCoverPrev = document.getElementById("btnCoverPrev");
    const btnCoverNext = document.getElementById("btnCoverNext");
    const btnOpenCover = document.getElementById("btnOpenCover");
    const btnCopyCover = document.getElementById("btnCopyCover");
    const btnShuffleThumbs = document.getElementById("btnShuffleThumbs");

    const thumbPagesEl = document.getElementById("thumbPages");
    const thumbDotsEl = document.getElementById("thumbDots");

    const THUMBS_PER_PAGE = 15;

    let thumbPageCount = 1;

    function setCover(idx){
      coverIndex = (idx + THUMB_ITEMS.length) % THUMB_ITEMS.length;

      setImgWithFallback(coverImg, original);

      thumbPagesEl.querySelectorAll(`.titem[data-i="${coverIndex}"]`).forEach(el=> el.classList.add("active"));
    }

    function renderThumbPager(){
      thumbCount.textContent = String(THUMB_ITEMS.length);

      const pages = chunk(THUMB_ITEMS, THUMBS_PER_PAGE);
      thumbPageCount = pages.length;

      thumbPagesEl.innerHTML = pages.map((page, pi)=>{
        const tiles = page.map((it)=>{
          const src = primarySrc(it.url);
          const alt = secondarySrc(it.url);
          return `
            <div class="titem" data-i="${it._globalIndex}" title="썸네일">
              <img loading="lazy"
                   src="${src}"
                   alt="thumb"
                   referrerpolicy="no-referrer"
                   data-try="0"
                   onerror="(function(img,alt){var t=Number(img.dataset.try||'0'); if(t>=1){img.onerror=null;return;} img.dataset.try=String(t+1); img.src=alt;})(this,'${alt}')">
            </div>
          `;
        }).join("");

        return `
          <div class="thumbPage" data-page="${pi}">
            <div class="thumbGrid">${tiles}</div>
          </div>
        `;
      }).join("");

      buildDots(thumbDotsEl, thumbPageCount, (i)=>{
        const w = thumbPagesEl.clientWidth || 1;
        thumbPagesEl.scrollTo({ left: i*w, behavior:"smooth" });
      });

      thumbPagesEl.querySelectorAll(".titem").forEach(el=>{
        el.addEventListener("click", ()=>{
          const i = Number(el.getAttribute("data-i"));
          setCover(i);
        });
      });

      function updateThumbPagerUI(){
        const w = thumbPagesEl.clientWidth || 1;
        const pi = Math.round(thumbPagesEl.scrollLeft / w);
        const clamped = Math.max(0, Math.min(thumbPageCount-1, pi));
        setDotActive(thumbDotsEl, clamped);
        thumbMeta.textContent = `${clamped+1}/${thumbPageCount}`;
      }
      thumbPagesEl.onscroll = updateThumbPagerUI;
      updateThumbPagerUI();

      setCover(coverIndex);
    }

    function reindexThumbItems(){
      THUMB_ITEMS = THUMB_ITEMS.map((it, idx)=> ({...it, _globalIndex: idx}));
    }

    btnThumbPrev.addEventListener("click", ()=>{
      const w = thumbPagesEl.clientWidth || 1;
      const pi = Math.round(thumbPagesEl.scrollLeft / w);
      const target = Math.max(0, pi-1);
      thumbPagesEl.scrollTo({ left: target*w, behavior:"smooth" });
    });
    btnThumbNext.addEventListener("click", ()=>{
      const w = thumbPagesEl.clientWidth || 1;
      const pi = Math.round(thumbPagesEl.scrollLeft / w);
      const target = Math.min(thumbPageCount-1, pi+1);
      thumbPagesEl.scrollTo({ left: target*w, behavior:"smooth" });
    });

    btnCoverPrev.addEventListener("click", ()=> setCover(coverIndex-1));
    btnCoverNext.addEventListener("click", ()=> setCover(coverIndex+1));
    btnOpenCover.addEventListener("click", ()=> openLightboxByUrl(THUMB_ITEMS[coverIndex].url));
    btnCopyCover.addEventListener("click", ()=> copyText(THUMB_ITEMS[coverIndex].url));

    btnShuffleThumbs.addEventListener("click", ()=>{
      const shuffled = [...THUMB_ITEMS];
      for(let i=shuffled.length-1; i>0; i--){
        const j = Math.floor(Math.random()*(i+1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      THUMB_ITEMS = shuffled;
      reindexThumbItems();
      coverIndex = 0;
      renderThumbPager();
      setCover(0);
      toast("썸네일을 섞었습니다 🎲");
    });

    /* ===========================
      (3) 슬라이드 쇼
    =========================== */
    const slideTitle = document.getElementById("slideTitle");
    const slideSub = document.getElementById("slideSub");
    const imgA = document.getElementById("slideImgA");
    const imgB = document.getElementById("slideImgB");
    const slideBox = document.getElementById("slideBox");

    const btnPrev = document.getElementById("btnPrev");
    const btnNext = document.getElementById("btnNext");
    const btnPlay = document.getElementById("btnPlay");
    const btnPause = document.getElementById("btnPause");
    const btnSpeed = document.getElementById("btnSpeed");
    const btnOpenSlide = document.getElementById("btnOpenSlide");
    const btnCopySlide = document.getElementById("btnCopySlide");
    const navPrev = document.getElementById("navPrev");
    const navNext = document.getElementById("navNext");
    const btnCinema = document.getElementById("btnCinema");

    const SLIDE_FX = {
      cinemaDefault: true,
      zoomPortrait: 1.04,
      zoomLandscape: 1.02,
      blurPortrait: 34,
      blurLandscape: 22,
      bgOpacityPortrait: 0.72,
      bgOpacityLandscape: 0.58,
      moveMaxPortrait: 10,
      moveMaxLandscape: 14,
      tickMs: 120,
      zoomStep: 0.0012,
      moveStep: 0.18
    };

    let slideIndex = 0;
    let showingA = true;
    let timer = null;
    const speeds = [3000, 4000, 6000, 8000];
    let speedIdx = 1;

    let cinemaOn = !!SLIDE_FX.cinemaDefault;

    let __kbTimer = null;
    let __kbZ = 1;
    let __kbTX = 0;
    let __kbTY = 0;
    let __kbDirZ = 1;
    let __kbDirX = 1;
    let __kbDirY = 1;
    let __kbIsPortrait = false;
    let __kbZoomBase = 1.02;

    function applyCinemaModeUI(){
      btnCinema.classList.toggle("on", cinemaOn);
      btnCinema.textContent = cinemaOn ? "🎥 시네마모드" : "🎥 깔끔모드";
    }

    function setCinematicVars(isPortrait, originalUrl){
      const u = cleanUrl(originalUrl || "");
      // 배경도 동일한 src 정책을 사용
      const bg = primarySrc(u);

      if(!cinemaOn){
        slideBox.style.setProperty("--bgurl", `url("${bg}")`);
        slideBox.style.setProperty("--blur", "0px");
        slideBox.style.setProperty("--bgOpacity", ".20");
        slideBox.style.setProperty("--zoom", "1");
        slideBox.style.setProperty("--tx", "0px");
        slideBox.style.setProperty("--ty", "0px");
        return;
      }

      slideBox.style.setProperty("--bgurl", `url("${bg}")`);
      slideBox.style.setProperty("--blur", (isPortrait ? SLIDE_FX.blurPortrait : SLIDE_FX.blurLandscape) + "px");
      slideBox.style.setProperty("--bgOpacity", (isPortrait ? SLIDE_FX.bgOpacityPortrait : SLIDE_FX.bgOpacityLandscape));
      slideBox.style.setProperty("--zoom", (isPortrait ? SLIDE_FX.zoomPortrait : SLIDE_FX.zoomLandscape));
      slideBox.style.setProperty("--tx", "0px");
      slideBox.style.setProperty("--ty", "0px");
    }

    function applyAutoFit(imgEl, originalUrl){
      const w = imgEl.naturalWidth || 0;
      const h = imgEl.naturalHeight || 0;
      if(!w || !h) return;
      const isPortrait = h > w;
      __kbIsPortrait = isPortrait;
      __kbZoomBase = isPortrait ? SLIDE_FX.zoomPortrait : SLIDE_FX.zoomLandscape;
      imgEl.style.objectFit = isPortrait ? "contain" : "cover";
      setCinematicVars(isPortrait, originalUrl);
      resetKenBurns();
    }

    function resetKenBurns(){
      __kbZ = cinemaOn ? __kbZoomBase : 1;
      __kbTX = 0; __kbTY = 0;
      __kbDirZ = 1; __kbDirX = 1; __kbDirY = 1;
      slideBox.style.setProperty("--zoom", String(__kbZ));
      slideBox.style.setProperty("--tx", "0px");
      slideBox.style.setProperty("--ty", "0px");
    }

    function startKenBurns(){
      if(__kbTimer) return;
      __kbTimer = setInterval(()=>{
        if(!cinemaOn){
          slideBox.style.setProperty("--zoom", "1");
          slideBox.style.setProperty("--tx", "0px");
          slideBox.style.setProperty("--ty", "0px");
          return;
        }
        const maxMove = __kbIsPortrait ? SLIDE_FX.moveMaxPortrait : SLIDE_FX.moveMaxLandscape;

        __kbZ += (SLIDE_FX.zoomStep * __kbDirZ);
        if(__kbZ > __kbZoomBase + 0.02) __kbDirZ = -1;
        if(__kbZ < __kbZoomBase - 0.01) __kbDirZ = 1;

        __kbTX += (SLIDE_FX.moveStep * __kbDirX);
        __kbTY += (SLIDE_FX.moveStep * __kbDirY);

        if(__kbTX >  maxMove) __kbDirX = -1;
        if(__kbTX < -maxMove) __kbDirX =  1;
        if(__kbTY >  maxMove) __kbDirY = -1;
        if(__kbTY < -maxMove) __kbDirY =  1;

        slideBox.style.setProperty("--zoom", String(__kbZ));
        slideBox.style.setProperty("--tx", `${__kbTX.toFixed(1)}px`);
        slideBox.style.setProperty("--ty", `${__kbTY.toFixed(1)}px`);
      }, SLIDE_FX.tickMs);
    }

    function stopKenBurns(){
      clearInterval(__kbTimer);
      __kbTimer = null;
      resetKenBurns();
    }

    function setSlide(idx){
      if(!ITEMS.length) return;
      slideIndex = (idx + ITEMS.length) % ITEMS.length;
      const it = ITEMS[slideIndex];

      slideTitle.textContent = `사진 ${slideIndex+1}`;
      slideSub.textContent = `${slideIndex+1}/${ITEMS.length}`;

      const target = showingA ? imgA : imgB;
      const other  = showingA ? imgB : imgA;

      target.onload = ()=> applyAutoFit(target, it.url);
      setImgWithFallback(target, it.url);

      target.classList.add("show");
      other.classList.remove("show");

      showingA = !showingA;
    }

    function play(){
      if(timer || !ITEMS.length) return;
      timer = setInterval(()=> setSlide(slideIndex+1), speeds[speedIdx]);
      startKenBurns();
      toast("자동재생 시작 ▶");
    }
    function pause(){
      clearInterval(timer);
      timer = null;
      stopKenBurns();
      toast("자동재생 정지 ⏸");
    }
    function toggleSpeed(){
      speedIdx = (speedIdx + 1) % speeds.length;
      btnSpeed.textContent = `⏱ ${Math.round(speeds[speedIdx]/1000)}초`;
      if(timer){ pause(); play(); }
      toast("재생 속도 변경");
    }

    btnPrev.addEventListener("click", ()=> setSlide(slideIndex-1));
    btnNext.addEventListener("click", ()=> setSlide(slideIndex+1));
    navPrev.addEventListener("click", ()=> setSlide(slideIndex-1));
    navNext.addEventListener("click", ()=> setSlide(slideIndex+1));
    btnPlay.addEventListener("click", play);
    btnPause.addEventListener("click", pause);
    btnSpeed.addEventListener("click", toggleSpeed);
    btnOpenSlide.addEventListener("click", ()=> openLightboxByUrl(ITEMS[slideIndex]?.url || ""));
    btnCopySlide.addEventListener("click", ()=> copyText(ITEMS[slideIndex]?.url || ""));

    btnCinema.addEventListener("click", ()=>{
      cinemaOn = !cinemaOn;
      applyCinemaModeUI();
      setCinematicVars(__kbIsPortrait, ITEMS[slideIndex]?.url);
      if(timer){ resetKenBurns(); toast(cinemaOn ? "시네마모드 ON 🎥" : "깔끔모드 ON ✨"); }
      else { stopKenBurns(); toast(cinemaOn ? "시네마모드 ON 🎥" : "깔끔모드 ON ✨"); }
    });

    /* ===========================
      (4) 영상
      - PC에서는 oEmbed 제목 요청(403) 때문에 느려져서 “모바일에서만” 실행
    =========================== */
    const VIDEO_URLS = [
      "https://www.youtube.com/watch?v=D3kDXF-sNJA",
      "https://www.youtube.com/watch?v=wWIAPVvrnSw",
      "https://youtu.be/lUpmY5jfEIc",

    const CHANNEL_URL = "https://www.youtube.com/@%EA%B3%84%EB%AA%85%ED%83%9C%EA%B6%8C%EB%8F%84%EC%9A%B8%EC%82%B0/videos";

    function getYouTubeId(url){
      try{
        const u = new URL(url);

    const videoGrid = document.getElementById("videoGrid");

    async function fillYouTubeTitles(){
      const cards = [...videoGrid.querySelectorAll(".video-card")];
      await Promise.all(cards.map(async (card)=>{
        const url = card.getAttribute("data-video-url");
        const titleEl = card.querySelector(".yt-title");
        const metaEl = card.querySelector(".yt-meta");
        const oembed = `https://www.youtube.com/oembed?format=json&url=${encodeURIComponent(url)}`;
        try{
          const res = await fetch(oembed, { mode: "cors" });
          if(!res.ok) throw new Error("oEmbed not ok");
          const data = await res.json();
          titleEl.textContent = data.title || "계명태권도 영상";
          metaEl.textContent = data.author_name ? `YouTube · ${data.author_name}` : "YouTube";

          metaEl.textContent = "YouTube";
        }
      }));

    /* INIT */
    (function init(){
      const u = new URL(location.href);
      const qq = u.searchParams.get("q");
      if(qq){
        q.value = qq;
        runSearch(qq);
      }

      reindexThumbItems();
      renderThumbPager();

      if(THUMB_ITEMS.length){
        setCover(0);
      }

      applyCinemaModeUI();

      if(ITEMS.length){
        imgA.onload = ()=> applyAutoFit(imgA, ITEMS[0].url);
        setImgWithFallback(imgA, ITEMS[0].url);
        imgA.classList.add("show");

        slideTitle.textContent = "사진 1";
        slideSub.textContent = `1/${ITEMS.length}`;

        slideBox.style.setProperty("--bgurl", `url("${primarySrc(ITEMS[0].url)}")`);
      }
      btnSpeed.textContent = `⏱ ${Math.round(speeds[speedIdx]/1000)}초`;

      renderVideosShell();
      // ✅ 모바일에서만 oEmbed 호출
      if(IS_MOBILE){
        fillYouTubeTitles();
      }
    })();
  </script>
</body>
</html>
