<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>갤러리 & 영상 | 계명태권도</title>
  <meta name="description" content="계명태권도 공식 갤러리 & 영상. 수련, 심사, 행사, 성장 기록을 한 곳에서 확인하세요." />
  <meta name="theme-color" content="#0b0f19" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="계명태권도 | 갤러리 & 영상" />
  <meta property="og:description" content="수련·심사·행사·성장 기록. 모바일 최적화 갤러리." />

  <style>
    :root{
      --bg:#0b0f19;
      --line:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.68);
      --gold:#d7b56d;
      --blue:#66b3ff;
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --r:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: radial-gradient(1200px 700px at 18% -10%, rgba(102,179,255,.15), transparent 55%),
                  radial-gradient(900px 650px at 100% 0%, rgba(215,181,109,.14), transparent 58%),
                  linear-gradient(180deg, #070b14, var(--bg));
      color:var(--text);
    }
    a{color:inherit; text-decoration:none}
    .wrap{max-width:1100px; margin:0 auto; padding:20px 16px 90px}

    /* ✅ 상단: 심플 */
    .topbar{
      position:sticky; top:0; z-index:50;
      backdrop-filter: blur(10px);
      background: rgba(11,15,25,.78);
      border-bottom:1px solid var(--line);
    }
    .topbar .inner{
      max-width:1100px; margin:0 auto;
      display:flex; align-items:center; gap:12px;
      padding:12px 16px;
    }
    .brand{display:flex; flex-direction:column; gap:2px}
    .brand b{letter-spacing:.2px; font-size:16px}
    .brand small{color:var(--muted); font-size:12px}
    .spacer{flex:1}

    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      color:var(--text);
      cursor:pointer;
      user-select:none;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
      font-weight:650;
      white-space:nowrap;
    }
    .btn:hover{transform: translateY(-1px); border-color: rgba(215,181,109,.35)}
    .btn:active{transform: translateY(0px)}
    .btn.gold{
      border-color: rgba(215,181,109,.45);
      background: linear-gradient(180deg, rgba(215,181,109,.18), rgba(255,255,255,.03));
    }
    .btn.primary{
      border-color: rgba(102,179,255,.35);
      background: linear-gradient(180deg, rgba(102,179,255,.16), rgba(255,255,255,.03));
    }

    .cardBox{
      margin-top:18px;
      border:1px solid var(--line);
      border-radius: var(--r);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .cardBox .head{
      display:flex; align-items:flex-end; justify-content:space-between; gap:12px;
      padding:16px 16px 12px;
      border-bottom:1px solid var(--line);
    }
    .cardBox .head h2{margin:0; font-size:18px}
    .cardBox .body{padding:14px 14px 16px}

    .searchRow{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    .searchRow .field{
      flex:1; display:flex; align-items:center; gap:8px;
      padding:10px 12px; border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      min-width: 220px;
    }
    .searchRow input{
      width:100%; border:0; outline:none; background:transparent;
      color:var(--text); font-size:14px;
    }
    .xbtn{
      width:34px; height:34px; border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.86);
      cursor:pointer;
      display:grid; place-items:center;
      font-weight:800;
    }

    /* ✅ 썸네일 그리드(검색 결과) */
    .carousel{
      margin-top:12px;
      border:1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      background: rgba(0,0,0,.18);
      overflow:hidden;
    }
    .pages{
      display:flex; overflow-x:auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior:smooth;
    }
    .page{scroll-snap-align: start; flex:0 0 100%; padding:12px;}

    .gridThumb{display:grid; gap:10px;}
    .gridThumb{ grid-template-columns: repeat(3, 1fr); }
    @media (min-width: 560px){ .gridThumb{ grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 920px){ .gridThumb{ grid-template-columns: repeat(6, 1fr); } }

    .pitem{
      border-radius: 14px; overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      cursor:pointer;
    }
    .pitem img{
      width:100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display:block;
      transition: transform .18s ease, filter .18s ease;
    }
    .pitem:hover img{transform: scale(1.05); filter:saturate(1.08)}

    .dotsRow{
      display:flex; align-items:center; justify-content:center; gap:7px;
      padding:10px 10px 12px;
      border-top:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.10);
    }
    .dot{
      width:7px;height:7px;border-radius:999px;
      background: rgba(255,255,255,.35);
      border:1px solid rgba(255,255,255,.22);
      cursor:pointer;
    }
    .dot.on{ background: rgba(102,179,255,.92); border-color: rgba(102,179,255,.35); }

    #emptyArea{
      display:none;
      margin-top:12px;
      color:rgba(255,255,255,.72);
      font-size:12px;
    }

    /* ✅ 슬라이드쇼 */
    .slideshow{
      margin-top:0;
      border:1px solid var(--line);
      border-radius: 18px;
      overflow:hidden;
      background: rgba(0,0,0,.18);
    }
    .slideTop{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .slideTop b{font-size:14px}
    .slideTop small{color:var(--muted); font-size:12px}
    .slideBox{
      position:relative;
      width:100%;
      aspect-ratio: 16 / 9;
      background:#000;
      overflow:hidden;
    }
    /* ✅ 짤림 방지 */
    .slideBox img{
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit: contain;
      display:block;
      opacity:0;
      transition: opacity .35s ease;
      background:#000;
    }
    .slideBox img.show{opacity:1}

    .navBtn{
      position:absolute; top:50%;
      transform: translateY(-50%);
      width:44px; height:44px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.35);
      color: rgba(255,255,255,.92);
      display:grid; place-items:center;
      cursor:pointer;
      user-select:none;
      z-index: 2;
    }
    .navBtn.prev{left:10px}
    .navBtn.next{right:10px}

    /* ✅ 라이트박스 */
    .lb{
      position:fixed; inset:0;
      background: rgba(0,0,0,.78);
      display:none;
      z-index: 9999;
      padding: 16px;
    }
    .lb.show{display:flex}
    .lb .panel{
      margin:auto;
      width:min(980px, 100%);
      border-radius: 18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(15,22,42,.88);
      backdrop-filter: blur(10px);
      box-shadow: 0 30px 120px rgba(0,0,0,.65);
    }
    .lb-top{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.12);
    }
    .iconbtn{
      padding:9px 10px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.20);
      cursor:pointer;
      color: rgba(255,255,255,.88);
      font-weight:750;
      white-space:nowrap;
    }
    .lb-img{
      width:100%;
      max-height: calc(100vh - 220px);
      object-fit: contain;
      display:block;
      margin: 0 auto;
      background: rgba(0,0,0,.30);
    }

    #toast{
      position:fixed; left:50%; bottom:18px; transform: translateX(-50%);
      padding:10px 12px; border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(15,22,42,.88);
      backdrop-filter: blur(10px);
      color: rgba(255,255,255,.92);
      font-weight:750;
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
      z-index: 10000;
      opacity:0;
      transition: opacity .2s ease;
      pointer-events:none;
    }

    /* ✅ 동영상 */
    .videoGrid{
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
    }
    @media (min-width: 860px){
      .videoGrid{ grid-template-columns: 1fr 1fr; }
    }
    .vCard{
      border:1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      overflow:hidden;
      background: rgba(0,0,0,.18);
    }
    .vHead{
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .vHead b{font-size:13px}
    .vHead small{color: rgba(255,255,255,.70)}
    .vFrame{
      width:100%;
      aspect-ratio: 16 / 9;
      background:#000;
    }
    .vFrame iframe{width:100%; height:100%; border:0; display:block;}
    .channelCard{
      padding:14px 12px;
      text-align:center;
    }
    .channelCard a{
      display:inline-flex;
      align-items:center;
      justify-content:center;

      padding:10px 12px;
      border-radius:12px;

      color: rgba(255,255,255,.92);
      font-weight:800;
      text-decoration:none;
    }
  </style>
</head>

    // =========================
    // ✅ 유틸
    // =========================
    function toast(msg){
      var el = document.getElementById("toast");
      if(!el) return;
      el.textContent = msg;
      el.style.opacity = "1";
      if(window.__toastTimer) clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(function(){ el.style.opacity="0"; }, 1400);
    }

    function norm(s){
      return String(s||"").toLowerCase()
        .replace(/\s+/g,"")
        .replace(/[._\-]/g,"");
    }

    function uniq(arr){
      var out = [];
      var seen = {};
      for(var i=0;i<arr.length;i++){
        var k = String(arr[i]);
        if(!seen[k]){ seen[k]=1; out.push(arr[i]); }
      }
      return out;
    }

    function chunk(arr, size){
      var out = [];
      for(var i=0;i<arr.length;i+=size){
        out.push(arr.slice(i, i+size));
      }
      return out;
    }

    function buildDots(el, n, onClick){
      if(!el) return;
      el.innerHTML = "";
      for(var i=0;i<n;i++){
        (function(idx){
          var d = document.createElement("div");
          d.className = "dot" + (idx===0 ? " on" : "");
          d.addEventListener("click", function(){ onClick(idx); });
          el.appendChild(d);
        })(i);
      }
    }
    function setDotActive(el, idx){
      if(!el) return;
      var kids = el.children;
      for(var i=0;i<kids.length;i++){
        if(i===idx) kids[i].classList.add("on");
        else kids[i].classList.remove("on");
      }
    }

    function openLightbox(src, title, sub){
      var lb = document.getElementById("lb");
      var lbImg = document.getElementById("lbImg");
      var lbTitle = document.getElementById("lbTitle");
      var lbSub = document.getElementById("lbSub");
      if(!lb || !lbImg) return;

      lbImg.src = src;
      lbTitle.textContent = title || "사진";
      lbSub.textContent = sub || "";
      lb.classList.add("show");
      lb.setAttribute("aria-hidden","false");
      document.body.style.overflow="hidden";
    }
    function closeLightbox(){
      var lb = document.getElementById("lb");
      if(!lb) return;
      lb.classList.remove("show");
      lb.setAttribute("aria-hidden","true");
      document.body.style.overflow="";
      var img = document.getElementById("lbImg");
      if(img) img.src = "";
    }

        var nm = String(STUDENTS[i].name||"").trim();
        if(!id || !nm) continue;
        idToName[id] = nm;
      }
      return { idToName:idToName };
    }
    var MAPS = buildStudentMaps();

    function findIdsByNamePartial(nameQuery){
      var nq = norm(nameQuery);
      var ids = [];
      if(!nq) return ids;
      for(var i=0;i<STUDENTS.length;i++){
        var nm = norm(STUDENTS[i].name);
        if(nm.indexOf(nq) !== -1){
          ids.push(String(STUDENTS[i].id).toUpperCase());
        }
      }
      return uniq(ids);
    }

    async function fetchGitHubAllFiles(){
      var treeUrl =
        "https://api.github.com/repos/" + GH.owner + "/" + GH.repo +
        "/git/trees/" + encodeURIComponent(GH.branch) + "?recursive=1";

      var res = await fetch(treeUrl, { cache:"no-store" });
      if(!res.ok) throw new Error("GitHub API 오류: " + res.status);
      var data = await res.json();
      var tree = Array.isArray(data.tree) ? data.tree : [];

      var files = [];
      var basePath = GH.path.replace(/^\/+/,"").replace(/\/+$/,"") + "/";
      for(var i=0;i<tree.length;i++){
        var node = tree[i];
        if(!node || node.type !== "blob") continue;
        var p = String(node.path||"");
        if(p.indexOf(basePath) !== 0) continue;

        var lower = p.toLowerCase();
        if(!(lower.endsWith(".jpg") || lower.endsWith(".jpeg") || lower.endsWith(".png") || lower.endsWith(".webp"))) continue;

        var name = p.split("/").pop();
        files.push({ path:p, name:name });
      }
      return files;
    }

    function makeRawUrl(path){
      return "https://raw.githubusercontent.com/" + GH.owner + "/" + GH.repo + "/" + GH.branch + "/" + path;
    }

    function buildItemsFromFiles(files){
      var items = [];
      for(var i=0;i<files.length;i++){
        var f = files[i];
        var id = extractIdFromFilename(f.name);
        var url = makeRawUrl(f.path);

        var studentName = (id && MAPS.idToName[id]) ? MAPS.idToName[id] : "";
        var base = studentName ? studentName : (id || f.name);

        var tags = [f.name, studentName].filter(Boolean);
        tags = uniq(tags);

        items.push({
          id: i+1,
          file: f.name,
          studentId: id,
          studentName: studentName,
          base: base,
          url: url,
          tags: tags
        });
      }
      return items;
    }

    // =========================
    // ✅ 4) 페이지 렌더/검색 로직
    // =========================
    var ITEMS = [];

    var q = document.getElementById("q");
    var btnClear = document.getElementById("btnClear");
    var btnSearch = document.getElementById("btnSearch");
    var btnShowAll = document.getElementById("btnShowAll");
    var resultArea = document.getElementById("resultArea");
    var emptyArea = document.getElementById("emptyArea");
    var pagesEl = document.getElementById("pages");
    var dotsRow = document.getElementById("dotsRow");

    var slideTitle = document.getElementById("slideTitle");
    var slideSub = document.getElementById("slideSub");
    var imgA = document.getElementById("slideImgA");
    var imgB = document.getElementById("slideImgB");
    var btnPrev = document.getElementById("btnPrev");
    var btnNext = document.getElementById("btnNext");
    var btnPlay = document.getElementById("btnPlay");
    var btnPause = document.getElementById("btnPause");
    var btnOpenSlide = document.getElementById("btnOpenSlide");
    var navPrev = document.getElementById("navPrev");
    var navNext = document.getElementById("navNext");

    var lbClose = document.getElementById("lbClose");
    var lbBg    = document.getElementById("lb");
    if(lbClose) lbClose.addEventListener("click", closeLightbox);
    if(lbBg){
      lbBg.addEventListener("click", function(e){
        if(e && e.target && e.target.id === "lb") closeLightbox();
      });
    }
    window.addEventListener("keydown", function(e){
      var lb = document.getElementById("lb");
      if(lb && lb.classList.contains("show") && e.key === "Escape"){
        closeLightbox();
      }
    });

    var btnScrollTop = document.getElementById("btnScrollTop");
    if(btnScrollTop){
      btnScrollTop.addEventListener("click", function(){
        window.scrollTo({top:0, behavior:"smooth"});
      });
    }

    function getColumnsForGrid(){
      var w = window.innerWidth || 360;
      if(w >= 920) return 6;
      if(w >= 560) return 4;
      return 3;
    }

    function renderThumbPages(list){
      var cols = getColumnsForGrid();
      var PER_PAGE = cols * 5; // 5줄 단위 유지(표시는 안함)
      var pages = chunk(list, PER_PAGE);

      pagesEl.innerHTML = "";
      dotsRow.innerHTML = "";

      for(var i=0;i<pages.length;i++){
        var page = pages[i];
        var pageEl = document.createElement("div");
        pageEl.className = "page";

        var grid = document.createElement("div");
        grid.className = "gridThumb";

        for(var k=0;k<page.length;k++){
          (function(it){
            var wrap = document.createElement("div");
            wrap.className = "pitem";
            wrap.addEventListener("click", function(){
              openLightbox(it.url, it.base, "");
            });

            var img = document.createElement("img");
            img.loading = "lazy";
            img.alt = it.base;
            img.src = it.url;

            wrap.appendChild(img);
            grid.appendChild(wrap);
          })(page[k]);
        }

        pageEl.appendChild(grid);
        pagesEl.appendChild(pageEl);
      }

      buildDots(dotsRow, pages.length, function(i){
        var w = pagesEl.clientWidth || 1;
        pagesEl.scrollTo({ left: i*w, behavior:"smooth" });
      });

      pagesEl.onscroll = function(){
        var w = pagesEl.clientWidth || 1;
        var idx = Math.round(pagesEl.scrollLeft / w);
        if(idx < 0) idx = 0;
        if(idx > pages.length-1) idx = pages.length-1;
        setDotActive(dotsRow, idx);
      };

      resultArea.style.display = "block";
      emptyArea.style.display = "none";
    }

    function runSearch(query){
      if(!ITEMS.length) return;

      var queryText = String(query || "").trim();

      var filtered = [];
      if(norm(queryText)){
        // 이름만: 부분 일치 이름 -> 해당 id들 -> 사진 필터
        var ids = findIdsByNamePartial(queryText);
        if(ids.length){
          var set = {};
          for(var a=0;a<ids.length;a++) set[ids[a]] = 1;
          for(var j=0;j<ITEMS.length;j++){
            var it = ITEMS[j];
            if(set[String(it.studentId||"").toUpperCase()]) filtered.push(it);
          }
        } else {
          // 이름 매핑이 없는 파일들도 있을 수 있어 fallback
          var nq = norm(queryText);
          for(var k=0;k<ITEMS.length;k++){
            var nm = norm(ITEMS[k].studentName || "");
            if(nm.indexOf(nq) !== -1) filtered.push(ITEMS[k]);
          }
        }
      } else {
        filtered = ITEMS.slice();
      }

      if(filtered.length === 0){
        resultArea.style.display = "none";
        emptyArea.style.display = "block";
        return;
      }

      renderThumbPages(filtered);

      try{
        var u = new URL(location.href);
        if(queryText) u.searchParams.set("q", queryText);
        else u.searchParams.delete("q");
        history.replaceState({}, "", u.toString());
      }catch(e){}
    }

    function bindSearchBox(inputEl){
      if(!inputEl) return;
      inputEl.addEventListener("keydown", function(e){
        if(e.key==="Enter") runSearch(inputEl.value);
      });
    }
    bindSearchBox(q);

    if(btnClear) btnClear.addEventListener("click", function(){ q.value=""; q.focus(); runSearch(""); });
    if(btnSearch) btnSearch.addEventListener("click", function(){ runSearch(q.value); });
    if(btnShowAll) btnShowAll.addEventListener("click", function(){ q.value=""; runSearch(""); });

    var __lastCols = getColumnsForGrid();
    window.addEventListener("resize", function(){
      var now = getColumnsForGrid();
      if(now !== __lastCols){
        __lastCols = now;
        if(resultArea && resultArea.style.display !== "none"){
          runSearch((q && q.value) ? q.value : "");
        }
      }
    });

    // =========================
    // ✅ 슬라이드쇼
    // =========================
    var slideIndex = 0;
    var showingA = true;
    var timer = null;
    var speedMs = 4000;

    function setSlide(idx){
      if(!ITEMS.length) return;
      slideIndex = (idx + ITEMS.length) % ITEMS.length;
      var it = ITEMS[slideIndex];

      if(slideTitle) slideTitle.textContent = it.base || "사진";
      if(slideSub) slideSub.textContent = (slideIndex+1) + "/" + ITEMS.length;

      var target = showingA ? imgA : imgB;
      var other  = showingA ? imgB : imgA;

      target.src = it.url;
      target.classList.add("show");
      other.classList.remove("show");

      showingA = !showingA;
    }

    function play(){
      if(timer || !ITEMS.length) return;
      timer = setInterval(function(){ setSlide(slideIndex+1); }, speedMs);
      toast("자동재생 시작 ▶");
    }
    function pause(){
      if(timer) clearInterval(timer);
      timer = null;
      toast("자동재생 정지 ⏸");
    }

    if(btnPrev) btnPrev.addEventListener("click", function(){ setSlide(slideIndex-1); });
    if(btnNext) btnNext.addEventListener("click", function(){ setSlide(slideIndex+1); });
    if(navPrev) navPrev.addEventListener("click", function(){ setSlide(slideIndex-1); });
    if(navNext) navNext.addEventListener("click", function(){ setSlide(slideIndex+1); });
    if(btnPlay) btnPlay.addEventListener("click", play);
    if(btnPause) btnPause.addEventListener("click", pause);
    if(btnOpenSlide) btnOpenSlide.addEventListener("click", function(){
      if(ITEMS[slideIndex]) openLightbox(ITEMS[slideIndex].url, ITEMS[slideIndex].base, "");
    });

    // =========================
    // ✅ 동영상
    // =========================
    function toYoutubeEmbed(url){
      var u = String(url||"").trim();
      if(!u) return "";
      var m1 = u.match(/youtu\.be\/([a-zA-Z0-9_-]{6,})/);
      if(m1) return "https://www.youtube.com/embed/" + m1[1];
      var m2 = u.match(/[?&]v=([a-zA-Z0-9_-]{6,})/);
      if(m2) return "https://www.youtube.com/embed/" + m2[1];
      var m3 = u.match(/shorts\/([a-zA-Z0-9_-]{6,})/);
      if(m3) return "https://www.youtube.com/embed/" + m3[1];
      var m4 = u.match(/embed\/([a-zA-Z0-9_-]{6,})/);
      if(m4) return "https://www.youtube.com/embed/" + m4[1];
      return "";
    }

    function renderVideos(){
      var grid = document.getElementById("videoGrid");
      var section = document.getElementById("videoSection");
      var list = (window.VIDEOS && Array.isArray(window.VIDEOS)) ? window.VIDEOS : [];
      if(!grid || !section) return;

      if(!list.length){
        section.style.display = "none";
        return;
      }

      grid.innerHTML = "";

      list.forEach(function(v, idx){
        var title = String(v.title || ("동영상 " + (idx+1))).trim();
        var embed = toYoutubeEmbed(v.url);
        if(!embed) return;

        var card = document.createElement("div");
        card.className = "vCard";

        var head = document.createElement("div");
        head.className = "vHead";
        head.innerHTML = '<b>' + title + ' ' + (idx+1) + '</b><small>YouTube</small>';

        var frame = document.createElement("div");
        frame.className = "vFrame";
        frame.innerHTML =
          '<iframe src="' + embed + '" ' +
          'title="' + title.replace(/"/g,"") + '" ' +
          'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" ' +
          'allowfullscreen></iframe>';

        card.appendChild(head);
        card.appendChild(frame);
        grid.appendChild(card);
      });

      var ch = document.createElement("div");
      ch.className = "vCard channelCard";
      ch.innerHTML =
        '<a href="' + CHANNEL_URL + '" target="_blank" rel="noopener">▶ 공식 유튜브 채널 바로가기</a>';
      grid.appendChild(ch);
    }

    // =========================
    // ✅ INIT (표시 문구 없음)
    // =========================
    (async function init(){
      try{
        var files = await fetchGitHubAllFiles();
        ITEMS = buildItemsFromFiles(files);

        ITEMS.sort(function(a,b){
          return String(a.file).localeCompare(String(b.file), "en");
        });

        if(ITEMS.length){
          // 초기: 전체 썸네일 보여주기
          runSearch("");
          // 슬라이드쇼 첫 장
          setSlide(0);
          renderVideos();
        }else{
          emptyArea.style.display = "block";
        }

        // URL q 파라미터 지원 (선택)
        try{
          var u = new URL(location.href);
          var qq = u.searchParams.get("q");
          if(qq){
            if(q) q.value = qq;
            runSearch(qq);
          }
        }catch(e){}
      }catch(e){
        console.error(e);
        // 사용자 화면에는 조용히
        emptyArea.style.display = "block";
      }
    })();
  </script>
</body>
</html>
